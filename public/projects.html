<script>
let selectedProjectId = null;
let projectsData = [];
let roomsData = [];

const PROJECT_TYPES = ['Airbnb', 'Booking', '長租', '購置長租', '長租代管'];

function h(value) {
    return String(value ?? '').replace(/[&<>"']/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char]));
}

function getMapSearchUrl(address) {
    return address ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}` : '';
}

function getMapEmbedUrl(address) {
    return address ? `https://maps.google.com/maps?q=${encodeURIComponent(address)}&output=embed` : '';
}

function renderMapPreview(address) {
    const preview = document.getElementById('project-map-preview');
    const hidden = document.getElementById('project-map-url');
    if (!preview || !hidden) return;
    const embedUrl = getMapEmbedUrl(address);
    const searchUrl = getMapSearchUrl(address);
    hidden.value = searchUrl;
    if (!address) {
        preview.innerHTML = '<div><i class="fas fa-map-location-dot text-3xl mb-2 text-primary/30"></i><p>輸入地址後自動產生地圖預覽</p></div>';
        return;
    }
    preview.innerHTML = `<iframe title="${h(address)} 地圖" src="${embedUrl}" class="w-full h-full border-0" loading="lazy"></iframe>`;
}

function renderImagePreview(index, url) {
    const preview = document.getElementById(`project-exterior-preview-${index}`);
    if (!preview) return;
    if (url) {
        preview.innerHTML = `<img src="${h(url)}" alt="建築物外觀照片 ${index}" class="w-full h-full object-cover rounded-lg">`;
    } else {
        preview.innerHTML = '<span><i class="fas fa-camera mr-1"></i>尚未上傳</span>';
    }
}

function getProjectFormData() {
    const address = document.getElementById('project-address').value.trim();
    return {
        name: document.getElementById('project-name').value.trim(),
        type: document.getElementById('project-type').value,
        address,
        mapUrl: getMapSearchUrl(address),
        mapEmbedUrl: getMapEmbedUrl(address),
        rentableRooms: parseInt(document.getElementById('project-rentable-rooms').value, 10) || 0,
        waterNumber: document.getElementById('project-water-number').value.trim(),
        electricNumber: document.getElementById('project-electric-number').value.trim(),
        gasNumber: document.getElementById('project-gas-number').value.trim(),
        managementFee: parseInt(document.getElementById('project-management-fee').value, 10) || 0,
        tvProvider: document.getElementById('project-tv-provider').value.trim(),
        tvFee: parseInt(document.getElementById('project-tv-fee').value, 10) || 0,
        withholdingMethod: document.getElementById('project-withholding-method').value.trim(),
        wifiName: document.getElementById('project-wifi-name').value.trim(),
        wifiPassword: document.getElementById('project-wifi-password').value.trim(),
        doorPassword: document.getElementById('project-door-password').value.trim(),
        exteriorPhotoUrls: [
            document.getElementById('project-exterior-url-1').value,
            document.getElementById('project-exterior-url-2').value
        ].filter(Boolean)
    };
}

async function uploadProjectExteriorPhoto(uid, projectId, index) {
    const input = document.getElementById(`project-exterior-file-${index}`);
    if (!input || !input.files || !input.files[0]) return document.getElementById(`project-exterior-url-${index}`).value || '';
    const file = input.files[0];
    const ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
    const storagePath = `users/${uid}/projects/${projectId}/exterior-${index}-${Date.now()}.${ext}`;
    const ref = firebase.storage().ref(storagePath);
    await ref.put(file, { contentType: file.type || 'image/jpeg' });
    return await ref.getDownloadURL();
}

function fillProjectForm(project) {
    document.getElementById('project-id').value = project?.id || '';
    document.getElementById('project-name').value = project?.name || '';
    document.getElementById('project-type').value = project?.type || '';
    document.getElementById('project-address').value = project?.address || '';
    document.getElementById('project-rentable-rooms').value = project?.rentableRooms ?? project?.totalRooms ?? '';
    document.getElementById('project-water-number').value = project?.waterNumber || '';
    document.getElementById('project-electric-number').value = project?.electricNumber || '';
    document.getElementById('project-gas-number').value = project?.gasNumber || '';
    document.getElementById('project-management-fee').value = project?.managementFee || '';
    document.getElementById('project-tv-provider').value = project?.tvProvider || '';
    document.getElementById('project-tv-fee').value = project?.tvFee || '';
    document.getElementById('project-withholding-method').value = project?.withholdingMethod || '';
    document.getElementById('project-wifi-name').value = project?.wifiName || '';
    document.getElementById('project-wifi-password').value = project?.wifiPassword || '';
    document.getElementById('project-door-password').value = project?.doorPassword || '';
    const photos = project?.exteriorPhotoUrls || [];
    document.getElementById('project-exterior-url-1').value = photos[0] || '';
    document.getElementById('project-exterior-url-2').value = photos[1] || '';
    document.getElementById('project-exterior-file-1').value = '';
    document.getElementById('project-exterior-file-2').value = '';
    renderMapPreview(project?.address || '');
    renderImagePreview(1, photos[0] || '');
    renderImagePreview(2, photos[1] || '');
}

// 載入建案
async function loadProjects() {
    const uid = getCurrentUserUid();
    if (!uid) return;
    try {
        const snapshot = await db.collection('users').doc(uid).collection('projects').get();
        projectsData = await Promise.all(snapshot.docs.map(async (doc) => {
            const project = { id: doc.id, ...doc.data() };
            const roomsSnapshot = await db.collection('users').doc(uid).collection('projects').doc(doc.id).collection('rooms').get();
            const rooms = roomsSnapshot.docs.map(roomDoc => ({ id: roomDoc.id, ...roomDoc.data() }));
            project.totalRooms = rooms.length;
            project.occupied = rooms.filter(room => room.status === '已出租' || !!room.tenant).length;
            project.vacant = rooms.filter(room => room.status === '空置' || !room.tenant).length;
            return project;
        }));
        renderProjects();
        if (projectsData.length === 0) {
            document.getElementById('projects-container').innerHTML = '<div class="col-span-full bg-white rounded-xl border border-gray-100 p-8 text-center text-gray-400">尚未新增建案，請點右上角「新增建案」開始。</div>';
        }
    } catch (e) {
        console.error('Error loading projects:', e);
        showToast('載入失敗', 'error');
    }
}

function renderProjects() {
    const container = document.getElementById('projects-container');
    container.innerHTML = projectsData.map(p => {
        const occupied = p.occupied || 0;
        const actualTotal = p.totalRooms || 0;
        const total = p.rentableRooms || actualTotal;
        const rate = total > 0 ? Math.round(occupied / total * 100) : 0;
        const firstPhoto = (p.exteriorPhotoUrls && p.exteriorPhotoUrls[0]) || '';
        const typeLabel = p.type ? `<span class="text-[11px] px-2 py-1 rounded-full bg-primary/10 text-primary font-medium">${h(p.type)}</span>` : '';
        const mapLink = p.mapUrl || getMapSearchUrl(p.address || '');
        return `
        <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden cursor-pointer hover:shadow-md transition" onclick="selectProject('${p.id}')">
            <div class="h-32 bg-gradient-to-br from-primary/10 to-primary/5 flex items-center justify-center overflow-hidden relative">
                ${firstPhoto ? `<img src="${h(firstPhoto)}" alt="${h(p.name)} 外觀" class="w-full h-full object-cover">` : '<i class="fas fa-building text-3xl text-primary/30"></i>'}
                <div class="absolute top-2 left-2 flex gap-2">${typeLabel}</div>
            </div>
            <div class="p-4">
                <div class="flex items-start justify-between gap-2 mb-2"><h3 class="font-semibold text-gray-900 text-sm leading-5">${h(p.name)}</h3><span class="text-xs status-occupied px-2 py-1 rounded-full whitespace-nowrap">${rate}% 出租</span></div>
                <p class="text-xs text-gray-500 mb-3 line-clamp-2"><i class="fas fa-location-dot mr-1 text-gray-300"></i>${h(p.address || '未填地址')}</p>
                <div class="grid grid-cols-3 gap-2 text-xs mb-3">
                    <div class="rounded-lg bg-gray-50 p-2"><p class="text-gray-400">可租</p><p class="font-semibold text-gray-900">${total} 間</p></div>
                    <div class="rounded-lg bg-emerald-50 p-2"><p class="text-gray-400">已租</p><p class="font-semibold text-emerald-600">${occupied} 間</p></div>
                    <div class="rounded-lg bg-amber-50 p-2"><p class="text-gray-400">空置</p><p class="font-semibold text-amber-600">${Math.max(total - occupied, 0)} 間</p></div>
                </div>
                <div class="w-full bg-gray-100 rounded-full h-1.5"><div class="bg-secondary h-1.5 rounded-full" style="width:${Math.min(rate, 100)}%"></div></div>
                <div class="mt-3 pt-3 border-t border-gray-50 flex items-center justify-between gap-2">
                    <a href="${mapLink}" target="_blank" onclick="event.stopPropagation()" class="text-xs text-gray-400 hover:text-primary"><i class="fas fa-map mr-1"></i>地圖</a>
                    <button type="button" onclick="openProjectModal('${p.id}'); event.stopPropagation();" class="text-xs text-primary font-medium hover:underline"><i class="fas fa-pen mr-1"></i>編輯資料</button>
                </div>
            </div>
        </div>`;
    }).join('');
}

async function selectProject(projectId) {
    selectedProjectId = projectId;
    const project = projectsData.find(p => p.id === projectId);
    document.getElementById('rooms-title').textContent = project ? project.name + ' — 客房列表' : '客房列表';
    document.getElementById('rooms-subtitle').textContent = '共 ' + (project ? project.totalRooms || 0 : 0) + ' 間客房';
    document.getElementById('room-project-id').value = projectId;
    
    const uid = getCurrentUserUid();
    if (!uid) return;
    try {
        const snapshot = await db.collection('users').doc(uid).collection('projects').doc(projectId).collection('rooms').get();
        roomsData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderRooms();
    } catch (e) {
        console.error('Error loading rooms:', e);
    }
}

function renderRooms() {
    const tbody = document.getElementById('rooms-table-body');
    if (roomsData.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="px-4 py-8 text-center text-gray-400">尚未新增客房</td></tr>';
        return;
    }
    tbody.innerHTML = roomsData.map(r => {
        const statusClass = r.status === '已出租' ? 'status-occupied' : r.status === '空置' ? 'status-vacant' : r.status === '維修中' ? 'status-repair' : 'status-cleaning';
        return `<tr class="hover:bg-gray-50">
            <td class="px-4 py-3 text-sm font-medium text-gray-900">${r.number}</td>
            <td class="px-4 py-3 text-sm text-gray-600">${r.type}</td>
            <td class="px-4 py-3 text-sm text-gray-600">${r.area} 坪</td>
            <td class="px-4 py-3 text-sm text-gray-600">${r.floor}F</td>
            <td class="px-4 py-3"><span class="inline-flex items-center gap-1 text-xs ${statusClass} px-2 py-1 rounded-full"><span class="w-1.5 h-1.5 rounded-full" style="background:currentColor"></span>${r.status}</span></td>
            <td class="px-4 py-3 text-sm text-gray-600">${r.tenant || '—'}</td>
            <td class="px-4 py-3 text-sm font-medium text-gray-900">${formatCurrency(r.rent)}</td>
            <td class="px-4 py-3"><button class="text-sm text-primary hover:underline">查看</button></td>
        </tr>`;
    }).join('');
}

function openProjectModal(projectId = '') {
    const project = projectId ? projectsData.find(p => p.id === projectId) : null;
    document.getElementById('project-modal').classList.remove('hidden');
    document.getElementById('project-modal-title').textContent = project ? '編輯建案資料' : '新增建案';
    document.getElementById('project-form').reset();
    fillProjectForm(project || null);
}
function closeProjectModal() { document.getElementById('project-modal').classList.add('hidden'); }
function openRoomModal() { if (!selectedProjectId) { showToast('請先選擇建案', 'error'); return; } document.getElementById('room-modal').classList.remove('hidden'); document.getElementById('room-modal-title').textContent = '新增客房'; document.getElementById('room-form').reset(); document.getElementById('room-id').value = ''; document.getElementById('room-project-id').value = selectedProjectId; }
function closeRoomModal() { document.getElementById('room-modal').classList.add('hidden'); }

document.getElementById('project-address').addEventListener('input', (e) => renderMapPreview(e.target.value.trim()));
[1, 2].forEach(index => {
    document.getElementById(`project-exterior-file-${index}`).addEventListener('change', (e) => {
        const file = e.target.files && e.target.files[0];
        if (!file) return renderImagePreview(index, document.getElementById(`project-exterior-url-${index}`).value);
        const reader = new FileReader();
        reader.onload = () => renderImagePreview(index, reader.result);
        reader.readAsDataURL(file);
    });
});

document.getElementById('project-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const uid = getCurrentUserUid();
    if (!uid) return;
    const id = document.getElementById('project-id').value;
    let projectId = id;
    const data = getProjectFormData();
    data.updatedAt = firebase.firestore.FieldValue.serverTimestamp();
    try {
        showLoading();
        if (projectId) {
            await db.collection('users').doc(uid).collection('projects').doc(projectId).set(data, { merge: true });
        } else {
            data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
            const ref = await db.collection('users').doc(uid).collection('projects').add(data);
            projectId = ref.id;
        }
        const photo1 = await uploadProjectExteriorPhoto(uid, projectId, 1);
        const photo2 = await uploadProjectExteriorPhoto(uid, projectId, 2);
        const exteriorPhotoUrls = [photo1, photo2].filter(Boolean);
        await db.collection('users').doc(uid).collection('projects').doc(projectId).set({ exteriorPhotoUrls, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
        hideLoading();
        showToast(id ? '建案已更新' : '建案已新增');
        closeProjectModal();
        await loadProjects();
    } catch (e) {
        hideLoading();
        console.error('Error saving project:', e);
        showToast('儲存失敗，請確認欄位或照片上傳權限', 'error');
    }
});

document.getElementById('room-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const uid = getCurrentUserUid();
    if (!uid) return;
    const amenities = Array.from(document.querySelectorAll('.room-amenity:checked')).map(cb => cb.value);
    const data = { number: document.getElementById('room-number').value, type: document.getElementById('room-type').value, area: parseFloat(document.getElementById('room-area').value) || 0, floor: parseInt(document.getElementById('room-floor').value) || 0, rent: parseInt(document.getElementById('room-rent').value) || 0, acUnits: parseInt(document.getElementById('room-ac').value) || 1, amenities, status: '空置', tenant: '' };
    const id = document.getElementById('room-id').value;
    const projectId = document.getElementById('room-project-id').value;
    try {
        if (id) { await db.collection('users').doc(uid).collection('projects').doc(projectId).collection('rooms').doc(id).update(data); showToast('客房已更新'); }
        else { await db.collection('users').doc(uid).collection('projects').doc(projectId).collection('rooms').add(data); showToast('客房已新增'); }
        closeRoomModal(); await loadProjects(); selectProject(projectId);
    } catch (e) { showToast('儲存失敗', 'error'); }
});

document.addEventListener('DOMContentLoaded', () => onAuthReady(user => { if (user) loadProjects(); }));
</script>
