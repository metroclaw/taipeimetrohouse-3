<body class="bg-bg min-h-screen">
<!-- 頂部導航 -->
<nav class="bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between sticky top-0 z-50">
  <div class="flex items-center gap-4">
    <button class="lg:hidden text-gray-600" onclick="document.getElementById('sidebar').classList.toggle('hidden')"><i class="fas fa-bars text-xl"></i></button>
    <div class="flex items-center gap-2"><div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center"><span class="text-white font-bold text-sm">M</span></div><span class="font-bold text-base lg:text-lg text-gray-900">大都會物業房務管理系統</span></div>
  </div>
  <div class="flex items-center gap-3 relative">
    <button class="relative p-2 text-gray-500 hover:bg-gray-100 rounded-lg"><i class="fas fa-bell"></i></button>
    <div class="relative">
      <button id="user-menu-button" type="button" onclick="toggleUserMenu(event)" class="w-9 h-9 bg-primary/10 rounded-full flex items-center justify-center overflow-hidden ring-2 ring-transparent hover:ring-primary/20 transition" title="帳號選單">
        <div id="user-avatar" class="w-full h-full flex items-center justify-center"><i class="fas fa-user text-primary text-sm"></i></div>
      </button>
      <div id="user-menu" class="hidden absolute right-0 mt-2 w-48 bg-white border border-gray-100 rounded-xl shadow-lg py-2 z-[60]">
        <div class="px-4 py-2 border-b border-gray-100">
          <p id="user-name" class="text-sm font-medium text-gray-900 truncate">使用者</p>
          <p id="user-email" class="text-xs text-gray-500 truncate"></p>
        </div>
        <a href="account-info.html" class="flex items-center gap-2 px-4 py-2 text-sm text-gray-700 hover:bg-gray-50"><i class="fas fa-user-cog w-4 text-gray-400"></i>帳號設定</a>
        <button type="button" onclick="handleSignOut()" class="w-full flex items-center gap-2 px-4 py-2 text-sm text-red-600 hover:bg-red-50 text-left"><i class="fas fa-sign-out-alt w-4"></i>登出</button>
      </div>
    </div>
  </div>
</nav>

<div class="flex">
  <!-- 側邊欄 -->
  <aside id="sidebar" class="hidden lg:block w-56 bg-white border-r border-gray-200 min-h-[calc(100vh-57px)] p-3 fixed lg:sticky top-[57px] z-40 overflow-y-auto">
    <nav class="space-y-1 text-sm">
      <a href="dashboard.html" class="sidebar-item flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded-lg"><i class="fas fa-home w-5"></i>主控台</a>
      <a href="projects.html" class="sidebar-item active flex items-center gap-3 px-3 py-2 rounded-lg"><i class="fas fa-building w-5"></i>建案管理</a>
      <a href="tenants.html" class="sidebar-item flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded-lg"><i class="fas fa-users w-5"></i>房客管理</a>
      <a href="contracts.html" class="sidebar-item flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded-lg"><i class="fas fa-file-contract w-5"></i>合約管理</a>
      <a href="rent.html" class="sidebar-item flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded-lg"><i class="fas fa-money-bill w-5"></i>租金管理</a>
      <a href="billing.html" class="sidebar-item flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded-lg"><i class="fas fa-calculator w-5"></i>費用計算</a>
      <a href="maintenance.html" class="sidebar-item flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded-lg"><i class="fas fa-tools w-5"></i>修繕派工</a>
      <a href="calendar.html" class="sidebar-item flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded-lg"><i class="fas fa-calendar-days w-5"></i>行事曆</a>
      <a href="evidence.html" class="sidebar-item flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded-lg"><i class="fas fa-camera w-5"></i>證據保存</a>
      <a href="accounts.html" class="sidebar-item text-gray-600"><i class="fas fa-user-shield w-5"></i>帳號管理</a>
      <a href="settings.html" class="sidebar-item flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded-lg"><i class="fas fa-cog w-5"></i>設定</a>
    </nav>
  </aside>

  <!-- 主內容 -->
  <main class="flex-1 p-4 lg:p-6">
    <div class="flex items-center justify-between mb-6">
      <div><h1 class="text-2xl font-bold text-gray-900">建案與客房管理</h1><p class="text-sm text-gray-500 mt-1">管理所有建案和客房狀態</p></div>
      <button onclick="openProjectModal()" class="flex items-center gap-2 px-4 py-2 bg-primary text-white rounded-lg text-sm font-medium hover:bg-primary/90"><i class="fas fa-plus"></i>新增建案</button>
    </div>

    <!-- 建案卡片 -->
    <div id="projects-container" class="grid sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-3 mb-8">
      <!-- 由 JS 動態產生 -->
    </div>

    <!-- 客房列表 -->
    <div class="bg-white rounded-xl border border-gray-100 shadow-sm">
      <div class="p-4 border-b border-gray-100 flex items-center justify-between">
        <div><h2 class="font-semibold text-gray-900" id="rooms-title">客房列表</h2><p class="text-sm text-gray-500" id="rooms-subtitle">請選擇建案</p></div>
        <button onclick="openRoomModal()" class="flex items-center gap-2 px-3 py-1.5 bg-primary text-white rounded-lg text-sm font-medium hover:bg-primary/90"><i class="fas fa-plus"></i>新增客房</button>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead><tr class="bg-gray-50 text-left"><th class="px-4 py-3 text-xs font-medium text-gray-500 uppercase">房號</th><th class="px-4 py-3 text-xs font-medium text-gray-500 uppercase">類型</th><th class="px-4 py-3 text-xs font-medium text-gray-500 uppercase">坪數</th><th class="px-4 py-3 text-xs font-medium text-gray-500 uppercase">樓層</th><th class="px-4 py-3 text-xs font-medium text-gray-500 uppercase">狀態</th><th class="px-4 py-3 text-xs font-medium text-gray-500 uppercase">房客</th><th class="px-4 py-3 text-xs font-medium text-gray-500 uppercase">月租金</th><th class="px-4 py-3 text-xs font-medium text-gray-500 uppercase">操作</th></tr></thead>
          <tbody id="rooms-table-body" class="divide-y divide-gray-100">
            <tr><td colspan="8" class="px-4 py-8 text-center text-gray-400">請選擇建案以查看客房</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- 建案 Modal -->
<div id="project-modal" class="fixed inset-0 bg-black/30 z-50 hidden flex items-center justify-center p-4">
  <div class="bg-white rounded-xl shadow-xl w-full max-w-5xl max-h-[92vh] overflow-y-auto">
    <div class="p-4 border-b border-gray-100 flex items-center justify-between sticky top-0 bg-white z-10">
      <div><h3 class="font-semibold text-gray-900" id="project-modal-title">新增建案</h3><p class="text-xs text-gray-500 mt-1">建立建案基本資料、表務號碼、費用與門禁網路資訊</p></div>
      <button onclick="closeProjectModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
    </div>
    <form id="project-form" class="p-4 lg:p-6 space-y-6">
      <input type="hidden" id="project-id">
      <input type="hidden" id="project-map-url">
      <input type="hidden" id="project-map-static-url">
      <input type="hidden" id="project-map-image-url">
      <input type="hidden" id="project-exterior-url-1">
      <input type="hidden" id="project-exterior-url-2">
      <input type="hidden" id="project-exterior-preview-url-1">
      <input type="hidden" id="project-exterior-preview-url-2">
      <input type="hidden" id="project-exterior-default-url-1">
      <input type="hidden" id="project-exterior-default-url-2">

      <section class="space-y-4">
        <div class="flex items-center gap-2 text-sm font-semibold text-gray-900"><i class="fas fa-building text-primary"></i>建案基本資料</div>
        <div class="grid md:grid-cols-2 gap-4">
          <div><label class="block text-sm font-medium text-gray-700 mb-1">建案名稱</label><input type="text" id="project-name" required placeholder="例如：大安信義館" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary"></div>
          <div><label class="block text-sm font-medium text-gray-700 mb-1">類型</label><select id="project-type" required class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary"><option value="">請選擇類型</option><option value="Airbnb">Airbnb</option><option value="Booking">Booking</option><option value="長租">長租</option><option value="購置長租">購置長租</option><option value="長租代管">長租代管</option></select></div>
        </div>
        <div class="grid md:grid-cols-3 gap-4">
          <div class="md:col-span-2"><label class="block text-sm font-medium text-gray-700 mb-1">地址</label><input type="text" id="project-address" required placeholder="建案所在地址，系統會依地址產生地圖預覽" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary"></div>
          <div><label class="block text-sm font-medium text-gray-700 mb-1">間數 / 可出租房間數量</label><input type="number" id="project-rentable-rooms" min="0" step="1" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary"></div>
        </div>
      </section>

      <section class="space-y-4">
        <div class="flex items-center gap-2 text-sm font-semibold text-gray-900"><i class="fas fa-image text-primary"></i>建案照片</div>
        <div class="grid lg:grid-cols-3 gap-4">
          <div class="lg:col-span-1 border border-gray-100 rounded-xl overflow-hidden bg-gray-50">
            <div id="project-map-preview" class="h-44 flex items-center justify-center text-center text-gray-400 text-sm px-4"><div><i class="fas fa-map-location-dot text-3xl mb-2 text-primary/30"></i><p>輸入地址完成後，點下方按鈕取得地圖圖片</p></div></div>
            <div class="p-3 bg-white border-t border-gray-100 space-y-2"><p class="text-xs font-medium text-gray-700">系統地圖圖片 / 預覽</p><p class="text-[11px] text-gray-400">地圖改用較小範圍與高解析比例，讓附近街道名更清晰；不會在輸入過程中即時刷新。</p><button type="button" onclick="generateProjectMapPreview()" class="w-full px-3 py-2 bg-primary/10 text-primary rounded-lg text-xs font-medium hover:bg-primary/15"><i class="fas fa-map-location-dot mr-1"></i>取得清晰地圖圖片</button></div>
          </div>
          <div class="lg:col-span-2 grid md:grid-cols-2 gap-4">
            <div class="border border-dashed border-gray-200 rounded-xl p-3 bg-white">
              <label class="block text-sm font-medium text-gray-700 mb-2">建築物外觀照片 1</label>
              <div id="project-exterior-preview-1" class="h-36 rounded-lg bg-gray-50 flex items-center justify-center text-gray-400 text-sm mb-3"><span><i class="fas fa-camera mr-1"></i>尚未上傳</span></div>
              <input type="file" id="project-exterior-file-1" accept="image/*" class="hidden">
              <div class="grid grid-cols-2 gap-2">
                <button type="button" onclick="document.getElementById('project-exterior-file-1').click()" class="px-3 py-2 bg-primary/10 text-primary rounded-lg text-xs font-medium hover:bg-primary/15"><i class="fas fa-upload mr-1"></i>選擇檔案<br><span class="font-normal text-[11px]">管理者上傳</span></button>
                <button type="button" onclick="useDefaultExteriorPhoto(1)" class="px-3 py-2 bg-emerald-50 text-emerald-700 rounded-lg text-xs font-medium hover:bg-emerald-100"><i class="fas fa-wand-magic-sparkles mr-1"></i>使用預設<br><span class="font-normal text-[11px]">Google Place</span></button>
              </div>
            </div>
            <div class="border border-dashed border-gray-200 rounded-xl p-3 bg-white">
              <label class="block text-sm font-medium text-gray-700 mb-2">建築物外觀照片 2</label>
              <div id="project-exterior-preview-2" class="h-36 rounded-lg bg-gray-50 flex items-center justify-center text-gray-400 text-sm mb-3"><span><i class="fas fa-camera mr-1"></i>尚未上傳</span></div>
              <input type="file" id="project-exterior-file-2" accept="image/*" class="hidden">
              <div class="grid grid-cols-2 gap-2">
                <button type="button" onclick="document.getElementById('project-exterior-file-2').click()" class="px-3 py-2 bg-primary/10 text-primary rounded-lg text-xs font-medium hover:bg-primary/15"><i class="fas fa-upload mr-1"></i>選擇檔案<br><span class="font-normal text-[11px]">管理者上傳</span></button>
                <button type="button" onclick="useDefaultExteriorPhoto(2)" class="px-3 py-2 bg-emerald-50 text-emerald-700 rounded-lg text-xs font-medium hover:bg-emerald-100"><i class="fas fa-wand-magic-sparkles mr-1"></i>使用預設<br><span class="font-normal text-[11px]">Google Place</span></button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="space-y-4">
        <div class="flex items-center gap-2 text-sm font-semibold text-gray-900"><i class="fas fa-droplet text-primary"></i>水電瓦斯與固定費用</div>
        <div class="grid md:grid-cols-3 gap-4">
          <div><label class="block text-sm font-medium text-gray-700 mb-1">水號 / 自來水水號</label><input type="text" id="project-water-number" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary"></div>
          <div><label class="block text-sm font-medium text-gray-700 mb-1">電號 / 台電供電電號</label><input type="text" id="project-electric-number" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary"></div>
          <div><label class="block text-sm font-medium text-gray-700 mb-1">瓦斯 / 瓦斯號</label><input type="text" id="project-gas-number" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary"></div>
        </div>
        <div class="grid md:grid-cols-3 gap-4">
          <div><label class="block text-sm font-medium text-gray-700 mb-1">管理費 / 大樓管理費</label><input type="number" id="project-management-fee" min="0" step="1" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary"></div>
          <div><label class="block text-sm font-medium text-gray-700 mb-1">第四台 / 網路業者</label><input type="text" id="project-tv-provider" placeholder="例如：中華電信 / 凱擘" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary"></div>
          <div><label class="block text-sm font-medium text-gray-700 mb-1">第四台費用</label><input type="number" id="project-tv-fee" min="0" step="1" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary"></div>
        </div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">扣繳方式</label><input type="text" id="project-withholding-method" placeholder="例如：房東代扣、管理公司扣繳、無" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary"></div>
      </section>

      <section class="space-y-4">
        <div class="flex items-center gap-2 text-sm font-semibold text-gray-900"><i class="fas fa-wifi text-primary"></i>網路與門禁資訊</div>
        <div class="grid md:grid-cols-3 gap-4">
          <div><label class="block text-sm font-medium text-gray-700 mb-1">Wifi 名稱</label><input type="text" id="project-wifi-name" autocomplete="off" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary"></div>
          <div><label class="block text-sm font-medium text-gray-700 mb-1">Wifi 密碼</label><input type="text" id="project-wifi-password" autocomplete="off" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary"></div>
          <div><label class="block text-sm font-medium text-gray-700 mb-1">大門密碼</label><input type="text" id="project-door-password" autocomplete="off" placeholder="大樓大門或樓層大門密碼" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary"></div>
        </div>
      </section>

      <section class="space-y-4">
        <div class="flex items-center gap-2 text-sm font-semibold text-gray-900"><i class="fas fa-tree-city text-primary"></i>環境描述</div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">環境描述</label><textarea id="project-environment-description" rows="4" placeholder="例如：近捷運、生活機能、附近停車、垃圾集中區、採光、噪音、出入口環境等" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary"></textarea></div>
      </section>

      <div class="flex flex-col sm:flex-row gap-3 pt-2 sticky bottom-0 bg-white border-t border-gray-100 py-4"><button type="button" onclick="closeProjectModal()" class="sm:flex-1 px-4 py-2 border border-gray-200 text-gray-600 rounded-lg text-sm">取消</button><button type="submit" class="sm:flex-1 px-4 py-2 bg-primary text-white rounded-lg text-sm font-medium"><i class="fas fa-save mr-1"></i>儲存建案</button></div>
    </form>
  </div>
</div>

<!-- 客房 Modal -->
<div id="room-modal" class="fixed inset-0 bg-black/30 z-50 hidden flex items-center justify-center p-4">
  <div class="bg-white rounded-xl shadow-xl w-full max-w-md max-h-[90vh] overflow-y-auto">
    <div class="p-4 border-b border-gray-100 flex items-center justify-between"><h3 class="font-semibold text-gray-900" id="room-modal-title">新增客房</h3><button onclick="closeRoomModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button></div>
    <form id="room-form" class="p-4 space-y-4">
      <input type="hidden" id="room-id">
      <input type="hidden" id="room-project-id">
      <div><label class="block text-sm font-medium text-gray-700 mb-1">房號</label><input type="text" id="room-number" required class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary"></div>
      <div class="grid grid-cols-2 gap-4">
        <div><label class="block text-sm font-medium text-gray-700 mb-1">類型</label><select id="room-type" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary"><option value="套房">套房</option><option value="雅房">雅房</option><option value="整層">整層</option></select></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">坪數</label><input type="number" id="room-area" step="0.1" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary"></div>
      </div>
      <div class="grid grid-cols-2 gap-4">

function h(value) {
    return String(value ?? '').replace(/[&<>"']/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char]));
}

function getMapSearchUrl(address) {

function getMapEmbedUrl(address) {

}

function getStaticMapUrl(address) {
    const key = window.GOOGLE_MAPS_STATIC_API_KEY || '';
    if (!address || !key) return '';
    const q = encodeURIComponent(address);
    const styles = [
        'feature:poi|visibility:off',
        'feature:transit|visibility:simplified',
        'feature:road|element:labels|visibility:on'
    ].map(style => `style=${encodeURIComponent(style)}`).join('&');
    return `https://maps.googleapis.com/maps/api/staticmap?center=${q}&zoom=18&size=640x960&scale=2&maptype=roadmap&language=zh-TW&region=TW&markers=color:red%7C${q}&${styles}&key=${encodeURIComponent(key)}`;
}

function canvasToBlob(canvas, type = 'image/jpeg', quality = 0.82) {
    return new Promise(resolve => canvas.toBlob(resolve, type, quality));
}

async function resizeImageFile(file, maxWidth, maxHeight, quality = 0.82) {
    if (!file || !file.type || !file.type.startsWith('image/')) return file;
    const bitmap = await createImageBitmap(file);
    const ratio = Math.min(maxWidth / bitmap.width, maxHeight / bitmap.height, 1);
    const width = Math.max(1, Math.round(bitmap.width * ratio));
    const height = Math.max(1, Math.round(bitmap.height * ratio));
    const canvas = document.createElement('canvas');
    canvas.width = width;
    canvas.height = height;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(bitmap, 0, 0, width, height);
    const blob = await canvasToBlob(canvas, 'image/jpeg', quality);
    if (bitmap.close) bitmap.close();
    return blob || file;
}

async function cropImageToSize(file, targetWidth, targetHeight, quality = 0.84) {
    if (!file || !file.type || !file.type.startsWith('image/')) return file;
    const bitmap = await createImageBitmap(file);
    const sourceRatio = bitmap.width / bitmap.height;
    const targetRatio = targetWidth / targetHeight;
    let sx = 0, sy = 0, sw = bitmap.width, sh = bitmap.height;
    if (sourceRatio > targetRatio) {
        sw = Math.round(bitmap.height * targetRatio);
        sx = Math.round((bitmap.width - sw) / 2);
    } else {
        sh = Math.round(bitmap.width / targetRatio);
        sy = Math.round((bitmap.height - sh) / 2);
    }
    const canvas = document.createElement('canvas');
    canvas.width = targetWidth;
    canvas.height = targetHeight;
    canvas.getContext('2d').drawImage(bitmap, sx, sy, sw, sh, 0, 0, targetWidth, targetHeight);
    const blob = await canvasToBlob(canvas, 'image/jpeg', quality);
    if (bitmap.close) bitmap.close();
    return blob || file;
}

function getGooglePlacePhotoMediaUrl(photoName, maxWidthPx = 1200) {
    const key = window.GOOGLE_PLACES_API_KEY || '';
    if (!photoName || !key) return '';
    return `https://places.googleapis.com/v1/${photoName}/media?maxWidthPx=${maxWidthPx}&key=${encodeURIComponent(key)}`;
}

function buildGooglePlaceDefaultPhotoQueries(address, projectName = '') {
    const queries = [];
    const add = (query, sourceLabel) => {
        const normalized = String(query || '').trim();
        if (!normalized || queries.some(item => item.query === normalized)) return;
        queries.push({ query: normalized, sourceLabel });
    };
    add(address, '地址');
    add(`${address} 附近地標`, '附近地標');
    add(`${address} 街景`, '街景');
    add(`${address} 大樓`, '大樓名');
    add(`${address} 建築`, '大樓名');
    if (projectName) {
        add(`${projectName} ${address}`, '建案名稱');
        add(`${projectName} 大樓`, '大樓名');
    }
    return queries;
}

async function searchGooglePlacePhotosByQuery(query, key) {
    const response = await fetch('https://places.googleapis.com/v1/places:searchText', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-Goog-Api-Key': key,
            'X-Goog-FieldMask': 'places.id,places.displayName,places.formattedAddress,places.photos'
        },
        body: JSON.stringify({ textQuery: query, languageCode: 'zh-TW', regionCode: 'TW' })
    });
    if (!response.ok) throw new Error(`Google Places search failed: ${response.status}`);
    const data = await response.json();
    const places = (data.places || []).slice(0, 5);
    const photoNames = [];
    for (const place of places) {
        for (const photo of (place.photos || []).slice(0, 6)) {
            if (photo && photo.name && !photoNames.includes(photo.name)) photoNames.push(photo.name);
        }
    }
    return photoNames.map(photoName => getGooglePlacePhotoMediaUrl(photoName, 1200)).filter(Boolean);
}

async function fetchGooglePlacePhotoUrls(address, projectName = '') {
    const key = window.GOOGLE_PLACES_API_KEY || '';
    if (!address || !key) return { urls: [], sourceLabel: '' };
    const queries = buildGooglePlaceDefaultPhotoQueries(address, projectName);
    for (const item of queries) {
        try {
            const urls = await searchGooglePlacePhotosByQuery(item.query, key);
            if (urls.length) return { urls, sourceLabel: item.sourceLabel, query: item.query };
        } catch (e) {
            console.warn('[Projects] Google Place photo query failed:', item.query, e);
        }
    }
    return { urls: [], sourceLabel: '', query: '' };
}

async function uploadProjectMapImage(uid, projectId) {
    const staticUrl = document.getElementById('project-map-static-url').value;
    const existingUrl = document.getElementById('project-map-image-url').value;
    if (!staticUrl || existingUrl) return existingUrl || '';
    try {
        const response = await fetch(staticUrl, { mode: 'cors' });
        if (!response.ok) throw new Error(`Map image fetch failed: ${response.status}`);
        const blob = await response.blob();
        const storagePath = `users/${uid}/projects/${projectId}/map-${Date.now()}.jpg`;
        const ref = firebase.storage().ref(storagePath);
        await ref.put(blob, { contentType: blob.type || 'image/jpeg' });
        return await ref.getDownloadURL();
    } catch (e) {
        console.warn('[Projects] Map image upload fallback to static URL:', e);
        return '';
    }
}

async function uploadProjectExteriorPhoto(uid, projectId, index) {
    const input = document.getElementById(`project-exterior-file-${index}`);
    const existingFullUrl = document.getElementById(`project-exterior-url-${index}`).value || '';
    const existingPreviewUrl = document.getElementById(`project-exterior-preview-url-${index}`).value || existingFullUrl;
    const defaultUrl = document.getElementById(`project-exterior-default-url-${index}`).value || '';
    let sourceBlob = null;
    if (input && input.files && input.files[0]) {
        sourceBlob = input.files[0];
    } else if (defaultUrl) {
        try {
            const response = await fetch(defaultUrl, { mode: 'cors' });
            if (!response.ok) throw new Error(`Default photo fetch failed: ${response.status}`);
            sourceBlob = await response.blob();
        } catch (e) {
            console.warn('[Projects] Default photo crop/upload fallback to direct Google URL:', e);
            return { fullUrl: existingFullUrl || defaultUrl, previewUrl: existingPreviewUrl || defaultUrl };
        }
    }
    if (!sourceBlob) return { fullUrl: existingFullUrl, previewUrl: existingPreviewUrl };
    const stamp = Date.now();
    const largeBlob = await cropImageToSize(sourceBlob, 1000, 1500, 0.88);
    const previewBlob = await cropImageToSize(sourceBlob, 360, 540, 0.76);
    const fullUrl = await uploadImageBlob(`users/${uid}/projects/${projectId}/exterior-${index}-${stamp}-large.jpg`, largeBlob, 'image/jpeg');
    const previewUrl = await uploadImageBlob(`users/${uid}/projects/${projectId}/exterior-${index}-${stamp}-preview.jpg`, previewBlob, 'image/jpeg');
    return { fullUrl, previewUrl };
}

// 載入建案
async function loadProjects() {
    const uid = getCurrentUserUid();
    if (!uid) return;
    try {
        const snapshot = await db.collection('users').doc(uid).collection('projects').get();
        projectsData = await Promise.all(snapshot.docs.map(async (doc) => {
            const project = { id: doc.id, ...doc.data() };
            const roomsSnapshot = await db.collection('users').doc(uid).collection('projects').doc(doc.id).collection('rooms').get();
            const rooms = roomsSnapshot.docs.map(roomDoc => ({ id: roomDoc.id, ...roomDoc.data() }));
            project.totalRooms = rooms.length;
            project.occupied = rooms.filter(room => room.status === '已出租' || !!room.tenant).length;
            project.vacant = rooms.filter(room => room.status === '空置' || !room.tenant).length;
            return project;
        }));
        renderProjects();
        if (projectsData.length === 0) {
            document.getElementById('projects-container').innerHTML = '<div class="col-span-full bg-white rounded-xl border border-gray-100 p-8 text-center text-gray-400">尚未新增建案，請點右上角「新增建案」開始。</div>';
        }
    } catch (e) {
        console.error('Error loading projects:', e);
        showToast('載入失敗', 'error');
    }
}

    if (!address) return [];

    return [
        { type: 'google', label: 'Google 相片 1', url: getMapSearchUrl(address), icon: 'fa-images' },
        { type: 'google', label: 'Google 相片 2', url: `https://www.google.com/maps/search/${encodeURIComponent(address + ' 街景')}`, icon: 'fa-street-view' }
    ];
}

function getProjectMediaItems(project) {
    const address = project.address || '';
    const items = [{ type: 'map', label: '地圖', address, url: project.mapUrl || getMapSearchUrl(address) }];
    const previewUrls = project.exteriorPhotoPreviewUrls || [];
    const uploaded = (project.exteriorPhotoUrls || []).filter(Boolean).map((url, index) => ({ type: 'image', label: `外觀 ${index + 1}`, url, previewUrl: previewUrls[index] || url }));
    if (uploaded.length) return items.concat(uploaded);
    return items.concat(getGoogleFallbackPhotos(address));
}

function renderProjectMedia(project) {
    const items = getProjectMediaItems(project);
    const current = Math.min(projectCardMediaIndex[project.id] || 0, items.length - 1);
    const item = items[current] || items[0];
    let body = '';
    if (item.type === 'image') {
        body = `<img src="${h(item.previewUrl || item.url)}" alt="${h(project.name)} ${h(item.label)}" class="w-full h-full" loading="lazy" decoding="async">`;
    } else if (item.type === 'map') {
        const mapImage = project.mapImageUrl || project.mapStaticUrl || '';
        body = mapImage ? `<img src="${h(mapImage)}" alt="${h(project.name)} 地圖" class="w-full h-full">` : '<div class="h-full flex items-center justify-center text-gray-400 text-xs text-center p-3"><div><i class="fas fa-map-location-dot text-2xl mb-1 text-primary/30"></i><br>尚未取得地圖圖片</div></div>';
    } else {
        body = `<a href="${h(item.url)}" target="_blank" onclick="event.stopPropagation()" class="h-full flex flex-col items-center justify-center text-center text-gray-500 bg-gradient-to-br from-slate-50 to-blue-50 p-4"><i class="fas ${item.icon} text-3xl text-primary/40 mb-2"></i><span class="text-xs font-medium text-primary">${h(item.label)}</span><span class="text-[11px] mt-1">開啟 Google 地圖查看</span></a>`;
    }
    const nav = items.length > 1 ? `
        <button type="button" onclick="changeProjectMedia('${project.id}', -1); event.stopPropagation();" class="project-media-nav absolute left-2 top-1/2 -translate-y-1/2 w-8 h-8 rounded-full text-white text-xs flex items-center justify-center"><i class="fas fa-chevron-left"></i></button>
        <button type="button" onclick="changeProjectMedia('${project.id}', 1); event.stopPropagation();" class="project-media-nav absolute right-2 top-1/2 -translate-y-1/2 w-8 h-8 rounded-full text-white text-xs flex items-center justify-center"><i class="fas fa-chevron-right"></i></button>
        <div class="absolute bottom-2 left-0 right-0 flex justify-center gap-1">${items.map((_, i) => `<span class="w-1.5 h-1.5 rounded-full ${i === current ? 'bg-white' : 'bg-white/45'}"></span>`).join('')}</div>` : '';
    return `<div class="project-media-frame relative bg-slate-100 overflow-hidden">${body}${nav}</div>`;
}

function changeProjectMedia(projectId, delta) {
    const project = projectsData.find(p => p.id === projectId);
    if (!project) return;
    const count = getProjectMediaItems(project).length;
    projectCardMediaIndex[projectId] = ((projectCardMediaIndex[projectId] || 0) + delta + count) % count;
    renderProjects();
}

function renderProjects() {
    const container = document.getElementById('projects-container');
    container.innerHTML = projectsData.map(p => {
        const actualTotal = p.totalRooms || 0;
        const total = p.rentableRooms || actualTotal;
        const mapLink = p.mapUrl || getMapSearchUrl(p.address || '');
        return `
        <article class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden hover:shadow-md transition max-w-[270px] w-full mx-auto">
            ${renderProjectMedia(p)}
            <div class="p-3 space-y-2">
                <h3 class="font-semibold text-gray-900 text-sm leading-5 line-clamp-2">${h(p.name || '未命名建案')}</h3>
                <div class="text-xs leading-5">
                    <span class="project-card-address">${h(p.address || '未填地址')}</span>
                    ${mapLink ? `<a href="${mapLink}" target="_blank" class="ml-1 text-primary hover:underline">地圖連結</a>` : ''}
                </div>
                <div class="flex items-center justify-between gap-2">
                    <span class="text-[11px] px-2 py-1 rounded-full bg-primary/10 text-primary font-medium">${h(p.type || '未分類')}</span>
                    <span class="text-xs text-gray-600"><i class="fas fa-door-open text-gray-300 mr-1"></i>總客房 ${total} 間</span>
                </div>
                <div class="grid grid-cols-2 gap-2 pt-1">
                    <a href="room-info.html?projectId=${encodeURIComponent(p.id)}" class="text-center px-2 py-2 bg-primary text-white rounded-lg text-xs font-medium hover:bg-primary/90"><i class="fas fa-list mr-1"></i>客房資訊</a>
                    <button type="button" onclick="openProjectModal('${p.id}')" class="px-2 py-2 border border-gray-200 text-primary rounded-lg text-xs font-medium hover:bg-primary/5"><i class="fas fa-pen mr-1"></i>編輯資料</button>
                </div>
            </div>
        </article>`;
    }).join('');
}

async function selectProject(projectId) {
    selectedProjectId = projectId;
    const project = projectsData.find(p => p.id === projectId);
    document.getElementById('rooms-title').textContent = project ? project.name + ' — 客房列表' : '客房列表';
    document.getElementById('rooms-subtitle').textContent = '共 ' + (project ? project.totalRooms || 0 : 0) + ' 間客房';
    document.getElementById('room-project-id').value = projectId;
    
    const uid = getCurrentUserUid();
    if (!uid) return;
    try {
        const snapshot = await db.collection('users').doc(uid).collection('projects').doc(projectId).collection('rooms').get();
        roomsData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderRooms();
    } catch (e) {
        console.error('Error loading rooms:', e);
    }
}

function renderRooms() {
    const tbody = document.getElementById('rooms-table-body');
    if (roomsData.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="px-4 py-8 text-center text-gray-400">尚未新增客房</td></tr>';
        return;
    }
    tbody.innerHTML = roomsData.map(r => {
        const statusClass = r.status === '已出租' ? 'status-occupied' : r.status === '空置' ? 'status-vacant' : r.status === '維修中' ? 'status-repair' : 'status-cleaning';
        return `<tr class="hover:bg-gray-50">
            <td class="px-4 py-3 text-sm font-medium text-gray-900">${r.number}</td>
            <td class="px-4 py-3 text-sm text-gray-600">${r.type}</td>
            <td class="px-4 py-3 text-sm text-gray-600">${r.area} 坪</td>
            <td class="px-4 py-3 text-sm text-gray-600">${r.floor}F</td>
            <td class="px-4 py-3"><span class="inline-flex items-center gap-1 text-xs ${statusClass} px-2 py-1 rounded-full"><span class="w-1.5 h-1.5 rounded-full" style="background:currentColor"></span>${r.status}</span></td>
            <td class="px-4 py-3 text-sm text-gray-600">${r.tenant || '—'}</td>
            <td class="px-4 py-3 text-sm font-medium text-gray-900">${formatCurrency(r.rent)}</td>
            <td class="px-4 py-3"><a href="room-info.html?projectId=${encodeURIComponent(selectedProjectId)}&roomId=${encodeURIComponent(r.id)}" class="text-sm text-primary hover:underline">查看</a></td>
        </tr>`;
    }).join('');
}

function openProjectModal(projectId = '') {
    const project = projectId ? projectsData.find(p => p.id === projectId) : null;
    document.getElementById('project-modal').classList.remove('hidden');
    document.getElementById('project-modal-title').textContent = project ? '編輯建案資料' : '新增建案';
    document.getElementById('project-form').reset();
    fillProjectForm(project || null);
}
function closeProjectModal() { document.getElementById('project-modal').classList.add('hidden'); }
function openRoomModal() { if (!selectedProjectId) { showToast('請先選擇建案', 'error'); return; } document.getElementById('room-modal').classList.remove('hidden'); document.getElementById('room-modal-title').textContent = '新增客房'; document.getElementById('room-form').reset(); document.getElementById('room-id').value = ''; document.getElementById('room-project-id').value = selectedProjectId; }
function closeRoomModal() { document.getElementById('room-modal').classList.add('hidden'); }

document.getElementById('project-address').addEventListener('change', () => { document.getElementById('project-map-image-url').value = ''; renderMapPlaceholder('地址已更新，請點「取得地圖圖片」重新產生'); });
[1, 2].forEach(index => {
    document.getElementById(`project-exterior-file-${index}`).addEventListener('change', (e) => {
        const file = e.target.files && e.target.files[0];
        if (!file) return renderImagePreview(index, document.getElementById(`project-exterior-preview-url-${index}`).value || document.getElementById(`project-exterior-url-${index}`).value);
        document.getElementById(`project-exterior-default-url-${index}`).value = '';
        const reader = new FileReader();
        reader.onload = () => renderImagePreview(index, reader.result);
        reader.readAsDataURL(file);
    });
});


function roomSortValue(room) {
    const raw = String(room.number || room.roomNumber || room.name || '').trim();
    const match = raw.match(/\d+/);
    return match ? parseInt(match[0], 10) : Number.MAX_SAFE_INTEGER;
}

async function syncProjectRoomsByRentableCount(uid, projectId, targetCount) {
    const count = Math.max(0, parseInt(targetCount, 10) || 0);
    if (!uid || !projectId || !count) return;
    const roomsRef = db.collection('users').doc(uid).collection('projects').doc(projectId).collection('rooms');
    const snapshot = await roomsRef.get();
    const existingRooms = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a,b) => roomSortValue(a) - roomSortValue(b));
    const batch = db.batch();
    let creates = 0;
    for (let i = existingRooms.length + 1; i <= count; i++) {
        const padded = String(i).padStart(2, '0');
        const ref = roomsRef.doc(`room-${padded}`);
        batch.set(ref, {
            number: `${i}`,
            type: '',
            area: 0,
            floor: 0,
            rent: 0,
            acUnits: 1,
            amenities: [],
            internetTv: '',
            otherInfo: '',
            status: '空置',
            tenant: '',
            autoCreated: true,
            sortOrder: i,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
        creates++;
    }
    if (creates) await batch.commit();
    await db.collection('users').doc(uid).collection('projects').doc(projectId).set({ totalRooms: Math.max(existingRooms.length + creates, existingRooms.length), updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
}

document.getElementById('project-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const uid = getCurrentUserUid();
    if (!uid) return;
    const id = document.getElementById('project-id').value;
    let projectId = id;
    const data = getProjectFormData();
    data.updatedAt = firebase.firestore.FieldValue.serverTimestamp();
    try {
        showLoading();
        if (projectId) {
            await db.collection('users').doc(uid).collection('projects').doc(projectId).set(data, { merge: true });
        } else {
            data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
            const ref = await db.collection('users').doc(uid).collection('projects').add(data);
            projectId = ref.id;
        }
        await syncProjectRoomsByRentableCount(uid, projectId, data.rentableRooms);
        const mapImageUrl = await uploadProjectMapImage(uid, projectId);
        const photo1 = await uploadProjectExteriorPhoto(uid, projectId, 1);
        const photo2 = await uploadProjectExteriorPhoto(uid, projectId, 2);
        const exteriorPhotoUrls = [photo1.fullUrl, photo2.fullUrl].filter(Boolean);
        const exteriorPhotoPreviewUrls = [photo1.previewUrl, photo2.previewUrl].filter(Boolean);
        const mediaUpdate = { exteriorPhotoUrls, exteriorPhotoPreviewUrls, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
        if (mapImageUrl) mediaUpdate.mapImageUrl = mapImageUrl;
        await db.collection('users').doc(uid).collection('projects').doc(projectId).set(mediaUpdate, { merge: true });
        hideLoading();
        showToast(id ? '建案已更新' : '建案已新增');
        closeProjectModal();
        await loadProjects();
    } catch (e) {
        hideLoading();
        console.error('Error saving project:', e);
        showToast('儲存失敗，請確認欄位或照片上傳權限', 'error');
    }
});

document.getElementById('room-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const uid = getCurrentUserUid();
    if (!uid) return;
    const amenities = Array.from(document.querySelectorAll('.room-amenity:checked')).map(cb => cb.value);
    const data = { number: document.getElementById('room-number').value, type: document.getElementById('room-type').value, area: parseFloat(document.getElementById('room-area').value) || 0, floor: parseInt(document.getElementById('room-floor').value) || 0, rent: parseInt(document.getElementById('room-rent').value) || 0, acUnits: parseInt(document.getElementById('room-ac').value) || 1, amenities, status: '空置', tenant: '' };
    const id = document.getElementById('room-id').value;
    const projectId = document.getElementById('room-project-id').value;
    try {
        if (id) { await db.collection('users').doc(uid).collection('projects').doc(projectId).collection('rooms').doc(id).update(data); showToast('客房已更新'); }
        else { await db.collection('users').doc(uid).collection('projects').doc(projectId).collection('rooms').add(data); showToast('客房已新增'); }
        closeRoomModal(); await loadProjects(); selectProject(projectId);
    } catch (e) { showToast('儲存失敗', 'error'); }
});

document.addEventListener('DOMContentLoaded', () => onAuthReady(user => { if (user) loadProjects(); }));
</script>
