<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RentalHub — 租金管理</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{primary:'#2563EB',secondary:'#10B981',bg:'#F8FAFC'}}}}</script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="js/app.js"></script>
<style>.sidebar-item.active{background:#2563EB15;color:#2563EB;font-weight:600}</style>
</head>
<body class="bg-bg min-h-screen">
<nav class="bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between sticky top-0 z-50">
  <div class="flex items-center gap-4"><button class="lg:hidden text-gray-600" onclick="document.getElementById('sidebar').classList.toggle('hidden')"><i class="fas fa-bars text-xl"></i></button><div class="flex items-center gap-2"><div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center"><span class="text-white font-bold text-sm">R</span></div><span class="font-bold text-lg text-gray-900">RentalHub</span></div></div>
  <div class="flex items-center gap-3"><button class="relative p-2 text-gray-500 hover:bg-gray-100 rounded-lg"><i class="fas fa-bell"></i><span class="absolute top-1 right-1 w-4 h-4 bg-red-500 text-white text-xs rounded-full flex items-center justify-center">3</span></button><div class="flex items-center gap-2 cursor-pointer" onclick="handleSignOut()"><div class="w-8 h-8 bg-primary/10 rounded-full flex items-center justify-center"><i class="fas fa-user text-primary text-sm"></i></div><span class="text-sm text-gray-700 hidden sm:inline">登出</span></div></div>
</nav>
<div class="flex">
  <aside id="sidebar" class="hidden lg:block w-56 bg-white border-r border-gray-200 min-h-[calc(100vh-57px)] p-3 fixed lg:sticky top-[57px] z-40 overflow-y-auto">
    <nav class="space-y-1 text-sm">
      <a href="dashboard.html" class="sidebar-item flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded-lg"><i class="fas fa-home w-5"></i>主控台</a>
      <a href="projects.html" class="sidebar-item flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded-lg"><i class="fas fa-building w-5"></i>建案管理</a>
      <a href="tenants.html" class="sidebar-item flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded-lg"><i class="fas fa-users w-5"></i>房客管理</a>
      <a href="contracts.html" class="sidebar-item flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded-lg"><i class="fas fa-file-contract w-5"></i>合約管理</a>
      <a href="rent.html" class="sidebar-item active flex items-center gap-3 px-3 py-2 rounded-lg"><i class="fas fa-money-bill w-5"></i>租金管理</a>
      <a href="billing.html" class="sidebar-item flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded-lg"><i class="fas fa-calculator w-5"></i>費用計算</a>
      <a href="maintenance.html" class="sidebar-item flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded-lg"><i class="fas fa-tools w-5"></i>修繕派工</a>
      <a href="evidence.html" class="sidebar-item flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded-lg"><i class="fas fa-camera w-5"></i>證據保存</a>
      <a href="settings.html" class="sidebar-item flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded-lg"><i class="fas fa-cog w-5"></i>設定</a>
    </nav>
  </aside>
  <main class="flex-1 p-4 lg:p-6">
    <div class="flex items-center justify-between mb-6">
      <div><h1 class="text-2xl font-bold text-gray-900">租金管理</h1><p class="text-sm text-gray-500 mt-1">紀錄收款、查看逾期、產生報表</p></div>
      <button onclick="openRentModal()" class="flex items-center gap-2 px-4 py-2 bg-primary text-white rounded-lg text-sm font-medium"><i class="fas fa-plus"></i>紀錄收款</button>
    </div>
    <!-- 統計 -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
      <div class="bg-white rounded-xl p-4 border border-gray-100 shadow-sm"><p class="text-sm text-gray-500 mb-1">本月應收</p><p class="text-2xl font-bold text-gray-900" id="rent-due">NT$ 0</p></div>
      <div class="bg-white rounded-xl p-4 border border-gray-100 shadow-sm"><p class="text-sm text-gray-500 mb-1">本月已收</p><p class="text-2xl font-bold text-secondary" id="rent-paid">NT$ 0</p></div>
      <div class="bg-white rounded-xl p-4 border border-gray-100 shadow-sm"><p class="text-sm text-gray-500 mb-1">逾期未收</p><p class="text-2xl font-bold text-red-500" id="rent-overdue">NT$ 0</p></div>
      <div class="bg-white rounded-xl p-4 border border-gray-100 shadow-sm"><p class="text-sm text-gray-500 mb-1">收繳率</p><p class="text-2xl font-bold text-primary" id="rent-rate">0%</p></div>
    </div>
    <!-- 月份選擇 -->
    <div class="flex items-center gap-3 mb-4">
      <button onclick="changeMonth(-1)" class="p-2 bg-white border border-gray-200 rounded-lg hover:bg-gray-50"><i class="fas fa-chevron-left"></i></button>
      <span class="font-medium text-gray-900" id="current-month-label">2026年5月</span>
      <button onclick="changeMonth(1)" class="p-2 bg-white border border-gray-200 rounded-lg hover:bg-gray-50"><i class="fas fa-chevron-right"></i></button>
    </div>
    <!-- 租金列表 -->
    <div class="bg-white rounded-xl border border-gray-100 shadow-sm">
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead><tr class="bg-gray-50 text-left"><th class="px-4 py-3 text-xs font-medium text-gray-500 uppercase">房客</th><th class="px-4 py-3 text-xs font-medium text-gray-500 uppercase">客房</th><th class="px-4 py-3 text-xs font-medium text-gray-500 uppercase">應收</th><th class="px-4 py-3 text-xs font-medium text-gray-500 uppercase">實收</th><th class="px-4 py-3 text-xs font-medium text-gray-500 uppercase">收款日期</th><th class="px-4 py-3 text-xs font-medium text-gray-500 uppercase">方式</th><th class="px-4 py-3 text-xs font-medium text-gray-500 uppercase">狀態</th><th class="px-4 py-3 text-xs font-medium text-gray-500 uppercase">操作</th></tr></thead>
          <tbody id="rent-table-body" class="divide-y divide-gray-100"><tr><td colspan="8" class="px-4 py-8 text-center text-gray-400">載入中...</td></tr></tbody>
        </table>
      </div>
    </div>
  </main>
</div>
<!-- 收款 Modal -->
<div id="rent-modal" class="fixed inset-0 bg-black/30 z-50 hidden flex items-center justify-center p-4">
  <div class="bg-white rounded-xl shadow-xl w-full max-w-md">
    <div class="p-4 border-b border-gray-100 flex items-center justify-between"><h3 class="font-semibold text-gray-900">紀錄收款</h3><button onclick="closeRentModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button></div>
    <form id="rent-form" class="p-4 space-y-4">
      <div><label class="block text-sm font-medium text-gray-700 mb-1">房客 *</label><select id="rent-tenant" required class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm"><option value="">選擇房客</option></select></div>
      <div class="grid grid-cols-2 gap-4">
        <div><label class="block text-sm font-medium text-gray-700 mb-1">月份</label><input type="month" id="rent-month" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm"></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">金額 (NT$)</label><input type="number" id="rent-amount" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm"></div>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div><label class="block text-sm font-medium text-gray-700 mb-1">收款日期</label><input type="date" id="rent-date" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm"></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">收款方式</label><select id="rent-method" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm"><option value="轉帳">轉帳</option><option value="現金">現金</option><option value="混和">混和</option></select></div>
      </div>
      <div><label class="block text-sm font-medium text-gray-700 mb-1">備註</label><input type="text" id="rent-note" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm"></div>
      <div class="flex gap-3 pt-2"><button type="button" onclick="closeRentModal()" class="flex-1 px-4 py-2 border border-gray-200 text-gray-600 rounded-lg text-sm">取消</button><button type="submit" class="flex-1 px-4 py-2 bg-primary text-white rounded-lg text-sm font-medium">儲存</button></div>
    </form>
  </div>
</div>
<script>
let rentRecords = [], tenantsData = [];
let currentYear = 2026, currentMonth = 5;
async function loadRentData() {
    const uid = getCurrentUserUid(); if (!uid) return;
    try {
        const [rSnap, tSnap] = await Promise.all([
            db.collection('users').doc(uid).collection('rentRecords').get(),
            db.collection('users').doc(uid).collection('tenants').get()
        ]);
        rentRecords = rSnap.docs.map(d => ({ id: d.id, ...d.data() }));
        tenantsData = tSnap.docs.map(d => ({ id: d.id, ...d.data() }));
        if (rentRecords.length === 0) { await seedRentData(); return; }
        renderRentTable();
    } catch (e) { console.error(e); }
}
async function seedRentData() {
    const uid = getCurrentUserUid();
    const records = [
        { tenantName: '王小明', room: 'A1', year: 2026, month: 5, amount: 12000, paid: 12000, date: '2026-05-01', method: '轉帳', status: '已繳', note: '' },
        { tenantName: '李小華', room: 'A2', year: 2026, month: 5, amount: 10000, paid: 0, date: '', method: '', status: '逾期', note: '逾期5天' },
        { tenantName: '張小美', room: 'A3', year: 2026, month: 5, amount: 6000, paid: 6000, date: '2026-05-03', method: '轉帳', status: '已繳', note: '' },
        { tenantName: '陳小龍', room: 'A5', year: 2026, month: 5, amount: 25000, paid: 25000, date: '2026-05-01', method: '轉帳', status: '已繳', note: '' },
        { tenantName: '林小婷', room: 'B1', year: 2026, month: 5, amount: 11000, paid: 11000, date: '2026-05-02', method: '轉帳', status: '已繳', note: '' },
        { tenantName: '黃小強', room: 'B2', year: 2026, month: 5, amount: 11000, paid: 11000, date: '2026-05-01', method: '現金', status: '已繳', note: '' },
        { tenantName: '吳小琳', room: 'C1', year: 2026, month: 5, amount: 13000, paid: 13000, date: '2026-05-02', method: '轉帳', status: '已繳', note: '' },
        { tenantName: '鄭小偉', room: 'C2', year: 2026, month: 5, amount: 12000, paid: 12000, date: '2026-05-01', method: '轉帳', status: '已繳', note: '' },
        { tenantName: '謝小琪', room: 'C3', year: 2026, month: 5, amount: 6500, paid: 0, date: '', method: '', status: '逾期', note: '逾期3天' },
        { tenantName: '楊小豪', room: 'C4', year: 2026, month: 5, amount: 6500, paid: 6500, date: '2026-05-03', method: '轉帳', status: '已繳', note: '' }
    ];
    for (const r of records) { await db.collection('users').doc(uid).collection('rentRecords').add(r); }
    showToast('已建立測試租金資料', 'success');
    loadRentData();
}
function renderRentTable() {
    const filtered = rentRecords.filter(r => r.year === currentYear && r.month === currentMonth);
    const tbody = document.getElementById('rent-table-body');
    if (filtered.length === 0) { tbody.innerHTML = '<tr><td colspan="8" class="px-4 py-8 text-center text-gray-400">本月無租金紀錄</td></tr>'; }
    else {
        tbody.innerHTML = filtered.map(r => {
            const statusColor = r.status === '已繳' ? 'bg-secondary/10 text-secondary' : 'bg-red-100 text-red-600';
            return `<tr class="hover:bg-gray-50">
                <td class="px-4 py-3 text-sm font-medium text-gray-900">${r.tenantName}</td>
                <td class="px-4 py-3 text-sm text-gray-600">${r.room}</td>
                <td class="px-4 py-3 text-sm font-medium text-gray-900">${formatCurrency(r.amount)}</td>
                <td class="px-4 py-3 text-sm ${r.paid > 0 ? 'text-secondary' : 'text-red-500'}">${formatCurrency(r.paid)}</td>
                <td class="px-4 py-3 text-sm text-gray-600">${r.date || '—'}</td>
                <td class="px-4 py-3 text-sm text-gray-600">${r.method || '—'}</td>
                <td class="px-4 py-3"><span class="text-xs ${statusColor} px-2 py-1 rounded-full">${r.status}</span></td>
                <td class="px-4 py-3"><button onclick="markPaid('${r.id}')" class="text-sm text-secondary hover:underline">標記已繳</button></td>
            </tr>`;
        }).join('');
    }
    // 統計
    const due = filtered.reduce((s, r) => s + (r.amount || 0), 0);
    const paid = filtered.reduce((s, r) => s + (r.paid || 0), 0);
    const overdue = filtered.filter(r => r.status === '逾期').reduce((s, r) => s + (r.amount - r.paid || 0), 0);
    document.getElementById('rent-due').textContent = formatCurrency(due);
    document.getElementById('rent-paid').textContent = formatCurrency(paid);
    document.getElementById('rent-overdue').textContent = formatCurrency(overdue);
    document.getElementById('rent-rate').textContent = due > 0 ? Math.round(paid / due * 100) + '%' : '0%';
    document.getElementById('current-month-label').textContent = `${currentYear}年${currentMonth}月`;
}
function changeMonth(delta) {
    currentMonth += delta;
    if (currentMonth > 12) { currentMonth = 1; currentYear++; }
    if (currentMonth < 1) { currentMonth = 12; currentYear--; }
    renderRentTable();
}
function openRentModal() {
    document.getElementById('rent-modal').classList.remove('hidden');
    document.getElementById('rent-tenant').innerHTML = '<option value="">選擇房客</option>' + tenantsData.map(t => `<option value="${t.id}" data-room="${t.room || ''}">${t.name} (${t.room || ''})</option>`).join('');
    document.getElementById('rent-month').value = `${currentYear}-${String(currentMonth).padStart(2, '0')}`;
    document.getElementById('rent-date').value = new Date().toISOString().split('T')[0];
}
function closeRentModal() { document.getElementById('rent-modal').classList.add('hidden'); }
async function markPaid(id) {
    const uid = getCurrentUserUid(); if (!uid) return;
    const record = rentRecords.find(r => r.id === id);
    if (!record) return;
    try {
        await db.collection('users').doc(uid).collection('rentRecords').doc(id).update({ paid: record.amount, status: '已繳', date: new Date().toISOString().split('T')[0], method: record.method || '轉帳' });
        showToast('已標記為已繳');
        loadRentData();
    } catch (e) { showToast('更新失敗', 'error'); }
}
document.getElementById('rent-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const uid = getCurrentUserUid(); if (!uid) return;
    const tenantSelect = document.getElementById('rent-tenant');
    const selected = tenantSelect.options[tenantSelect.selectedIndex];
    const [y, m] = document.getElementById('rent-month').value.split('-').map(Number);
    const data = { tenantName: selected?.text?.split(' (')[0] || '', room: selected?.dataset?.room || '', year: y, month: m, amount: parseInt(document.getElementById('rent-amount').value) || 0, paid: parseInt(document.getElementById('rent-amount').value) || 0, date: document.getElementById('rent-date').value, method: document.getElementById('rent-method').value, status: '已繳', note: document.getElementById('rent-note').value };
    try { await db.collection('users').doc(uid).collection('rentRecords').add(data); showToast('收款紀錄已新增'); closeRentModal(); loadRentData(); } catch (e) { showToast('儲存失敗', 'error'); }
});
document.addEventListener('DOMContentLoaded', loadRentData);
</script>
</body>
</html>
