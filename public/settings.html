<script>
// ============================================================
// Settings Page Logic
// ============================================================

const USER_DATA_COLLECTIONS = [
  'settings',
  'projects',
  'tenants',
  'contracts',
  'rentRecords',
  'utilityBills',
  'maintenanceTasks',
  'evidenceFiles',
  'cleaningSchedules',
  'messageTests'
];

const COLLECTION_SUBCOLLECTIONS = {
  projects: ['rooms']
};

function delay(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function escapeCSVValue(val) {
  if (val === null || val === undefined) return '';
  const str = String(val);
  if (str.includes(',') || str.includes('"') || str.includes('\n')) {
    return '"' + str.replace(/"/g, '""') + '"';
  }
  return str;
}

// 匯出資料為 CSV
async function exportData() {
  const uid = getCurrentUserUid();
  if (!uid) {
    showToast('使用者未登入', 'error');
    return;
  }

  showLoading();
  try {
    // 目前匯出租金紀錄，後續可擴充多集合備份。
    const rentRecords = await getRentRecords();

    if (rentRecords.length === 0) {
      showToast('沒有可匯出的資料', 'info');
      return;
    }

    const allKeys = new Set();
    rentRecords.forEach(record => {
      Object.keys(record).forEach(key => {
        if (key !== 'id') allKeys.add(key);
      });
    });

    const preferredOrder = ['year', 'month', 'tenantName', 'roomNumber', 'rentAmount', 'elecFee', 'waterFee', 'gasFee', 'tvFee', 'wifiFee', 'totalAmount', 'paid', 'paidDate', 'note'];
    const columns = [];
    preferredOrder.forEach(k => { if (allKeys.has(k)) columns.push(k); });
    allKeys.forEach(k => { if (!columns.includes(k)) columns.push(k); });

    const header = columns.join(',');
    const rows = rentRecords.map(record => columns.map(col => escapeCSVValue(record[col])).join(','));
    const csvContent = '\uFEFF' + [header, ...rows].join('\n');

    const today = new Date();
    const dateStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
    const filename = `rent-records-${dateStr}.csv`;

    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    link.remove();
    URL.revokeObjectURL(link.href);

    showToast(`已匯出 ${rentRecords.length} 筆資料`, 'success');
  } catch (error) {
    console.error('匯出失敗:', error);
    showToast('匯出失敗: ' + error.message, 'error');
  } finally {
    hideLoading();
  }
}

async function deleteQueryBatch(query, batchSize = 450) {
  const snapshot = await query.get();
  if (snapshot.empty) return 0;

  const batch = db.batch();
  snapshot.docs.forEach(doc => batch.delete(doc.ref));
  await batch.commit();

  if (snapshot.size >= batchSize) {
    await delay(0);
    return snapshot.size + await deleteQueryBatch(query, batchSize);
  }
  return snapshot.size;
}

async function deleteCollectionRef(collectionRef, batchSize = 450) {
  return await deleteQueryBatch(collectionRef.limit(batchSize), batchSize);
}

async function deleteProjectRooms(uid, projectDoc) {
  const roomsRef = db.collection('users').doc(uid).collection('projects').doc(projectDoc.id).collection('rooms');
  return await deleteCollectionRef(roomsRef);
}

async function deleteUserCollection(uid, collectionName) {
  const collectionRef = db.collection('users').doc(uid).collection(collectionName);
  const subcollections = COLLECTION_SUBCOLLECTIONS[collectionName] || [];

  if (subcollections.length) {
    const docsSnapshot = await collectionRef.get();
    for (const docSnap of docsSnapshot.docs) {
      for (const sub of subcollections) {
        if (collectionName === 'projects' && sub === 'rooms') {
          await deleteProjectRooms(uid, docSnap);
        }
      }
    }
  }

  return await deleteCollectionRef(collectionRef);
}

function removeLocalAppStorage() {
  const keepKeys = new Set(['tmh2-session']);
  try {
    for (let i = localStorage.length - 1; i >= 0; i--) {
      const key = localStorage.key(i);
      if (!key || keepKeys.has(key)) continue;
      // Firebase Auth session is managed by IndexedDB; keep explicit app login marker so user stays on the page until reload.
      if (key.startsWith('firebase:authUser:')) continue;
      localStorage.removeItem(key);
    }
  } catch (e) {
    console.warn('清除 localStorage 快取失敗:', e);
  }

  try {
    sessionStorage.clear();
  } catch (e) {
    console.warn('清除 sessionStorage 快取失敗:', e);
  }
}

async function clearBrowserCaches() {
  if ('caches' in window) {
    try {
      const cacheNames = await caches.keys();
      await Promise.all(cacheNames.map(name => caches.delete(name)));
    } catch (e) {
      console.warn('清除 Cache Storage 失敗:', e);
    }
  }
}

async function clearFirestoreLocalCache() {
  try {
    if (db.disableNetwork) await db.disableNetwork();
  } catch (e) {
    console.warn('停用 Firestore network 失敗:', e);
  }

  try {
    if (db.terminate) await db.terminate();
    if (firebase.firestore().clearPersistence) await firebase.firestore().clearPersistence();
  } catch (e) {
    // clearPersistence 在 Firestore 已啟動時可能回傳 failed-precondition；下方再盡力刪 IndexedDB。
    console.warn('清除 Firestore persistence 失敗，改以 IndexedDB 清理:', e);
  }
}

async function deleteIndexedDbByName(name) {
  return await new Promise(resolve => {
    try {
      const req = indexedDB.deleteDatabase(name);
      req.onsuccess = () => resolve(true);
      req.onerror = () => resolve(false);
      req.onblocked = () => resolve(false);
    } catch (e) {
      console.warn(`刪除 IndexedDB ${name} 失敗:`, e);
      resolve(false);
    }
  });
}

async function clearIndexedDbCaches() {
  if (!window.indexedDB) return;

  try {
    if (indexedDB.databases) {
      const dbs = await indexedDB.databases();
      const targets = dbs
        .map(item => item && item.name)
        .filter(Boolean)
        // 只清資料/Firestore 快取，不刪 Firebase Auth 的 firebaseLocalStorageDb，避免清資料等同強制登出。
        .filter(name => /firestore|rental|tmh|taipeimetrohouse/i.test(name) && name !== 'firebaseLocalStorageDb');
      await Promise.all(targets.map(deleteIndexedDbByName));
      return;
    }
  } catch (e) {
    console.warn('列出 IndexedDB 失敗:', e);
  }

  // Safari/舊瀏覽器沒有 indexedDB.databases() 時，嘗試 Firestore 常見命名；保留 Firebase Auth DB。
  await Promise.all([
    'firestore/[DEFAULT]/taipeimetrohouse-2/main',
    'firestore/taipeimetrohouse-2/main'
  ].map(deleteIndexedDbByName));
}

async function clearAllLocalCaches() {
  removeLocalAppStorage();
  await clearBrowserCaches();
  await clearFirestoreLocalCache();
  await clearIndexedDbCaches();
}

// 清除所有資料
async function clearAllData() {
  const confirm1 = confirm('⚠️ 確定要清除所有資料？\n\n此動作將刪除所有建案、客房、房客、合約、租金紀錄、費用、修繕、清潔、證據與設定資料，且無法復原！');
  if (!confirm1) return;

  const confirm2 = confirm('🔴 請再次確認\n\n您確定要永久刪除所有資料並清除本機快取？\n\n此動作無法復原！');
  if (!confirm2) return;

  const uid = getCurrentUserUid();
  if (!uid) {
    showToast('使用者未登入', 'error');
    return;
  }

  showLoading();
  const failures = [];
  let deletedCount = 0;

  try {
    for (const col of USER_DATA_COLLECTIONS) {
      try {
        deletedCount += await deleteUserCollection(uid, col);
      } catch (err) {
        console.warn(`刪除 ${col} 時發生錯誤:`, err);
        failures.push(col);
      }
    }

    await clearAllLocalCaches();

    if (failures.length) {
      showToast(`已清除 ${deletedCount} 筆資料，但 ${failures.join('、')} 需稍後重試`, 'error');
    } else {
      showToast(`所有資料與本機快取已清除（${deletedCount} 筆）`, 'success');
    }

    setTimeout(() => {
      window.location.replace('dashboard.html?cacheCleared=' + Date.now());
    }, 1800);
  } catch (error) {
    console.error('清除資料失敗:', error);
    showToast('清除失敗: ' + error.message, 'error');
  } finally {
    hideLoading();
  }
}

// 設定頁目前不再載入使用者資訊、通知設定與預設費用設定；保留 hook 供 app.js auth ready 後安全呼叫。
async function loadSettings() {}

document.addEventListener('DOMContentLoaded', () => {
  loadSettings();
});
</script>
