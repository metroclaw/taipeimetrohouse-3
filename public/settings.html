<script>
// ============================================================
// Settings Page Logic
// ============================================================

const SETTINGS_DEFAULTS = {
  notifications: {
    rentOverdue: true,
    contractExpiry: true,
    maintenanceComplete: true,
    cleaningSchedule: true
  },
  defaults: {
    elecRate: 5.5,
    waterRate: 12,
    gasRate: 25,
    tvFee: 550,
    wifiFee: 600
  }
};

// 載入設定
async function loadSettings() {
  const user = getCurrentUser();
  if (!user) return;

  // 顯示使用者資訊
  const nameEl = document.getElementById('settings-user-name');
  const emailEl = document.getElementById('settings-user-email');
  const avatarIcon = document.getElementById('settings-avatar-icon');
  const avatarImg = document.getElementById('settings-avatar-img');

  nameEl.textContent = user.displayName || '使用者';
  emailEl.textContent = user.email || '';

  if (user.photoURL) {
    avatarIcon.classList.add('hidden');
    avatarImg.src = user.photoURL;
    avatarImg.classList.remove('hidden');
  }

  // 從 Firestore 讀取設定
  try {
    const uid = getCurrentUserUid();
    const docRef = db.collection('users').doc(uid).collection('settings').doc('preferences');
    const docSnap = await docRef.get();

    let settings;
    if (docSnap.exists) {
      settings = docSnap.data();
    } else {
      // 使用預設值
      settings = SETTINGS_DEFAULTS;
    }

    // 填入通知設定
    const notifs = settings.notifications || SETTINGS_DEFAULTS.notifications;
    document.getElementById('notif-rentOverdue').checked = notifs.rentOverdue ?? true;
    document.getElementById('notif-contractExpiry').checked = notifs.contractExpiry ?? true;
    document.getElementById('notif-maintenanceComplete').checked = notifs.maintenanceComplete ?? true;
    document.getElementById('notif-cleaningSchedule').checked = notifs.cleaningSchedule ?? true;

    // 填入預設費用
    const defaults = settings.defaults || SETTINGS_DEFAULTS.defaults;
    document.getElementById('default-elecRate').value = defaults.elecRate ?? 5.5;
    document.getElementById('default-waterRate').value = defaults.waterRate ?? 12;
    document.getElementById('default-gasRate').value = defaults.gasRate ?? 25;
    document.getElementById('default-tvFee').value = defaults.tvFee ?? 550;
    document.getElementById('default-wifiFee').value = defaults.wifiFee ?? 600;

  } catch (error) {
    console.error('載入設定失敗:', error);
    showToast('載入設定失敗: ' + error.message, 'error');
  }
}

// 儲存設定
async function saveSettings() {
  const uid = getCurrentUserUid();
  if (!uid) {
    showToast('使用者未登入', 'error');
    return;
  }

  const btn = document.getElementById('btn-save-settings');
  const status = document.getElementById('save-status');
  const originalText = btn.textContent;

  try {
    btn.disabled = true;
    btn.textContent = '儲存中...';
    status.classList.add('hidden');

    const data = {
      notifications: {
        rentOverdue: document.getElementById('notif-rentOverdue').checked,
        contractExpiry: document.getElementById('notif-contractExpiry').checked,
        maintenanceComplete: document.getElementById('notif-maintenanceComplete').checked,
        cleaningSchedule: document.getElementById('notif-cleaningSchedule').checked
      },
      defaults: {
        elecRate: parseFloat(document.getElementById('default-elecRate').value) || 0,
        waterRate: parseFloat(document.getElementById('default-waterRate').value) || 0,
        gasRate: parseFloat(document.getElementById('default-gasRate').value) || 0,
        tvFee: parseFloat(document.getElementById('default-tvFee').value) || 0,
        wifiFee: parseFloat(document.getElementById('default-wifiFee').value) || 0
      },
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    };

    await db.collection('users').doc(uid).collection('settings').doc('preferences').set(data, { merge: true });

    showToast('設定已儲存', 'success');

    // 顯示狀態
    status.textContent = '✓ 已儲存';
    status.className = 'text-sm text-emerald-600';
    status.classList.remove('hidden');
    setTimeout(() => status.classList.add('hidden'), 3000);

  } catch (error) {
    console.error('儲存設定失敗:', error);
    showToast('儲存失敗: ' + error.message, 'error');

    status.textContent = '✗ 儲存失敗';
    status.className = 'text-sm text-red-600';
    status.classList.remove('hidden');
  } finally {
    btn.disabled = false;
    btn.textContent = originalText;
  }
}

// 匯出資料為 CSV
async function exportData() {
  const uid = getCurrentUserUid();
  if (!uid) {
    showToast('使用者未登入', 'error');
    return;
  }

  showLoading();
  try {
    // 讀取 rentRecords
    const rentRecords = await getRentRecords();

    if (rentRecords.length === 0) {
      showToast('沒有可匯出的資料', 'info');
      hideLoading();
      return;
    }

    // 取得所有欄位名稱（union of all keys）
    const allKeys = new Set();
    rentRecords.forEach(record => {
      Object.keys(record).forEach(key => {
        if (key !== 'id') allKeys.add(key);
      });
    });

    // 固定欄位順序
    const preferredOrder = ['year', 'month', 'tenantName', 'roomNumber', 'rentAmount', 'elecFee', 'waterFee', 'gasFee', 'tvFee', 'wifiFee', 'totalAmount', 'paid', 'paidDate', 'note'];
    const columns = [];
    preferredOrder.forEach(k => { if (allKeys.has(k)) columns.push(k); });
    allKeys.forEach(k => { if (!columns.includes(k)) columns.push(k); });

    // 產生 CSV
    const escapeCSV = (val) => {
      if (val === null || val === undefined) return '';
      const str = String(val);
      if (str.includes(',') || str.includes('"') || str.includes('\n')) {
        return '"' + str.replace(/"/g, '""') + '"';
      }
      return str;
    };

    const header = columns.join(',');
    const rows = rentRecords.map(record =>
      columns.map(col => escapeCSV(record[col])).join(',')
    );

    const csvContent = '\uFEFF' + [header, ...rows].join('\n');

    // 下載
    const today = new Date();
    const dateStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
    const filename = `rent-records-${dateStr}.csv`;

    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = filename;
    link.click();
    URL.revokeObjectURL(link.href);

    showToast(`已匯出 ${rentRecords.length} 筆資料`, 'success');

  } catch (error) {
    console.error('匯出失敗:', error);
    showToast('匯出失敗: ' + error.message, 'error');
  } finally {
    hideLoading();
  }
}

// 批次刪除集合中的所有文件
async function deleteCollection(collectionPath, batchSize = 500) {
  const uid = getCurrentUserUid();
  if (!uid) throw new Error('使用者未登入');

  const collectionRef = db.collection('users').doc(uid).collection(collectionPath);
  let query = collectionRef.limit(batchSize);

  return new Promise((resolve, reject) => {
    deleteBatch(query, resolve, reject, batchSize);
  });
}

function deleteBatch(query, resolve, reject, batchSize) {
  query.get()
    .then((snapshot) => {
      if (snapshot.size === 0) {
        resolve();
        return;
      }

      const batch = db.batch();
      snapshot.docs.forEach((doc) => {
        batch.delete(doc.ref);
      });

      batch.commit().then(() => {
        // 如果這批是滿的，可能還有更多
        if (snapshot.size === batchSize) {
          let newQuery = query;
          deleteBatch(newQuery, resolve, reject, batchSize);
        } else {
          resolve();
        }
      }).catch(reject);
    })
    .catch(reject);
}

// 清除所有資料
async function clearAllData() {
  // 雙重確認
  const confirm1 = confirm('⚠️ 確定要清除所有資料？\n\n此動作將刪除所有建案、房客、合約、租金紀錄等資料，且無法復原！');
  if (!confirm1) return;

  const confirm2 = confirm('🔴 請再次確認\n\n您確定要永久刪除所有資料？\n\n此動作無法復原！');
  if (!confirm2) return;

  const uid = getCurrentUserUid();
  if (!uid) {
    showToast('使用者未登入', 'error');
    return;
  }

  showLoading();
  try {
    const collections = ['projects', 'tenants', 'contracts', 'rentRecords', 'utilityBills', 'maintenanceTasks', 'evidenceFiles', 'cleaningSchedules'];

    for (const col of collections) {
      try {
        await deleteCollection(col, 500);
      } catch (err) {
        console.warn(`刪除 ${col} 時發生錯誤:`, err);
        // 繼續刪除其他集合
      }
    }

    showToast('所有資料已清除', 'success');

    // 重新載入頁面
    setTimeout(() => {
      window.location.reload();
    }, 1500);

  } catch (error) {
    console.error('清除資料失敗:', error);
    showToast('清除失敗: ' + error.message, 'error');
  } finally {
    hideLoading();
  }
}

// DOMContentLoaded
document.addEventListener('DOMContentLoaded', () => {
  loadSettings();
});
</script>
