.sidebar-item{display:flex;align-items:center;gap:.75rem;padding:.625rem .75rem!important;border-radius:.5rem;font-size:.875rem;line-height:1.25rem;min-height:2.5rem;color:#4b5563;transition:background-color .15s,color .15s}.sidebar-item i{width:1.25rem!important;text-align:center}.sidebar-item:hover{background:#f9fafb;color:#2563EB}.sidebar-item.active{background:#2563EB15;color:#2563EB;font-weight:600}

<body class="bg-bg min-h-screen">

    <div class="flex items-center gap-2"><div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center"><span class="text-white font-bold text-sm">M</span></div><span class="font-bold text-base lg:text-lg text-gray-900">大都會物業房務管理系統</span></div>
  </div>
  <div class="flex items-center gap-3 relative">

      <div id="user-menu" class="hidden absolute right-0 mt-2 w-48 bg-white border border-gray-100 rounded-xl shadow-lg py-2 z-[60]"><div class="px-4 py-2 border-b border-gray-100"><p id="user-name" class="text-sm font-medium text-gray-900 truncate">使用者</p><p id="user-email" class="text-xs text-gray-500 truncate"></p></div><a href="accounts.html?selfEdit=1" class="flex items-center gap-2 px-4 py-2 text-sm text-gray-700 hover:bg-gray-50"><i class="fas fa-user-shield w-4 text-gray-400"></i>帳號管理</a><button type="button" onclick="handleSignOut()" class="w-full flex items-center gap-2 px-4 py-2 text-sm text-red-600 hover:bg-red-50 text-left"><i class="fas fa-sign-out-alt w-4"></i>登出</button></div>

  <main class="flex-1 p-4 lg:p-6">
    <div class="mb-5 flex flex-col md:flex-row md:items-center md:justify-between gap-3">
      <div><a href="projects.html" class="text-sm text-primary hover:underline"><i class="fas fa-arrow-left mr-1"></i>返回建案管理</a><h1 class="text-2xl font-bold text-gray-900 mt-2">客房資訊</h1><p id="page-subtitle" class="text-sm text-gray-500 mt-1">載入中...</p></div>
      <a id="project-map-link" href="#" target="_blank" class="hidden px-3 py-2 text-sm border border-gray-200 rounded-lg text-primary hover:bg-primary/5"><i class="fas fa-map-location-dot mr-1"></i>地圖連結</a>
    </div>
    <section class="bg-white rounded-xl border border-gray-100 shadow-sm p-4 mb-5">
      <div class="grid md:grid-cols-4 gap-4">
        <div><p class="info-label">建案名稱</p><p id="project-name" class="info-value">—</p></div>
        <div><p class="info-label">建案地址</p><p id="project-address" class="info-value">—</p></div>
        <div><label class="info-label block mb-1" for="room-status-filter">客房篩選</label><select id="room-status-filter" onchange="applyRoomStatusFilter()" class="field-input"><option value="">全部客房</option><option value="可出租">可出租</option><option value="已出租">已出租</option></select></div>
        <div><label class="info-label block mb-1" for="room-selector">選擇房號</label><select id="room-selector" onchange="selectRoom(this.value)" class="field-input"><option value="">載入中...</option></select></div>

    </section>

<div id="photo-viewer" class="hidden fixed inset-0 bg-black/85 z-[100] items-center justify-center p-4" onclick="closePhotoViewer()">
  <button class="absolute top-4 right-4 text-white text-2xl"><i class="fas fa-times"></i></button>
  <img id="photo-viewer-img" src="" alt="室內圖放大" class="max-w-full max-h-full object-contain rounded-xl shadow-2xl">
</div>
<script>
let projectData = null;
let roomsData = [];
let selectedRoomId = '';
let currentRoomImages = [];
function h(value){return String(value ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function getParam(name){return new URLSearchParams(window.location.search).get(name) || '';}
function getMapSearchUrl(address){return address ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}` : '#';}
function normalizeRoomImageObjects(room){
  const photos = Array.isArray(room.interiorPhotos) ? room.interiorPhotos : [];
  if (photos.length) return photos.map(p => typeof p === 'string' ? { previewUrl:p, fullUrl:p } : { previewUrl:p.previewUrl || p.fullUrl || p.url || '', fullUrl:p.fullUrl || p.url || p.previewUrl || '' }).filter(p => p.previewUrl || p.fullUrl).slice(0,6);
  return (room.interiorPhotoUrls || room.roomImages || room.photos || room.imageUrls || []).filter(Boolean).slice(0,6).map(url => ({ previewUrl:url, fullUrl:url }));
}
function openPhotoViewer(index){const image=currentRoomImages[index]; if(!image) return; document.getElementById('photo-viewer-img').src=image.fullUrl || image.previewUrl; document.getElementById('photo-viewer').classList.remove('hidden'); document.getElementById('photo-viewer').classList.add('flex');}
function closePhotoViewer(){document.getElementById('photo-viewer').classList.add('hidden');document.getElementById('photo-viewer').classList.remove('flex');document.getElementById('photo-viewer-img').src='';}
function canvasToBlob(canvas, type = 'image/jpeg', quality = 0.82){return new Promise(resolve => canvas.toBlob(resolve, type, quality));}
async function resizeImageFile(file, maxWidth, maxHeight, quality = 0.82){
  if (!file || !file.type || !file.type.startsWith('image/')) return file;
  const bitmap = await createImageBitmap(file);
  const ratio = Math.min(maxWidth / bitmap.width, maxHeight / bitmap.height, 1);
  const width = Math.max(1, Math.round(bitmap.width * ratio));
  const height = Math.max(1, Math.round(bitmap.height * ratio));
  const canvas = document.createElement('canvas');
  canvas.width = width; canvas.height = height;
  canvas.getContext('2d').drawImage(bitmap, 0, 0, width, height);
  const blob = await canvasToBlob(canvas, 'image/jpeg', quality);
  if (bitmap.close) bitmap.close();
  return blob || file;
}
async function uploadImageBlob(storagePath, blob){const ref=firebase.storage().ref(storagePath); await ref.put(blob,{contentType:'image/jpeg'}); return await ref.getDownloadURL();}
function getSelectedRoom(){return roomsData.find(r => r.id === selectedRoomId) || getFilteredRooms()[0] || roomsData[0] || null;}
function isRoomRentable(room){return room.status === '可出租' || room.status === '空置' || (!room.tenant && room.status !== '已出租');}
function getFilteredRooms(){const filter=document.getElementById('room-status-filter')?.value || ''; if(!filter) return roomsData; return roomsData.filter(room => filter === '可出租' ? isRoomRentable(room) : room.status === '已出租' || !!room.tenant);}
function applyRoomStatusFilter(){const list=getFilteredRooms(); selectedRoomId = list.some(r => r.id === selectedRoomId) ? selectedRoomId : (list[0]?.id || ''); renderRoomDetail();}
function renderRoomSelector(){
  const selector = document.getElementById('room-selector');
  const list = getFilteredRooms();
  if (!roomsData.length) { selector.innerHTML = '<option value="">尚無客房</option>'; return; }
  if (!list.length) { selector.innerHTML = '<option value="">無符合條件客房</option>'; return; }
  selector.innerHTML = list.map(room => `<option value="${h(room.id)}" ${room.id === selectedRoomId ? 'selected' : ''}>${h(room.number || room.roomNumber || room.name || '未命名房號')}</option>`).join('');
}
function renderRoomPhotos(room){
  currentRoomImages = normalizeRoomImageObjects(room);
  if (!currentRoomImages.length) return '<div class="h-48 rounded-xl bg-slate-50 border border-dashed border-slate-200 flex items-center justify-center text-gray-400 text-sm"><i class="fas fa-image mr-2"></i>尚未上傳室內圖</div>';
  return `<div class="photo-strip flex gap-3 overflow-x-auto pb-2">${currentRoomImages.map((img,i)=>`<button type="button" onclick="openPhotoViewer(${i})" class="room-thumb shrink-0 w-56 h-40 rounded-xl overflow-hidden border border-gray-100 bg-gray-50"><img src="${h(img.previewUrl || img.fullUrl)}" alt="室內圖 ${i+1}" loading="lazy" decoding="async" class="w-full h-full object-cover"></button>`).join('')}</div>`;
}
function renderRoomDetail(){
  const room = getSelectedRoom();
  const container = document.getElementById('room-detail-container');
  renderRoomSelector();
  if (!room) { container.innerHTML = '<div class="bg-white rounded-xl border border-gray-100 p-8 text-center text-gray-400">尚未找到客房資料</div>'; return; }
  const roomNumber = room.number || room.roomNumber || room.name || '';
  const amenitiesText = Array.isArray(room.amenities) ? room.amenities.join('、') : (room.amenities || '');
  const projectInternet = [projectData?.tvProvider ? `第四台/網路：${projectData.tvProvider}` : '', projectData?.tvFee ? `費用：${formatCurrency(projectData.tvFee)}` : '', projectData?.wifiName ? `WiFi：${projectData.wifiName}` : ''].filter(Boolean).join('｜');
  const internetTv = room.internetTv || room.networkInfo || projectInternet || '';
  const otherInfo = room.otherInfo || room.note || room.description || '';
  container.innerHTML = `<article class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
    <div class="p-4 border-b border-gray-100 flex flex-col md:flex-row md:items-center md:justify-between gap-2"><div><p class="text-xs text-gray-400">${h(projectData?.name || '')} / ${h(projectData?.address || '')}</p><h2 class="text-xl font-bold text-gray-900 mt-1">房號 ${h(roomNumber || '未命名')}</h2></div><span class="inline-flex w-fit px-3 py-1 rounded-full bg-primary/10 text-primary text-xs font-medium">${h(room.status || '狀態未設定')}</span></div>
    <div class="p-4 space-y-5">
      <div><div class="flex items-center justify-between mb-2"><h3 class="text-sm font-semibold text-gray-900">室內圖</h3><span class="text-xs text-gray-400">最多 6 張，可左右滑動；預覽用小圖，點擊以大圖檢視</span></div>${renderRoomPhotos(room)}</div>
      <form id="room-detail-form" class="space-y-4" onsubmit="saveSelectedRoomInfo(event)">
        <div class="grid md:grid-cols-4 gap-3">
          <div><label class="field-label">房號</label><input id="edit-room-number" class="field-input" value="${h(roomNumber)}"></div>
          <div><label class="field-label">類型</label><input id="edit-room-type" class="field-input" value="${h(room.type || '')}" placeholder="套房 / 雅房 / 整層"></div>
          <div><label class="field-label">坪數</label><input id="edit-room-area" type="number" step="0.1" class="field-input" value="${h(room.area || '')}"></div>
          <div><label class="field-label">租金</label><input id="edit-room-rent" type="number" step="1" class="field-input" value="${h(room.rent || room.monthlyRent || '')}"></div>
        </div>
        <div class="grid md:grid-cols-3 gap-3">
          <div><label class="field-label">樓層</label><input id="edit-room-floor" type="number" class="field-input" value="${h(room.floor || '')}"></div>
          <div><label class="field-label">狀態</label><select id="edit-room-status" class="field-input"><option ${room.status==='空置'?'selected':''}>空置</option><option ${room.status==='已出租'?'selected':''}>已出租</option><option ${room.status==='維修中'?'selected':''}>維修中</option><option ${room.status==='清潔中'?'selected':''}>清潔中</option></select></div>
          <div><label class="field-label">設備資訊</label><input id="edit-room-amenities" class="field-input" value="${h(amenitiesText)}" placeholder="冷氣、冰箱、洗衣機"></div>
        </div>
        <div><label class="field-label">網路／第四台資訊</label><textarea id="edit-room-internet-tv" class="field-input min-h-[84px]" placeholder="例如：中華電信 / 第四台費用 / WiFi 資訊">${h(internetTv)}</textarea></div>
        <div><label class="field-label">其他資訊 / 設備資訊</label><textarea id="edit-room-other-info" class="field-input min-h-[100px]" placeholder="補充家具、注意事項、維修狀態等">${h(otherInfo)}</textarea></div>
        <div class="rounded-xl border border-dashed border-gray-200 p-3 bg-slate-50"><label class="field-label">更新室內圖（最多 6 張；儲存時自動產生預覽小圖與放大大圖）</label><input id="edit-room-photos" type="file" accept="image/*" multiple class="w-full text-sm text-gray-500 file:mr-3 file:px-3 file:py-1.5 file:rounded-lg file:border-0 file:bg-primary/10 file:text-primary file:font-medium"><p class="text-xs text-gray-400 mt-2">未選新圖片時會保留原本室內圖；選擇新圖片會以本次 1–6 張取代。</p></div>
        <div class="flex flex-col sm:flex-row justify-end gap-3"><button type="button" onclick="applySelectedRoomInfoToOtherRooms()" class="px-4 py-2 border border-primary/30 text-primary rounded-lg text-sm font-medium hover:bg-primary/5"><i class="fas fa-clone mr-1"></i>套用到其他房</button><button type="submit" class="px-4 py-2 bg-primary text-white rounded-lg text-sm font-medium hover:bg-primary/90"><i class="fas fa-save mr-1"></i>儲存此房號資料</button></div>
      </form>
    </div>
  </article>`;
}
function selectRoom(roomId){selectedRoomId = roomId; renderRoomDetail();}
async function uploadRoomInteriorPhotos(uid, projectId, roomId){
  const input = document.getElementById('edit-room-photos');
  if (!input || !input.files || !input.files.length) return null;
  const files = Array.from(input.files).slice(0,6);
  const stamp = Date.now();
  const uploads = [];
  for (let i=0; i<files.length; i++) {
    const largeBlob = await resizeImageFile(files[i], 1800, 1800, 0.88);
    const previewBlob = await resizeImageFile(files[i], 520, 360, 0.76);
    const base = `users/${uid}/projects/${projectId}/rooms/${roomId}/interior-${stamp}-${i+1}`;
    const fullUrl = await uploadImageBlob(`${base}-large.jpg`, largeBlob);
    const previewUrl = await uploadImageBlob(`${base}-preview.jpg`, previewBlob);
    uploads.push({ previewUrl, fullUrl });
  }
  return uploads;
}
function collectRoomDetailFormData() {
  return {
    number: document.getElementById('edit-room-number').value.trim(),
    type: document.getElementById('edit-room-type').value.trim(),
    area: parseFloat(document.getElementById('edit-room-area').value) || 0,
    rent: parseInt(document.getElementById('edit-room-rent').value, 10) || 0,
    floor: parseInt(document.getElementById('edit-room-floor').value, 10) || 0,
    status: document.getElementById('edit-room-status').value,
    amenities: document.getElementById('edit-room-amenities').value.split(/[、,，]/).map(s => s.trim()).filter(Boolean),
    internetTv: document.getElementById('edit-room-internet-tv').value.trim(),
    otherInfo: document.getElementById('edit-room-other-info').value.trim(),
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };
}
function buildRoomTemplateData(sourceRoom, formData) {
  const data = { ...formData };
  delete data.number;
  const images = normalizeRoomImageObjects(sourceRoom);
  if (images.length) {
    data.interiorPhotos = images;
    data.interiorPhotoUrls = images.map(p => p.fullUrl || p.previewUrl).filter(Boolean);
  }
  return data;
}
async function applySelectedRoomInfoToOtherRooms(){
  const uid = getCurrentUserUid();
  const projectId = getParam('projectId');
  const room = getSelectedRoom();
  if (!uid || !projectId || !room) return;
  const targets = roomsData.filter(r => r.id !== room.id);
  if (!targets.length) { showToast('此建案沒有其他房間可套用', 'error'); return; }
  if (!confirm(`將此房號的類型、坪數、租金、樓層、狀態、設備、網路/第四台、其他資訊與室內圖套用到其他 ${targets.length} 間房；各房房號會保留。確定套用？`)) return;
  try {
    showLoading();
    const data = buildRoomTemplateData(room, collectRoomDetailFormData());
    const batch = db.batch();
    const roomsRef = db.collection('users').doc(uid).collection('projects').doc(projectId).collection('rooms');
    targets.forEach(target => batch.set(roomsRef.doc(target.id), data, { merge: true }));
    await batch.commit();
    targets.forEach(target => Object.assign(target, data));
    hideLoading();
    showToast(`已套用到其他 ${targets.length} 間房，房號已保留`);
    renderRoomDetail();
  } catch(e) {
    hideLoading();
    console.error('Error applying room template:', e);
    showToast('套用失敗，請確認資料權限', 'error');
  }
}
async function saveSelectedRoomInfo(event){
  event.preventDefault();
  const uid = getCurrentUserUid();
  const projectId = getParam('projectId');
  const room = getSelectedRoom();
  if (!uid || !projectId || !room) return;
  try {
    showLoading();
const data = collectRoomDetailFormData();
    const interiorPhotos = await uploadRoomInteriorPhotos(uid, projectId, room.id);
    if (interiorPhotos) {
      data.interiorPhotos = interiorPhotos;
      data.interiorPhotoUrls = interiorPhotos.map(p => p.fullUrl);
    }
    await db.collection('users').doc(uid).collection('projects').doc(projectId).collection('rooms').doc(room.id).set(data, { merge: true });
    Object.assign(room, data);
    if (interiorPhotos) room.interiorPhotos = interiorPhotos;
    hideLoading();
    showToast('客房資料已更新');
    renderRoomDetail();
  } catch(e) {
    hideLoading();
    console.error('Error saving room info:', e);
    showToast('儲存失敗，請確認照片上傳權限', 'error');
  }
}
async function loadRoomInfoPage(){
  const uid = getCurrentUserUid();
  const projectId = getParam('projectId');
  if (!uid || !projectId) { document.getElementById('room-detail-container').innerHTML = '<div class="bg-white rounded-xl border border-gray-100 p-8 text-center text-red-400">缺少建案資訊</div>'; return; }
  try {
    const projectSnap = await db.collection('users').doc(uid).collection('projects').doc(projectId).get();
    if (!projectSnap.exists) throw new Error('Project not found');
    projectData = { id: projectSnap.id, ...projectSnap.data() };
    document.getElementById('project-name').textContent = projectData.name || '未命名建案';
    document.getElementById('project-address').textContent = projectData.address || '—';
    document.getElementById('page-subtitle').textContent = `${projectData.name || '建案'} 的客房資訊，可選房號後直接修改欄位`;
    const mapLink = document.getElementById('project-map-link');
    if (projectData.address) { mapLink.href = projectData.mapUrl || getMapSearchUrl(projectData.address); mapLink.classList.remove('hidden'); }
    const roomsSnap = await db.collection('users').doc(uid).collection('projects').doc(projectId).collection('rooms').get();
    roomsData = roomsSnap.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a,b) => {
      const av = parseInt(String(a.number || a.roomNumber || a.name || '').match(/\d+/)?.[0] || '999999', 10);
      const bv = parseInt(String(b.number || b.roomNumber || b.name || '').match(/\d+/)?.[0] || '999999', 10);
      return av - bv;
    });
    selectedRoomId = getParam('roomId') || (roomsData[0] && roomsData[0].id) || '';
    renderRoomDetail();
  } catch(e) {
    console.error('Error loading room info:', e);
    document.getElementById('room-detail-container').innerHTML = '<div class="bg-white rounded-xl border border-gray-100 p-8 text-center text-red-400">客房資訊載入失敗</div>';
  }
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePhotoViewer(); });
document.addEventListener('DOMContentLoaded', () => onAuthReady(user => { if (user) loadRoomInfoPage(); }));
</script>
</body>
