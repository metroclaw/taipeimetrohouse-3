    <!-- Dashboard Logic -->
    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('hidden');
        }

        function toMillis(value) {
            if (!value) return 0;
            if (typeof value === 'number') return value;
            if (value.toMillis) return value.toMillis();
            if (value.seconds) return value.seconds * 1000;
            const parsed = new Date(value).getTime();
            return Number.isFinite(parsed) ? parsed : 0;
        }

        function getRelativeTime(value) {
            const timestamp = toMillis(value);
            if (!timestamp) return '未知時間';
            const diff = Date.now() - timestamp;
            if (diff < 60000) return '剛剛';
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);
            if (days > 30) return `${Math.floor(days / 30)} 個月前`;
            if (days > 0) return `${days} 天前`;
            if (hours > 0) return `${hours} 小時前`;
            return `${minutes} 分鐘前`;
        }

        function getContractEnd(c) { return c.end || c.endDate || c.contractEnd || ''; }
        function roomLabel(record) { return record.roomNumber || record.room || ''; }
        function isRoomOccupied(room) { return room.status === '已出租' || !!room.tenantId || !!room.tenant || !!room.contractId; }

        async function loadDashboardData() {
            const uid = getCurrentUserUid();
            if (!uid) return;
            try {
                showLoading();
                const [projects, tenants, contracts, rentRecords, maintenanceTasks] = await Promise.all([
                    getProjects(), getTenants(), getContracts(), getRentRecords(), getMaintenanceTasks()
                ]);

                const projectsWithRooms = [];
                for (const project of projects) {
                    const rooms = await getRooms(project.id);
                    const normalizedRooms = rooms.map(room => ({ ...room, projectId: project.id, projectName: project.name || '' }));
                    projectsWithRooms.push({ ...project, rooms: normalizedRooms, totalRooms: normalizedRooms.length, rentedRooms: normalizedRooms.filter(isRoomOccupied).length });
                }

                renderDashboard(projectsWithRooms, tenants, contracts, rentRecords, maintenanceTasks);
            } catch (e) {
                console.error('主控台資料載入失敗:', e);
                showToast('主控台資料載入失敗', 'error');
                renderDashboard([], [], [], [], []);
            } finally {
                hideLoading();
            }
        }

        function renderDashboard(projects, tenants, contracts, rentRecords, maintenanceTasks) {
            const allRooms = projects.flatMap(p => p.rooms || []);
            const totalRooms = allRooms.length;
            const rentedRooms = allRooms.filter(isRoomOccupied).length;
            const vacantRooms = Math.max(totalRooms - rentedRooms, 0);
            const occupancyRate = totalRooms > 0 ? Math.round((rentedRooms / totalRooms) * 100) : 0;

            const now = new Date();
            const currentYear = now.getFullYear();
            const currentMonth = now.getMonth() + 1;
            const currentMonthRentRecords = rentRecords.filter(r => Number(r.year) === currentYear && Number(r.month) === currentMonth);
            const currentActiveContracts = contracts.filter(c => (c.status || '進行中') !== '已結束');
            const rentDue = currentMonthRentRecords.length > 0
                ? currentMonthRentRecords.reduce((sum, r) => sum + (Number(r.amount) || 0), 0)
                : currentActiveContracts.reduce((sum, c) => sum + (Number(c.rent) || 0), 0);
            const rentPaid = currentMonthRentRecords.reduce((sum, r) => sum + (Number(r.paid) || (r.status === '已繳' ? Number(r.amount) || 0 : 0)), 0);
            const overdueAmount = currentMonthRentRecords
                .filter(r => r.status === '逾期' || r.status === '部分' || (Number(r.amount || 0) > Number(r.paid || 0) && r.status !== '已繳'))
                .reduce((sum, r) => sum + Math.max((Number(r.amount) || 0) - (Number(r.paid) || 0), 0), 0);

            document.getElementById('stat-total-rooms').textContent = totalRooms;
            document.getElementById('stat-total-projects').textContent = projects.length;
            document.getElementById('stat-rented').textContent = rentedRooms;
            document.getElementById('stat-occupancy-rate').textContent = occupancyRate + '%';
            document.getElementById('stat-vacant').textContent = vacantRooms;
            document.getElementById('stat-vacant-rooms').textContent = vacantRooms + ' 間';
            document.getElementById('stat-income').textContent = formatCurrency(rentPaid);
            document.getElementById('stat-income-note').textContent = `${formatCurrency(rentDue)} 應收`;

            const projectList = document.getElementById('project-overview-list');
            if (projects.length === 0) {
                projectList.innerHTML = '<p class="text-gray-400 text-sm text-center py-6">尚無建案資料</p>';
            } else {
                projectList.innerHTML = projects.map(p => {
                    const total = p.totalRooms || 0;
                    const rented = p.rentedRooms || 0;
                    const pct = total > 0 ? Math.round((rented / total) * 100) : 0;
                    const vacant = Math.max(total - rented, 0);
                    return `<div>
                        <div class="flex items-center justify-between mb-2">
                            <div><h3 class="font-semibold text-gray-700 text-sm">${p.name || '未命名建案'}</h3><p class="text-xs text-gray-400">${p.address || ''}</p></div>
                            <div class="text-right"><span class="text-sm font-bold text-gray-700">${rented}/${total}</span><span class="text-xs text-gray-400 ml-1">間</span></div>
                        </div>
                        <div class="w-full bg-gray-100 rounded-full h-2.5"><div class="progress-bar h-2.5 rounded-full ${pct >= 80 ? 'bg-secondary' : pct >= 50 ? 'bg-primary' : 'bg-amber-400'}" style="width: ${pct}%"></div></div>
                        <div class="flex items-center gap-4 mt-1.5 text-xs text-gray-400"><span><i class="fas fa-user-check text-secondary mr-1"></i>已租 ${rented}</span><span><i class="fas fa-door-closed text-amber-400 mr-1"></i>空置 ${vacant}</span><span class="ml-auto font-medium ${pct >= 80 ? 'text-secondary' : pct >= 50 ? 'text-primary' : 'text-amber-500'}">${pct}%</span></div>
                    </div>`;
                }).join('');
            }

            const todos = [];
            currentMonthRentRecords.filter(r => r.status === '逾期' || r.status === '部分' || Math.max((Number(r.amount) || 0) - (Number(r.paid) || 0), 0) > 0).forEach(r => {
                todos.push({ icon:'fa-money-bill-wave', color:'red', title:'待收租金', desc:`${r.tenantName || '房客'}・${roomLabel(r)}・未收 ${formatCurrency(Math.max((Number(r.amount)||0)-(Number(r.paid)||0),0))}`, link:'rent.html', time:r.date || '', sortTime: toMillis(r.createdAt) || Date.now() });
            });
            maintenanceTasks.filter(t => ['待處理','處理中','進行中'].includes(t.status)).forEach(t => {
                todos.push({ icon:'fa-tools', color:t.priority === 'high' ? 'red' : 'amber', title:'待處理修繕', desc:`${roomLabel(t)}・${t.title || '修繕任務'}`, link:'maintenance.html', time:t.assignedTo ? `負責：${t.assignedTo}` : '', sortTime: toMillis(t.createdAt) });
            });
            const sixtyDaysLater = new Date(now.getTime() + 60 * 86400000);
            contracts.forEach(c => {
                const endValue = getContractEnd(c);
                if (!endValue) return;
                const end = new Date(endValue);
                if (end >= now && end <= sixtyDaysLater) {
                    const daysLeft = Math.ceil((end - now) / 86400000);
                    todos.push({ icon:'fa-file-contract', color:'amber', title:'合約即將到期', desc:`${c.tenantName || '房客'}・${roomLabel(c)}`, link:'contracts.html', time:`剩 ${daysLeft} 天`, sortTime:end.getTime() });
                }
            });
            if (overdueAmount > 0) {
                todos.unshift({ icon:'fa-exclamation-circle', color:'red', title:'本月逾期金額', desc:formatCurrency(overdueAmount), link:'rent.html', time:'需追蹤', sortTime:Date.now() + 1 });
            }

            const colorOrder = { red:0, amber:1, blue:2 };
            todos.sort((a,b) => (colorOrder[a.color] ?? 2) - (colorOrder[b.color] ?? 2) || (b.sortTime || 0) - (a.sortTime || 0));
            const badge = document.getElementById('notification-badge');
            if (badge) { badge.textContent = todos.length; badge.classList.toggle('hidden', todos.length === 0); }
            document.getElementById('todo-count').textContent = todos.length;
            const todoList = document.getElementById('todo-list');
            if (todos.length === 0) {
                todoList.innerHTML = '<div class="text-center py-8"><div class="w-12 h-12 bg-emerald-50 rounded-full flex items-center justify-center mx-auto mb-3"><i class="fas fa-check text-secondary text-lg"></i></div><p class="text-sm text-gray-400">目前沒有待辦事項 🎉</p></div>';
            } else {
                const colorMap = { red:{bg:'bg-red-50',text:'text-red-500',border:'border-red-100'}, amber:{bg:'bg-amber-50',text:'text-amber-500',border:'border-amber-100'}, blue:{bg:'bg-blue-50',text:'text-blue-500',border:'border-blue-100'} };
                todoList.innerHTML = todos.slice(0, 8).map(t => { const c = colorMap[t.color] || colorMap.blue; return `<a href="${t.link}" class="flex items-start gap-3 p-3 rounded-lg border ${c.border} hover:shadow-sm transition-shadow"><div class="w-8 h-8 ${c.bg} rounded-lg flex items-center justify-center shrink-0 mt-0.5"><i class="fas ${t.icon} ${c.text} text-sm"></i></div><div class="min-w-0 flex-1"><p class="text-xs font-semibold ${c.text}">${t.title}</p><p class="text-sm text-gray-600 truncate">${t.desc}</p>${t.time ? `<p class="text-xs text-gray-400 mt-0.5">${t.time}</p>` : ''}</div><i class="fas fa-chevron-right text-gray-300 text-xs mt-2 shrink-0"></i></a>`; }).join('');
            }

            const activities = [];
            rentRecords.forEach(r => activities.push({ icon:'fa-money-bill-wave', color:r.status === '已繳' ? 'emerald' : r.status === '逾期' ? 'red' : 'amber', title:r.status === '已繳' ? '租金已收款' : '租金紀錄', desc:`${r.tenantName || '房客'}・${roomLabel(r)}・${formatCurrency(r.amount || 0)}`, time:getRelativeTime(r.createdAt || r.date), sortTime:toMillis(r.createdAt || r.date) }));
            maintenanceTasks.forEach(t => activities.push({ icon:'fa-tools', color:t.status === '已完成' ? 'emerald' : 'amber', title:t.status === '已完成' ? '修繕已完成' : '修繕任務更新', desc:`${roomLabel(t)}・${t.title || '修繕任務'}`, time:getRelativeTime(t.createdAt || t.updatedAt), sortTime:toMillis(t.createdAt || t.updatedAt) }));
            contracts.forEach(c => activities.push({ icon:'fa-file-contract', color:'indigo', title:'合約紀錄', desc:`${c.tenantName || '房客'}・${roomLabel(c)}・到期日 ${getContractEnd(c) || '未設定'}`, time:getRelativeTime(c.createdAt || c.updatedAt), sortTime:toMillis(c.createdAt || c.updatedAt) }));
            activities.sort((a,b) => (b.sortTime || 0) - (a.sortTime || 0));
            const activityList = document.getElementById('activity-list');
            const latestActivities = activities.slice(0,10);
            if (latestActivities.length === 0) {
                activityList.innerHTML = '<div class="text-center py-8"><div class="w-12 h-12 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-3"><i class="fas fa-inbox text-gray-300 text-lg"></i></div><p class="text-sm text-gray-400">目前沒有活動紀錄</p></div>';
            } else {
                const iconColorMap = { blue:{bg:'bg-blue-50',text:'text-primary'}, emerald:{bg:'bg-emerald-50',text:'text-secondary'}, amber:{bg:'bg-amber-50',text:'text-amber-500'}, indigo:{bg:'bg-indigo-50',text:'text-indigo-500'}, red:{bg:'bg-red-50',text:'text-red-500'} };
                activityList.innerHTML = latestActivities.map(a => { const c = iconColorMap[a.color] || iconColorMap.blue; return `<div class="flex gap-3 p-3 rounded-lg hover:bg-gray-50 transition-colors"><div class="w-10 h-10 ${c.bg} rounded-full flex items-center justify-center shrink-0"><i class="fas ${a.icon} ${c.text} text-sm"></i></div><div class="flex-1 min-w-0"><p class="text-sm font-medium text-gray-700">${a.title}</p><p class="text-xs text-gray-400 mt-0.5 truncate">${a.desc}</p></div><span class="text-xs text-gray-300 whitespace-nowrap shrink-0">${a.time}</span></div>`; }).join('');
            }
        }

        document.addEventListener('DOMContentLoaded', () => onAuthReady(user => { if (user) loadDashboardData(); }));
    </script>
</body>
</html>
