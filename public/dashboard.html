    <script>
        // ============================================================
        // Sidebar Toggle (Mobile)
        // ============================================================

            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        // ============================================================
        // Fallback / Demo Data
        // ============================================================
        const DEMO_DATA = {
            projects: [
                { id: 'p1', name: '大都會美寓 A 棟', address: '台北市中正區重慶南路一段', totalRooms: 6, rentedRooms: 5 },
                { id: 'p2', name: '大都會美寓 B 棟', address: '台北市中正區衡陽路', totalRooms: 4, rentedRooms: 3 },
                { id: 'p3', name: '站前之星', address: '台北市中正區忠孝西路一段', totalRooms: 3, rentedRooms: 2 },
            ],
            rooms: [],
            tenants: [
                { id: 't1', name: '王小明', roomId: 'r1' },
                { id: 't2', name: '陳美玲', roomId: 'r2' },
                { id: 't3', name: '林大偉', roomId: 'r3' },
                { id: 't4', name: '張雅琪', roomId: 'r4' },
                { id: 't5', name: '黃建志', roomId: 'r5' },
                { id: 't6', name: '吳思涵', roomId: 'r6' },
                { id: 't7', name: '李宗豪', roomId: 'r7' },
                { id: 't8', name: '周佳蓉', roomId: 'r8' },
                { id: 't9', name: '鄭宇翔', roomId: 'r9' },
                { id: 't10', name: '趙珮琪', roomId: 'r10' },
            ],
            contracts: [
                { id: 'c1', tenantName: '王小明', roomNumber: 'A101', endDate: '2025-06-15', status: 'active' },
                { id: 'c2', tenantName: '陳美玲', roomNumber: 'A102', endDate: '2025-12-31', status: 'active' },
                { id: 'c3', tenantName: '林大偉', roomNumber: 'A201', endDate: '2025-11-30', status: 'active' },
            ],
            rentRecords: [
                { id: 'r1', tenantName: '王小明', roomNumber: 'A101', amount: 12000, month: '2025-05', paid: false, dueDate: '2025-05-05' },
                { id: 'r2', tenantName: '陳美玲', roomNumber: 'A102', amount: 13500, month: '2025-05', paid: false, dueDate: '2025-05-05' },
                { id: 'r3', tenantName: '林大偉', roomNumber: 'A201', amount: 11000, month: '2025-05', paid: true, dueDate: '2025-05-05' },
            ],
            maintenanceTasks: [
                { id: 'm1', title: 'A101 冷氣不冷', roomNumber: 'A101', status: 'pending', priority: 'high', createdAt: Date.now() - 86400000 },
                { id: 'm2', title: 'B202 水龍頭漏水', roomNumber: 'B202', status: 'pending', priority: 'medium', createdAt: Date.now() - 172800000 },
                { id: 'm3', title: 'A301 燈具更換', roomNumber: 'A301', status: 'in_progress', priority: 'low', createdAt: Date.now() - 259200000 },
            ],
            monthlyIncome: 145000,
        };

        // ============================================================
        // Data Loading
        // ============================================================
        async function loadDashboardData() {
            const uid = getCurrentUserUid();
            let useDemo = false;

            let projects = [], tenants = [], contracts = [], rentRecords = [], maintenanceTasks = [];

            if (uid) {
                try {
                    projects = await getProjects();
                    tenants = await getTenants();
                    contracts = await getContracts();
                    rentRecords = await getRentRecords();
                    maintenanceTasks = await getMaintenanceTasks();
                } catch (e) {
                    console.warn('Firestore read failed, using demo data:', e);
                    useDemo = true;
                }
            } else {
                useDemo = true;
            }

            if (useDemo || (projects.length === 0 && tenants.length === 0)) {
                projects = DEMO_DATA.projects;
                tenants = DEMO_DATA.tenants;
                contracts = DEMO_DATA.contracts;
                rentRecords = DEMO_DATA.rentRecords;
                maintenanceTasks = DEMO_DATA.maintenanceTasks;
            }

            renderDashboard(projects, tenants, contracts, rentRecords, maintenanceTasks);
        }

        // ============================================================
        // Render Functions
        // ============================================================
        function renderDashboard(projects, tenants, contracts, rentRecords, maintenanceTasks) {
            // --- Stat Cards ---
            const totalRooms = projects.reduce((sum, p) => sum + (p.totalRooms || 0), 0);
            const rentedRooms = projects.reduce((sum, p) => sum + (p.rentedRooms || 0), 0);
            const vacantRooms = totalRooms - rentedRooms;
            const occupancyRate = totalRooms > 0 ? Math.round((rentedRooms / totalRooms) * 100) : 0;

            // Calculate monthly income
            const now = new Date();
            const currentMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
            let monthlyIncome = 0;
            rentRecords.forEach(r => {
                if (r.month === currentMonth && r.paid) monthlyIncome += (r.amount || 0);
            });
            // If no paid records, use demo income
            if (monthlyIncome === 0) monthlyIncome = DEMO_DATA.monthlyIncome;

            document.getElementById('stat-total-rooms').textContent = totalRooms;
            document.getElementById('stat-total-projects').textContent = projects.length;
            document.getElementById('stat-rented').textContent = rentedRooms;
            document.getElementById('stat-occupancy-rate').textContent = occupancyRate + '%';
            document.getElementById('stat-vacant').textContent = vacantRooms;
            document.getElementById('stat-vacant-rooms').textContent = vacantRooms + ' 間';
            document.getElementById('stat-income').textContent = formatCurrency(monthlyIncome);

            // --- Project Overview ---
            const projectList = document.getElementById('project-overview-list');
            if (projects.length === 0) {
                projectList.innerHTML = '<p class="text-gray-400 text-sm text-center py-6">尚無建案資料</p>';
            } else {
                projectList.innerHTML = projects.map(p => {
                    const total = p.totalRooms || 0;
                    const rented = p.rentedRooms || 0;
                    const pct = total > 0 ? Math.round((rented / total) * 100) : 0;
                    const vacant = total - rented;
                    return `
                        <div>
                            <div class="flex items-center justify-between mb-2">
                                <div>
                                    <h3 class="font-semibold text-gray-700 text-sm">${p.name || '未命名建案'}</h3>
                                    <p class="text-xs text-gray-400">${p.address || ''}</p>
                                </div>
                                <div class="text-right">
                                    <span class="text-sm font-bold text-gray-700">${rented}/${total}</span>
                                    <span class="text-xs text-gray-400 ml-1">間</span>
                                </div>
                            </div>
                            <div class="w-full bg-gray-100 rounded-full h-2.5">
                                <div class="progress-bar h-2.5 rounded-full ${pct >= 80 ? 'bg-secondary' : pct >= 50 ? 'bg-primary' : 'bg-amber-400'}" style="width: ${pct}%"></div>
                            </div>
                            <div class="flex items-center gap-4 mt-1.5 text-xs text-gray-400">
                                <span><i class="fas fa-user-check text-secondary mr-1"></i>已租 ${rented}</span>
                                <span><i class="fas fa-door-closed text-amber-400 mr-1"></i>空置 ${vacant}</span>
                                <span class="ml-auto font-medium ${pct >= 80 ? 'text-secondary' : pct >= 50 ? 'text-primary' : 'text-amber-500'}">${pct}%</span>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            // --- Todo / Alerts ---
            const todoList = document.getElementById('todo-list');
            const todos = [];

            // Overdue rent
            const overdueRents = rentRecords.filter(r => !r.paid);
            overdueRents.forEach(r => {
                todos.push({
                    type: 'overdue',
                    icon: 'fa-money-bill-wave',
                    color: 'red',
                    title: '逾期租金',
                    desc: `${r.tenantName || '房客'}・${r.roomNumber || ''}・${formatCurrency(r.amount || 0)}`,
                    link: 'rent.html',
                });
            });

            // Pending maintenance
            const pendingTasks = maintenanceTasks.filter(t => t.status === 'pending' || t.status === 'in_progress');
            pendingTasks.forEach(t => {
                const priorityColors = { high: 'red', medium: 'amber', low: 'blue' };
                const color = priorityColors[t.priority] || 'blue';
                todos.push({
                    type: 'maintenance',
                    icon: 'fa-tools',
                    color: color,
                    title: '待修繕',
                    desc: `${t.roomNumber || ''}・${t.title || '修繕任務'}`,
                    link: 'maintenance.html',
                });
            });

            // Expiring contracts (within 60 days)
            const nowDate = new Date();
            const sixtyDaysLater = new Date(nowDate.getTime() + 60 * 86400000);
            contracts.forEach(c => {
                if (!c.endDate) return;
                const end = new Date(c.endDate);
                if (end >= nowDate && end <= sixtyDaysLater) {
                    const daysLeft = Math.ceil((end - nowDate) / 86400000);
                    todos.push({
                        type: 'contract',
                        icon: 'fa-file-contract',
                        color: 'amber',
                        title: '合約即將到期',
                        desc: `${c.tenantName || '房客'}・${c.roomNumber || ''}・剩 ${daysLeft} 天`,
                        link: 'contracts.html',
                    });
                }
            });

            document.getElementById('todo-count').textContent = todos.length;

            if (todos.length === 0) {
                todoList.innerHTML = `
                    <div class="text-center py-8">
                        <div class="w-12 h-12 bg-emerald-50 rounded-full flex items-center justify-center mx-auto mb-3">
                            <i class="fas fa-check text-secondary text-lg"></i>
                        </div>
                        <p class="text-sm text-gray-400">目前沒有待辦事項 🎉</p>
                    </div>
                `;
            } else {
                const colorMap = {
                    red: { bg: 'bg-red-50', text: 'text-red-500', border: 'border-red-100' },
                    amber: { bg: 'bg-amber-50', text: 'text-amber-500', border: 'border-amber-100' },
                    blue: { bg: 'bg-blue-50', text: 'text-blue-500', border: 'border-blue-100' },
                };
                todoList.innerHTML = todos.map(t => {
                    const c = colorMap[t.color] || colorMap.blue;
                    return `
                        <a href="${t.link}" class="flex items-start gap-3 p-3 rounded-lg border ${c.border} hover:shadow-sm transition-shadow">
                            <div class="w-8 h-8 ${c.bg} rounded-lg flex items-center justify-center shrink-0 mt-0.5">
                                <i class="fas ${t.icon} ${c.text} text-sm"></i>
                            </div>
                            <div class="min-w-0">
                                <p class="text-xs font-semibold ${c.text}">${t.title}</p>
                                <p class="text-sm text-gray-600 truncate">${t.desc}</p>
                            </div>
                            <i class="fas fa-chevron-right text-gray-300 text-xs mt-2 shrink-0"></i>
                        </a>
                    `;
                }).join('');
            }

            // --- Recent Activity ---
            const activityList = document.getElementById('activity-list');
            const activities = [
                { icon: 'fa-user-plus', color: 'blue', title: '新房客入住', desc: '趙珮琪 已入住 A301，合約期間 2025/05/01 - 2026/04/30', time: '2 小時前' },
                { icon: 'fa-money-bill-wave', color: 'emerald', title: '租金已收款', desc: '林大偉 ・ A201 ・ NT$ 11,000 已入帳', time: '5 小時前' },
                { icon: 'fa-tools', color: 'amber', title: '修繕任務更新', desc: 'A101 冷氣不冷 已指派師傅，預計今日處理', time: '1 天前' },
                { icon: 'fa-file-contract', color: 'indigo', title: '合約即將到期提醒', desc: '王小明 的合約將於 45 天後到期（2025/06/15）', time: '1 天前' },
                { icon: 'fa-file-invoice-dollar', color: 'purple', title: '費用計算完成', desc: '2025年4月 電費分攤計算已完成，共 10 筆紀錄', time: '3 天前' },
                { icon: 'fa-camera', color: 'teal', title: '證據檔案上傳', desc: 'A201 入住前照片 5 張已上傳至雲端', time: '5 天前' },
            ];

            const iconColorMap = {
                blue: { bg: 'bg-blue-50', text: 'text-primary' },
                emerald: { bg: 'bg-emerald-50', text: 'text-secondary' },
                amber: { bg: 'bg-amber-50', text: 'text-amber-500' },
                indigo: { bg: 'bg-indigo-50', text: 'text-indigo-500' },
                purple: { bg: 'bg-purple-50', text: 'text-purple-500' },
                teal: { bg: 'bg-teal-50', text: 'text-teal-500' },
            };

            activityList.innerHTML = activities.map((a, i) => {
                const c = iconColorMap[a.color] || iconColorMap.blue;
                return `
                    <div class="flex gap-3 p-3 rounded-lg hover:bg-gray-50 transition-colors">
                        <div class="w-10 h-10 ${c.bg} rounded-full flex items-center justify-center shrink-0">
                            <i class="fas ${a.icon} ${c.text} text-sm"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-medium text-gray-700">${a.title}</p>
                            <p class="text-xs text-gray-400 mt-0.5 truncate">${a.desc}</p>
                        </div>
                        <span class="text-xs text-gray-300 whitespace-nowrap shrink-0">${a.time}</span>
                    </div>
                `;
            }).join('');
        }

        // ============================================================
        // Initialize
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            // Auth check
            firebase.auth().onAuthStateChanged(function(user) {
                if (!user) {
                    if (!window.location.pathname.includes('login.html')) {
                        window.location.href = 'login.html';
                    }
                } else {
                    updateUserInfo(user);
                    // Set avatar initials
                    const name = user.displayName || '使用者';
                    const initials = name.charAt(0);
                    const avatarEl = document.getElementById('user-avatar');
                    if (avatarEl) avatarEl.textContent = initials;
                }
                // Load dashboard data regardless (will use demo if not logged in for preview)
                loadDashboardData();
            });
        });
    </script>
</body>
</html>
