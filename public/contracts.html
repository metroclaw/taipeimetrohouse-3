<!-- 合約 Modal -->
<div id="contract-modal" class="fixed inset-0 bg-black/30 z-50 hidden flex items-center justify-center p-4">
  <div class="bg-white rounded-xl shadow-xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
    <div class="p-4 border-b border-gray-100 flex items-center justify-between"><h3 class="font-semibold text-gray-900" id="contract-modal-title">新增合約</h3><button onclick="closeContractModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button></div>
    <form id="contract-form" class="p-4 space-y-4">
      <input type="hidden" id="contract-id">
      <div><label class="block text-sm font-medium text-gray-700 mb-1">房客 *</label><select id="contract-tenant" required class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm"><option value="">選擇房客</option></select></div>
      <div class="grid grid-cols-2 gap-4">
        <div><label class="block text-sm font-medium text-gray-700 mb-1">建案 *</label><select id="contract-project" required onchange="populateContractRoomOptions()" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm"><option value="">選擇建案</option></select></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">房號 *</label><select id="contract-room" required class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm"><option value="">請先選擇建案</option></select></div>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div><label class="block text-sm font-medium text-gray-700 mb-1">開始日期 *</label><input type="date" id="contract-start" required class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm"></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">結束日期 *</label><input type="date" id="contract-end" required class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm"></div>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div><label class="block text-sm font-medium text-gray-700 mb-1">月租金 (NT$)</label><input type="number" id="contract-rent" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm"></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">押金 (NT$)</label><input type="number" id="contract-deposit" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm"></div>
      </div>
      <div class="space-y-3"><label class="block text-sm font-medium text-gray-700">費用計費方式</label>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-3 text-sm">
          <div class="border border-gray-100 rounded-lg p-3"><span class="text-gray-500 block mb-1">水費</span><select id="contract-water-split" class="w-full px-2 py-1 border border-gray-200 rounded text-sm"><option value="area">依坪數</option><option value="people">依人數</option><option value="usage">依照度數</option></select><label class="text-xs text-gray-400 mt-2 block">基本計費 NT$</label><input type="number" id="contract-water-base" min="0" step="1" class="w-full px-2 py-1 border border-gray-200 rounded text-sm"></div>
          <div class="border border-gray-100 rounded-lg p-3"><span class="text-gray-500 block mb-1">電費</span><select id="contract-elec-split" class="w-full px-2 py-1 border border-gray-200 rounded text-sm"><option value="ac">依台數</option><option value="people">依人數</option><option value="usage">依照度數</option></select><label class="text-xs text-gray-400 mt-2 block">基本計費 NT$</label><input type="number" id="contract-elec-base" min="0" step="1" class="w-full px-2 py-1 border border-gray-200 rounded text-sm"></div>
          <div class="border border-gray-100 rounded-lg p-3"><span class="text-gray-500 block mb-1">瓦斯費</span><select id="contract-gas-split" class="w-full px-2 py-1 border border-gray-200 rounded text-sm"><option value="people">依人數</option><option value="area">依坪數</option><option value="usage">依照度數</option></select><label class="text-xs text-gray-400 mt-2 block">基本計費 NT$</label><input type="number" id="contract-gas-base" min="0" step="1" class="w-full px-2 py-1 border border-gray-200 rounded text-sm"></div>
        </div>
      </div>
      <div><label class="block text-sm font-medium text-gray-700 mb-1">網路／第四台費用 (NT$)</label><input type="number" id="contract-internet-tv-fee" min="0" step="1" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm"></div>
      <div><label class="block text-sm font-medium text-gray-700 mb-1">室內狀況照片（張數不定，存到 Google Drive）</label><input type="file" id="contract-interior-photos" multiple accept="image/*" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm"><div id="contract-existing-photos" class="mt-2 flex flex-wrap gap-2"></div></div>
      <div class="grid md:grid-cols-2 gap-4">
        <div><label class="block text-sm font-medium text-gray-700 mb-1">暫時簽約 PDF</label><input type="file" id="contract-signing-pdf" accept="application/pdf,.pdf" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm"><p class="mt-1 text-[11px] text-gray-400">簽約流程中先保存草稿/待簽 PDF。</p></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">正式簽約檔案 PDF</label><input type="file" id="contract-signed-pdf" accept="application/pdf,.pdf" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm"><p class="mt-1 text-[11px] text-gray-400">上傳後會成為目前合約主檔，覆蓋暫時檔案顯示。</p></div>
      </div>
      <div id="contract-existing-files" class="hidden rounded-lg border border-blue-100 bg-blue-50/60 p-3 text-xs text-blue-700 space-y-1"></div>
      <div><label class="block text-sm font-medium text-gray-700 mb-1">備註</label><textarea id="contract-notes" rows="2" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm"></textarea></div>
      <div class="flex gap-3 pt-2"><button type="button" onclick="closeContractModal()" class="flex-1 px-4 py-2 border border-gray-200 text-gray-600 rounded-lg text-sm">取消</button><button type="submit" class="flex-1 px-4 py-2 bg-primary text-white rounded-lg text-sm font-medium">儲存</button></div>
    </form>
  </div>
</div>
<script>
let contractsData = [], tenantsData = [], roomsData = [], projectsData = [];
async function loadContracts() {
    const uid = getCurrentUserUid(); if (!uid) return;
    try {
        const [cSnap, tSnap, pSnap] = await Promise.all([
            db.collection('users').doc(uid).collection('contracts').get(),
            db.collection('users').doc(uid).collection('tenants').get(),
            db.collection('users').doc(uid).collection('projects').get()
        ]);
        contractsData = cSnap.docs.map(d => ({ id: d.id, ...d.data() }));
        tenantsData = tSnap.docs.map(d => ({ id: d.id, ...d.data() }));
        projectsData = pSnap.docs.map(d => ({ id: d.id, ...d.data() }));
        roomsData = [];
        for (const projectDoc of pSnap.docs) {
            const project = { id: projectDoc.id, ...projectDoc.data() };
            const rSnap = await db.collection('users').doc(uid).collection('projects').doc(project.id).collection('rooms').get();
            roomsData = roomsData.concat(rSnap.docs.map(d => ({ id: d.id, projectId: project.id, projectName: project.name || project.address || '', ...d.data() })));
        }
        renderContracts();
    } catch (e) { console.error(e); showToast('載入合約失敗', 'error'); }
}
function h(value) { return String(value ?? '').replace(/[&<>"']/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char])); }
function contractRoomLabel(c) { return [c.projectName, c.roomNumber || c.room].filter(Boolean).join(' / ') || '—'; }
function getContractFileLink(file, label) {
    if (!file) return '';
    const url = file.webViewLink || file.webContentLink || file.url || '';
    if (!url) return '';
    return `<a href="${h(url)}" target="_blank" class="inline-flex items-center gap-1 text-xs px-2 py-1 rounded bg-blue-50 text-primary hover:bg-blue-100"><i class="fas fa-file-pdf"></i>${h(label || file.driveFileName || file.fileName || 'PDF')}</a>`;
}
function renderContractFileLinks(contract) {
    const active = contract.signedContractFile || contract.contractFile || contract.signingPdfFile || null;
    const links = [];
    if (contract.signedContractFile) links.push(getContractFileLink(contract.signedContractFile, '正式檔案'));
    if (!contract.signedContractFile && contract.signingPdfFile) links.push(getContractFileLink(contract.signingPdfFile, '暫時 PDF'));
    if (!links.length && active) links.push(getContractFileLink(active, active.fileStage === 'signed' ? '正式檔案' : '暫時 PDF'));
    return links.filter(Boolean).join(' ');
}
function renderExistingContractFiles(contract) {
    const box = document.getElementById('contract-existing-files');
    if (!box) return;
    const lines = [
        getContractFileLink(contract.signingPdfFile, '目前暫時簽約 PDF'),
        getContractFileLink(contract.signedContractFile, '目前正式簽約檔案')
    ].filter(Boolean);
    if (!lines.length) {
        box.classList.add('hidden');
        box.innerHTML = '';
        return;
    }
    box.classList.remove('hidden');
    box.innerHTML = '<div class="font-medium text-blue-800 mb-1">已保存合約檔案</div>' + lines.map(line => `<div>${line}</div>`).join('');
}
function populateContractRoomOptions(selectedRoomId = '') {
    const projectId = document.getElementById('contract-project')?.value || '';
    const roomSel = document.getElementById('contract-room');
    if (!roomSel) return;
    const rooms = roomsData.filter(r => r.projectId === projectId);
    roomSel.innerHTML = '<option value="">選擇房號</option>' + rooms.map(r => `<option value="${r.id}" ${r.id === selectedRoomId ? 'selected' : ''}>${r.number || r.roomNumber || r.id}</option>`).join('');
}
function renderContracts() {
    const tbody = document.getElementById('contracts-table-body');
    if (contractsData.length === 0) { tbody.innerHTML = '<tr><td colspan="8" class="px-4 py-8 text-center text-gray-400">尚無合約，請先新增房客與客房後建立合約</td></tr>'; document.getElementById('expiring-contracts').innerHTML = '無即將到期的合約'; return; }
    tbody.innerHTML = contractsData.map(c => {
        const statusColor = c.status === '進行中' ? 'bg-secondary/10 text-secondary' : c.status === '即將到期' ? 'bg-amber-100 text-amber-600' : 'bg-gray-100 text-gray-500';
        return `<tr class="hover:bg-gray-50">
            <td class="px-4 py-3 text-sm font-medium text-gray-900">${c.tenantName || '—'}</td>
            <td class="px-4 py-3 text-sm text-gray-600">${contractRoomLabel(c)}</td>
            <td class="px-4 py-3 text-sm text-gray-600">${c.start || '—'} ~ ${c.end || '—'}</td>
            <td class="px-4 py-3 text-sm font-medium text-gray-900">${formatCurrency(c.rent)}</td>
            <td class="px-4 py-3 text-sm text-gray-600">${formatCurrency(c.deposit)}</td>
            <td class="px-4 py-3 text-sm text-gray-600">${renderContractFileLinks(c) || '<span class="text-gray-400">—</span>'}</td>
            <td class="px-4 py-3"><span class="text-xs ${statusColor} px-2 py-1 rounded-full">${c.status || '進行中'}</span></td>
            <td class="px-4 py-3"><button onclick="editContract('${c.id}')" class="text-sm text-primary hover:underline mr-2">編輯</button><button onclick="renewContract('${c.id}')" class="text-sm text-secondary hover:underline mr-2">續約</button></td>
        </tr>`;
    }).join('');
    const today = new Date();
    const expiring = contractsData.filter(c => c.end && Math.ceil((new Date(c.end) - today) / 86400000) <= 60 && Math.ceil((new Date(c.end) - today) / 86400000) >= 0);
    document.getElementById('expiring-contracts').innerHTML = expiring.length > 0 ? expiring.map(c => `<div>• ${c.tenantName || '—'} — ${contractRoomLabel(c)}，${c.end} 到期（剩 ${Math.ceil((new Date(c.end) - today) / 86400000)} 天）</div>`).join('') : '無即將到期的合約';
}
function openContractModal() {
    document.getElementById('contract-modal').classList.remove('hidden');
    document.getElementById('contract-modal-title').textContent = '新增合約';
    document.getElementById('contract-form').reset();
    document.getElementById('contract-id').value = '';
    const tSel = document.getElementById('contract-tenant');
    tSel.innerHTML = '<option value="">選擇房客</option>' + tenantsData.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
    const pSel = document.getElementById('contract-project');
    pSel.innerHTML = '<option value="">選擇建案</option>' + projectsData.map(p => `<option value="${p.id}">${p.name || p.address || '未命名建案'}</option>`).join('');
    populateContractRoomOptions();
    document.getElementById('contract-existing-photos').innerHTML = '';
    document.getElementById('contract-existing-files').classList.add('hidden');
    document.getElementById('contract-existing-files').innerHTML = '';
}
function closeContractModal() { document.getElementById('contract-modal').classList.add('hidden'); }
function editContract(id) {
    const c = contractsData.find(x => x.id === id); if (!c) return;
    openContractModal();
    document.getElementById('contract-modal-title').textContent = '編輯合約';
    document.getElementById('contract-id').value = id;
    document.getElementById('contract-tenant').value = c.tenantId || '';
    document.getElementById('contract-project').value = c.projectId || '';
    populateContractRoomOptions(c.roomId || '');
    document.getElementById('contract-start').value = c.start || '';
    document.getElementById('contract-end').value = c.end || '';
    document.getElementById('contract-rent').value = c.rent || '';
    document.getElementById('contract-deposit').value = c.deposit || '';
    document.getElementById('contract-water-split').value = c.waterSplit || 'area';
    document.getElementById('contract-elec-split').value = c.elecSplit || 'ac';
    document.getElementById('contract-gas-split').value = c.gasSplit || 'people';
    document.getElementById('contract-water-base').value = c.waterBaseFee || '';
    document.getElementById('contract-elec-base').value = c.elecBaseFee || '';
    document.getElementById('contract-gas-base').value = c.gasBaseFee || '';
    document.getElementById('contract-internet-tv-fee').value = c.internetTvFee || '';
    document.getElementById('contract-notes').value = c.notes || '';
    const photos = c.interiorConditionPhotos || [];
    document.getElementById('contract-existing-photos').innerHTML = photos.map(photo => `<a href="${photo.webViewLink || photo.url}" target="_blank" class="text-xs px-2 py-1 bg-blue-50 text-primary rounded"><i class="fas fa-image mr-1"></i>${photo.driveFileName || '室內照片'}</a>`).join('');
    renderExistingContractFiles(c);
}
async function renewContract(id) {
    const c = contractsData.find(x => x.id === id); if (!c) return;
    if (!confirm(`確定要為 ${c.tenantName} 續約？將自動延長一年。`)) return;
    const uid = getCurrentUserUid();
    const endDate = new Date(c.end);
    const newEnd = new Date(endDate.setFullYear(endDate.getFullYear() + 1)).toISOString().split('T')[0];
    try {
        const batch = db.batch();
        batch.update(db.collection('users').doc(uid).collection('contracts').doc(id), { end: newEnd, status: '進行中' });
        if (c.tenantId) batch.update(db.collection('users').doc(uid).collection('tenants').doc(c.tenantId), { contractEnd: newEnd });
        await batch.commit();
        showToast('已續約一年'); loadContracts();
    } catch (e) { console.error(e); showToast('續約失敗', 'error'); }
}
document.getElementById('contract-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const uid = getCurrentUserUid(); if (!uid) return;
    const tenantSelect = document.getElementById('contract-tenant');
    const projectSelect = document.getElementById('contract-project');
    const roomSelect = document.getElementById('contract-room');
    const selectedTenant = tenantsData.find(t => t.id === tenantSelect.value);
    const selectedRoom = roomsData.find(r => r.id === roomSelect.value && r.projectId === projectSelect.value);
    if (!selectedTenant || !selectedRoom) { showToast('請選擇房客、建案與房號', 'error'); return; }
    const existingContract = contractsData.find(x => x.id === document.getElementById('contract-id').value);
    const interiorConditionPhotos = existingContract?.interiorConditionPhotos ? [...existingContract.interiorConditionPhotos] : [];
    let signingPdfFile = existingContract?.signingPdfFile || null;
    let signedContractFile = existingContract?.signedContractFile || null;
    let contractFile = existingContract?.contractFile || signedContractFile || signingPdfFile || null;
    const photoInput = document.getElementById('contract-interior-photos');
    if (photoInput?.files?.length) {
        for (const file of Array.from(photoInput.files)) {
            const uploaded = await uploadFileToProjectDrive(file, '合約管理', [selectedRoom.projectName || selectedRoom.projectId, selectedRoom.number || selectedRoom.id, '室內狀況照片']);
            interiorConditionPhotos.push({ ...uploaded, fileName: file.name, fileType: file.type, fileSize: file.size, uploadedAt: Date.now() });
        }
    }
    const signingInput = document.getElementById('contract-signing-pdf');
    if (signingInput?.files?.[0]) {
        const file = signingInput.files[0];
        const uploaded = await uploadFileToProjectDrive(file, '合約管理', [selectedRoom.projectName || selectedRoom.projectId, selectedRoom.number || selectedRoom.id, '簽約PDF', '暫時檔案']);
        signingPdfFile = { ...uploaded, fileName: file.name, fileType: file.type, fileSize: file.size, fileStage: 'temporary', uploadedAt: Date.now() };
        if (!signedContractFile) contractFile = signingPdfFile;
    }
    const signedInput = document.getElementById('contract-signed-pdf');
    if (signedInput?.files?.[0]) {
        const file = signedInput.files[0];
        const uploaded = await uploadFileToProjectDrive(file, '合約管理', [selectedRoom.projectName || selectedRoom.projectId, selectedRoom.number || selectedRoom.id, '簽約PDF', '正式檔案']);
        signedContractFile = { ...uploaded, fileName: file.name, fileType: file.type, fileSize: file.size, fileStage: 'signed', uploadedAt: Date.now() };
        contractFile = signedContractFile;
    }
    const data = {
        tenantId: selectedTenant.id,
        tenantName: selectedTenant.name || '',
        projectId: selectedRoom.projectId,
        projectName: selectedRoom.projectName || '',
        roomId: selectedRoom.id,
        roomNumber: selectedRoom.number || '',
        room: selectedRoom.number || '',
        start: document.getElementById('contract-start').value,
        end: document.getElementById('contract-end').value,
        rent: parseInt(document.getElementById('contract-rent').value) || selectedRoom.rent || 0,
        deposit: parseInt(document.getElementById('contract-deposit').value) || 0,
        waterSplit: document.getElementById('contract-water-split').value,
        elecSplit: document.getElementById('contract-elec-split').value,
        gasSplit: document.getElementById('contract-gas-split').value,
        waterBaseFee: parseInt(document.getElementById('contract-water-base').value, 10) || 0,
        elecBaseFee: parseInt(document.getElementById('contract-elec-base').value, 10) || 0,
        gasBaseFee: parseInt(document.getElementById('contract-gas-base').value, 10) || 0,
        internetTvFee: parseInt(document.getElementById('contract-internet-tv-fee').value, 10) || 0,
        interiorConditionPhotos,
        signingPdfFile,
        signedContractFile,
        contractFile,
        contractFileStage: signedContractFile ? 'signed' : (signingPdfFile ? 'temporary' : ''),
        driveWorkspacePath: getDriveWorkspacePath('合約管理', [selectedRoom.projectName || selectedRoom.projectId, selectedRoom.number || selectedRoom.id]),
        notes: document.getElementById('contract-notes').value,
        status: '進行中',
        updatedAt: Date.now()
    };
    const id = document.getElementById('contract-id').value;
    try {
        const userRef = db.collection('users').doc(uid);
        const contractRef = id ? userRef.collection('contracts').doc(id) : userRef.collection('contracts').doc();
        const batch = db.batch();
        if (id) batch.update(contractRef, data); else batch.set(contractRef, { ...data, createdAt: Date.now() });
        batch.update(userRef.collection('projects').doc(selectedRoom.projectId).collection('rooms').doc(selectedRoom.id), {
            status: '已出租', tenantId: selectedTenant.id, tenantName: selectedTenant.name || '', tenant: selectedTenant.name || '', contractId: contractRef.id, updatedAt: Date.now()
        });
        batch.update(userRef.collection('tenants').doc(selectedTenant.id), {
            status: '已承租', roomId: selectedRoom.id, roomNumber: selectedRoom.number || '', room: selectedRoom.number || '', projectId: selectedRoom.projectId, projectName: selectedRoom.projectName || '', contractId: contractRef.id, contractStart: data.start, contractEnd: data.end, rent: data.rent, updatedAt: Date.now()
        });
        await batch.commit();
        showToast(id ? '合約已更新' : '合約已新增');
        closeContractModal(); loadContracts();
    } catch (e) { console.error(e); showToast('儲存失敗', 'error'); }
});
document.addEventListener('DOMContentLoaded', () => onAuthReady(user => { if (user) loadContracts(); }));
</script>
