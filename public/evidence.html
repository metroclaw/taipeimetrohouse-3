<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RentalHub — 證據保存</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{primary:'#2563EB',secondary:'#10B981',bg:'#F8FAFC'}}}}</script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="js/app.js"></script>
<style>.sidebar-item.active{background:#2563EB15;color:#2563EB;font-weight:600}</style>
</head>
<body class="bg-bg min-h-screen">
<nav class="bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between sticky top-0 z-50">
  <div class="flex items-center gap-4"><button class="lg:hidden text-gray-600" onclick="document.getElementById('sidebar').classList.toggle('hidden')"><i class="fas fa-bars text-xl"></i></button><div class="flex items-center gap-2"><div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center"><span class="text-white font-bold text-sm">R</span></div><span class="font-bold text-lg text-gray-900">RentalHub</span></div></div>
  <div class="flex items-center gap-3"><button class="relative p-2 text-gray-500 hover:bg-gray-100 rounded-lg"><i class="fas fa-bell"></i><span class="absolute top-1 right-1 w-4 h-4 bg-red-500 text-white text-xs rounded-full flex items-center justify-center">3</span></button><div class="flex items-center gap-2 cursor-pointer" onclick="handleSignOut()"><div class="w-8 h-8 bg-primary/10 rounded-full flex items-center justify-center"><i class="fas fa-user text-primary text-sm"></i></div><span class="text-sm text-gray-700 hidden sm:inline">登出</span></div></div>
</nav>
<div class="flex">
  <aside id="sidebar" class="hidden lg:block w-56 bg-white border-r border-gray-200 min-h-[calc(100vh-57px)] p-3 fixed lg:sticky top-[57px] z-40 overflow-y-auto">
    <nav class="space-y-1 text-sm">
      <a href="dashboard.html" class="sidebar-item flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded-lg"><i class="fas fa-home w-5"></i>主控台</a>
      <a href="projects.html" class="sidebar-item flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded-lg"><i class="fas fa-building w-5"></i>建案管理</a>
      <a href="tenants.html" class="sidebar-item flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded-lg"><i class="fas fa-users w-5"></i>房客管理</a>
      <a href="contracts.html" class="sidebar-item flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded-lg"><i class="fas fa-file-contract w-5"></i>合約管理</a>
      <a href="rent.html" class="sidebar-item flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded-lg"><i class="fas fa-money-bill w-5"></i>租金管理</a>
      <a href="billing.html" class="sidebar-item flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded-lg"><i class="fas fa-calculator w-5"></i>費用計算</a>
      <a href="maintenance.html" class="sidebar-item flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded-lg"><i class="fas fa-tools w-5"></i>修繕派工</a>
      <a href="evidence.html" class="sidebar-item active flex items-center gap-3 px-3 py-2 rounded-lg"><i class="fas fa-camera w-5"></i>證據保存</a>
      <a href="settings.html" class="sidebar-item flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded-lg"><i class="fas fa-cog w-5"></i>設定</a>
    </nav>
  </aside>
  <main class="flex-1 p-4 lg:p-6">
    <div class="flex items-center justify-between mb-6">
      <div><h1 class="text-2xl font-bold text-gray-900">證據保存</h1><p class="text-sm text-gray-500 mt-1">屋況照片、溝通紀錄、收據、合約文件</p></div>
      <label class="flex items-center gap-2 px-4 py-2 bg-primary text-white rounded-lg text-sm font-medium cursor-pointer hover:bg-primary/90">
        <i class="fas fa-upload"></i>上傳檔案
        <input type="file" id="file-upload" multiple accept="image/*,.pdf,.doc,.docx" class="hidden" onchange="handleFileUpload(this)">
      </label>
    </div>
    <!-- 篩選 -->
    <div class="flex flex-wrap gap-2 mb-6">
      <button class="filter-btn active px-3 py-1.5 bg-primary text-white rounded-lg text-sm" data-filter="all">全部</button>
      <button class="filter-btn px-3 py-1.5 bg-white border border-gray-200 text-gray-600 rounded-lg text-sm" data-filter="屋況">🏠 屋況照片</button>
      <button class="filter-btn px-3 py-1.5 bg-white border border-gray-200 text-gray-600 rounded-lg text-sm" data-filter="溝通">💬 溝通紀錄</button>
      <button class="filter-btn px-3 py-1.5 bg-white border border-gray-200 text-gray-600 rounded-lg text-sm" data-filter="收據">🧾 收據/發票</button>
      <button class="filter-btn px-3 py-1.5 bg-white border border-gray-200 text-gray-600 rounded-lg text-sm" data-filter="合約">📄 合約文件</button>
      <button class="filter-btn px-3 py-1.5 bg-white border border-gray-200 text-gray-600 rounded-lg text-sm" data-filter="修繕">🔧 修繕紀錄</button>
    </div>
    <!-- 檔案網格 -->
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4" id="evidence-grid">
      <!-- 由 JS 動態產生 -->
    </div>
  </main>
</div>
<script>
const evidenceData = [
    { name: 'A1 入住前客廳', date: '2026/05/01', type: '屋況', icon: '🏠', color: 'from-blue-50 to-blue-100' },
    { name: 'A2 李小華 LINE 對話', date: '2026/05/10', type: '溝通', icon: '💬', color: 'from-green-50 to-green-100' },
    { name: 'A1 冷氣修繕收據', date: '2026/05/15', type: '收據', icon: '🧾', color: 'from-amber-50 to-amber-100' },
    { name: 'A5 陳小龍合約', date: '2026/04/01', type: '合約', icon: '📄', color: 'from-purple-50 to-purple-100' },
    { name: 'B2 漏水修復前後', date: '2026/05/12', type: '修繕', icon: '🔧', color: 'from-red-50 to-red-100' },
    { name: 'C1 退租檢查', date: '2026/05/18', type: '屋況', icon: '🏠', color: 'from-blue-50 to-blue-100' },
    { name: 'A3 張小美 簽約照片', date: '2026/03/01', type: '合約', icon: '📄', color: 'from-purple-50 to-purple-100' },
    { name: 'B1 林小婷 收據', date: '2026/05/02', type: '收據', icon: '🧾', color: 'from-amber-50 to-amber-100' },
];
const typeColors = { '屋況': 'bg-blue-100 text-blue-600', '溝通': 'bg-green-100 text-green-600', '收據': 'bg-amber-100 text-amber-600', '合約': 'bg-purple-100 text-purple-600', '修繕': 'bg-red-100 text-red-600' };
function renderEvidence(filter = 'all') {
    const grid = document.getElementById('evidence-grid');
    const filtered = filter === 'all' ? evidenceData : evidenceData.filter(e => e.type === filter);
    if (filtered.length === 0) { grid.innerHTML = '<div class="col-span-full text-center text-gray-400 py-8">無檔案</div>'; return; }
    grid.innerHTML = filtered.map(e => `
        <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden group cursor-pointer hover:shadow-md transition">
            <div class="aspect-square bg-gradient-to-br ${e.color} flex items-center justify-center relative">
                <span class="text-4xl">${e.icon}</span>
                <div class="absolute inset-0 bg-black/0 group-hover:bg-black/10 transition flex items-center justify-center opacity-0 group-hover:opacity-100"><i class="fas fa-expand text-white text-xl"></i></div>
            </div>
            <div class="p-3">
                <p class="text-sm font-medium text-gray-900 truncate">${e.name}</p>
                <div class="flex items-center justify-between mt-1"><span class="text-xs text-gray-400">${e.date}</span><span class="text-xs ${typeColors[e.type] || 'bg-gray-100 text-gray-500'} px-1.5 py-0.5 rounded">${e.type}</span></div>
            </div>
        </div>
    `).join('') + `
    <label class="border-2 border-dashed border-gray-200 rounded-xl flex flex-col items-center justify-center aspect-square cursor-pointer hover:border-primary/50 hover:bg-primary/5 transition">
        <i class="fas fa-plus text-2xl text-gray-300 mb-2"></i>
        <span class="text-sm text-gray-400">上傳檔案</span>
        <input type="file" multiple accept="image/*,.pdf" class="hidden" onchange="handleFileUpload(this)">
    </label>`;
}
function handleFileUpload(input) {
    if (input.files.length > 0) { showToast(`已選擇 ${input.files.length} 個檔案（上傳功能需設定 Firebase Storage）`, 'info'); }
}
document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => { b.classList.remove('bg-primary', 'text-white'); b.classList.add('bg-white', 'text-gray-600'); });
        btn.classList.add('bg-primary', 'text-white'); btn.classList.remove('bg-white', 'text-gray-600');
        renderEvidence(btn.dataset.filter);
    });
});
document.addEventListener('DOMContentLoaded', () => renderEvidence());
</script>
</body>
</html>
