<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大都會物業房務管理系統 — 帳號管理</title>

<script>tailwind.config={theme:{extend:{colors:{primary:'#2563EB',secondary:'#10B981',bg:'#F8FAFC'}}}}</script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<style>
.sidebar-item{display:flex;align-items:center;gap:.75rem;padding:.625rem .75rem!important;border-radius:.5rem;font-size:.875rem;line-height:1.25rem;min-height:2.5rem;color:#4b5563;transition:background-color .15s,color .15s}.sidebar-item i{width:1.25rem!important;text-align:center}.sidebar-item:hover{background:#f9fafb;color:#2563EB}.sidebar-item.active{background:#2563EB15;color:#2563EB;font-weight:600}
.form-label{display:block;font-size:.875rem;font-weight:500;color:#374151;margin-bottom:.375rem}
.form-input{width:100%;padding:.625rem .75rem;border:1px solid #e5e7eb;border-radius:.5rem;font-size:.875rem;background:white}
.form-input:disabled{background:#f9fafb;color:#9ca3af}
</style>
</head>
<body class="bg-bg min-h-screen">
<nav class="bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between sticky top-0 z-50">
  <div class="flex items-center gap-4"><button class="lg:hidden text-gray-600" onclick="document.getElementById('sidebar').classList.toggle('hidden')"><i class="fas fa-bars text-xl"></i></button><div class="flex items-center gap-2"><div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center"><span class="text-white font-bold text-sm">M</span></div><span class="font-bold text-base lg:text-lg text-gray-900">大都會物業房務管理系統</span></div></div>
  <div class="flex items-center gap-3 relative">
    <button class="relative p-2 text-gray-500 hover:bg-gray-100 rounded-lg"><i class="fas fa-bell"></i></button>
    <div class="relative">
      <button id="user-menu-button" type="button" onclick="toggleUserMenu(event)" class="w-9 h-9 bg-primary/10 rounded-full flex items-center justify-center overflow-hidden ring-2 ring-transparent hover:ring-primary/20 transition" title="帳號選單">
        <div id="user-avatar" class="w-full h-full flex items-center justify-center"><i class="fas fa-user text-primary text-sm"></i></div>
      </button>
      <div id="user-menu" class="hidden absolute right-0 mt-2 w-48 bg-white border border-gray-100 rounded-xl shadow-lg py-2 z-[60]">
        <div class="px-4 py-2 border-b border-gray-100">
          <p id="user-name" class="text-sm font-medium text-gray-900 truncate">使用者</p>
          <p id="user-email" class="text-xs text-gray-500 truncate"></p>
        </div>
        <a href="account-info.html" class="flex items-center gap-2 px-4 py-2 text-sm text-gray-700 hover:bg-gray-50"><i class="fas fa-user-cog w-4 text-gray-400"></i>帳號設定</a>
        <button type="button" onclick="handleSignOut()" class="w-full flex items-center gap-2 px-4 py-2 text-sm text-red-600 hover:bg-red-50 text-left"><i class="fas fa-sign-out-alt w-4"></i>登出</button>
      </div>
    </div>
  </div>
</nav>
<div class="flex">
  <aside id="sidebar" class="hidden lg:block w-56 bg-white border-r border-gray-200 min-h-[calc(100vh-57px)] p-3 fixed lg:sticky top-[57px] z-40 overflow-y-auto">
    <nav class="space-y-1 text-sm">
      <a href="dashboard.html" class="sidebar-item text-gray-600"><i class="fas fa-home w-5"></i>主控台</a>
      <a href="projects.html" class="sidebar-item text-gray-600"><i class="fas fa-building w-5"></i>建案管理</a>
      <a href="tenants.html" class="sidebar-item text-gray-600"><i class="fas fa-users w-5"></i>房客管理</a>
      <a href="contracts.html" class="sidebar-item text-gray-600"><i class="fas fa-file-contract w-5"></i>合約管理</a>
      <a href="rent.html" class="sidebar-item text-gray-600"><i class="fas fa-money-bill w-5"></i>租金管理</a>
      <a href="billing.html" class="sidebar-item text-gray-600"><i class="fas fa-calculator w-5"></i>費用計算</a>
      <a href="maintenance.html" class="sidebar-item text-gray-600"><i class="fas fa-tools w-5"></i>修繕派工</a>
      <a href="calendar.html" class="sidebar-item text-gray-600"><i class="fas fa-calendar-days w-5"></i>行事曆</a>
      <a href="evidence.html" class="sidebar-item text-gray-600"><i class="fas fa-camera w-5"></i>證據保存</a>
      <a href="accounts.html" class="sidebar-item active"><i class="fas fa-user-shield w-5"></i>帳號管理</a>
      <a href="settings.html" class="sidebar-item text-gray-600"><i class="fas fa-cog w-5"></i>設定</a>
    </nav>
  </aside>
  <main class="flex-1 p-4 lg:p-6">
    <div class="flex items-center justify-between mb-6">
      <div><h1 class="text-2xl font-bold text-gray-900">帳號管理</h1><p class="text-sm text-gray-500 mt-1">查看所有帳號資料，點擊頭像切換顯示，編輯按鈕修改帳號資訊。</p></div>
    </div>

    <!-- 目前登入帳號區塊 -->
    <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5 mb-6">
      <div class="flex items-center gap-2 mb-4"><i class="fas fa-id-card text-primary"></i><h2 class="font-semibold text-gray-900">目前登入帳號</h2><span id="viewing-label" class="text-xs text-gray-400 ml-1"></span></div>
      <div class="flex flex-col md:flex-row gap-6">
        <div class="flex flex-col items-center gap-3">
          <div id="current-photo" class="w-20 h-20 bg-primary/10 rounded-full flex items-center justify-center overflow-hidden"><i class="fas fa-user text-primary text-2xl"></i></div>
          <span id="current-role-badge" class="inline-flex px-3 py-1 rounded-full bg-primary/10 text-primary text-xs font-medium">—</span>
        </div>
        <div class="flex-1 grid sm:grid-cols-2 gap-4 text-sm">
          <div><p class="text-gray-400 mb-1">顯示名稱</p><p id="current-name" class="font-medium text-gray-900">載入中...</p></div>
          <div><p class="text-gray-400 mb-1">Email</p><p id="current-email" class="font-medium text-gray-900 break-all">—</p></div>
          <div><p class="text-gray-400 mb-1">角色</p><p id="current-role" class="font-medium text-gray-900">—</p></div>
          <div><p class="text-gray-400 mb-1">狀態</p><p id="current-status" class="font-medium text-gray-900">—</p></div>
          <div><p class="text-gray-400 mb-1">聯絡電話</p><p id="current-phone" class="font-medium text-gray-900">—</p></div>
          <div><p class="text-gray-400 mb-1">寄件地址</p><p id="current-address" class="font-medium text-gray-900">—</p></div>
          <div><p class="text-gray-400 mb-1">帳號建立日期</p><p id="current-created" class="font-medium text-gray-700">—</p></div>
          <div><p class="text-gray-400 mb-1">最近登入日期</p><p id="current-lastlogin" class="font-medium text-gray-700">—</p></div>
        </div>
      </div>
    </div>

    <!-- 帳號列表 -->
    <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
      <div class="px-5 py-4 border-b border-gray-100 flex items-center justify-between"><h2 class="font-semibold text-gray-900">所有帳號列表</h2><span id="account-count" class="text-xs text-gray-400">載入中</span></div>
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead><tr class="bg-gray-50 text-left"><th class="px-4 py-3 text-xs font-medium text-gray-500 uppercase">帳號</th><th class="px-4 py-3 text-xs font-medium text-gray-500 uppercase">角色</th><th class="px-4 py-3 text-xs font-medium text-gray-500 uppercase">狀態</th><th class="px-4 py-3 text-xs font-medium text-gray-500 uppercase">最近登入</th><th class="px-4 py-3 text-xs font-medium text-gray-500 uppercase">操作</th></tr></thead>
          <tbody id="accounts-table-body" class="divide-y divide-gray-100"><tr><td colspan="5" class="px-4 py-8 text-center text-gray-400">載入中...</td></tr></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- 帳號編輯 Modal -->
<div id="edit-modal" class="hidden fixed inset-0 bg-black/40 z-[9998] flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
    <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between sticky top-0 bg-white rounded-t-2xl z-10">
      <h3 class="text-lg font-semibold text-gray-900"><i class="fas fa-user-edit text-primary mr-2"></i>編輯帳號資訊</h3>
      <button onclick="closeEditModal()" class="text-gray-400 hover:text-gray-600 p-1"><i class="fas fa-times text-lg"></i></button>
    </div>
    <form id="edit-form" class="p-6 space-y-5">
      <div class="flex items-center gap-4 pb-4 border-b border-gray-100">
        <div id="edit-photo" class="w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center overflow-hidden"><i class="fas fa-user text-primary text-xl"></i></div>
        <div><p id="edit-name-display" class="font-semibold text-gray-900">—</p><p id="edit-email-display" class="text-sm text-gray-500">—</p></div>
      </div>
      <div class="grid md:grid-cols-2 gap-4">
        <div><label class="form-label">顯示名稱</label><input id="edit-displayName" type="text" class="form-input" placeholder="請輸入顯示名稱"></div>
        <div><label class="form-label">聯絡電話</label><input id="edit-phone" type="tel" class="form-input" placeholder="例如：0912-345-678"></div>
      </div>
      <div><label class="form-label">寄件地址</label><input id="edit-mailingAddress" type="text" class="form-input" placeholder="請輸入收件地址"></div>
      <div class="grid md:grid-cols-2 gap-4 p-4 bg-amber-50/70 rounded-xl border border-amber-100">
        <div><label class="form-label">角色 <span class="text-xs text-amber-600">管理員</span></label><select id="edit-role" class="form-input admin-only"></select></div>
        <div><label class="form-label">狀態</label><select id="edit-status" class="form-input admin-only"><option value="啟用">啟用</option><option value="停用">停用</option></select></div>
      </div>
      <div class="grid md:grid-cols-2 gap-4">
        <label class="flex items-start gap-3 p-4 rounded-xl border border-gray-100 cursor-pointer hover:bg-gray-50"><input id="edit-tenantPaymentContractReminder" type="checkbox" class="mt-1 w-5 h-5 text-primary rounded"><span><b class="block text-gray-800">繳費／合約提醒</b><span class="text-sm text-gray-500">租金、費用、合約到期等提醒。</span></span></label>
        <label class="flex items-start gap-3 p-4 rounded-xl border border-gray-100 cursor-pointer hover:bg-gray-50"><input id="edit-workOrderReminder" type="checkbox" class="mt-1 w-5 h-5 text-primary rounded"><span><b class="block text-gray-800">工單提醒</b><span class="text-sm text-gray-500">修繕、清潔、派工更新提醒。</span></span></label>
      </div>
      <div class="flex justify-end gap-3 pt-2">
        <button type="button" onclick="closeEditModal()" class="px-4 py-2 rounded-lg border border-gray-200 text-gray-600 hover:bg-gray-50">取消</button>
        <button type="submit" class="px-5 py-2 rounded-lg bg-primary text-white font-medium hover:bg-primary/90"><i class="fas fa-save mr-1"></i>儲存變更</button>
      </div>
    </form>
  </div>
</div>

<script>
let currentAccount = null;
let accountsData = [];
let selectedUid = null;
let editingUid = null;
const roles = ['管理員','員工','房務','工務','租客','訪客'];

function tsLabel(value) {
  if (!value) return '—';
  const d = value.toDate ? value.toDate() : new Date(value.seconds ? value.seconds * 1000 : value);
  if (Number.isNaN(d.getTime())) return '—';
  return d.toLocaleString('zh-TW', { hour12: false });
}

async function loadAccountsPage() {
  const user = getCurrentUser();
  if (!user) return;
  try {
    showLoading();
    currentAccount = await ensureAccountProfile(user);
    accountsData = await getAllAccounts();
    selectedUid = user.uid;
    renderCurrentAccount();
    renderAccounts();
  } catch (e) {
    console.error(e);
    showToast('帳號資料載入失敗', 'error');
  } finally { hideLoading(); }
}

function renderCurrentAccount() {
  const account = accountsData.find(a => a.uid === selectedUid) || accountsData[0];
  if (!account) return;

  const isCurrentUser = selectedUid === getCurrentUserUid();
  const label = document.getElementById('viewing-label');
  if (label) label.textContent = isCurrentUser ? '（目前登入）' : '';

  document.getElementById('current-name').textContent = account.displayName || '未命名使用者';
  document.getElementById('current-email').textContent = account.email || '—';
  document.getElementById('current-role').textContent = account.role || '訪客';
  document.getElementById('current-status').textContent = account.status || '啟用';
  document.getElementById('current-phone').textContent = account.phone || '—';
  document.getElementById('current-address').textContent = account.mailingAddress || '—';
  document.getElementById('current-created').textContent = tsLabel(account.createdAt);
  document.getElementById('current-lastlogin').textContent = tsLabel(account.lastLoginAt);
  document.getElementById('current-role-badge').textContent = account.role || '訪客';

  const photo = account.photoURL || '';
  const photoEl = document.getElementById('current-photo');
  if (photo) {
    photoEl.innerHTML = `<img src="${photo}" class="w-full h-full object-cover" alt="avatar">`;
  } else {
    photoEl.innerHTML = '<i class="fas fa-user text-primary text-2xl"></i>';
  }
}

function renderAccounts() {
  const tbody = document.getElementById('accounts-table-body');
  document.getElementById('account-count').textContent = `${accountsData.length} 個帳號`;
  if (!accountsData.length) { tbody.innerHTML = '<tr><td colspan="5" class="px-4 py-8 text-center text-gray-400">尚無帳號</td></tr>'; return; }
  const isAdmin = currentAccount && currentAccount.role === '管理員';
  const currentUid = getCurrentUserUid();

  tbody.innerHTML = accountsData.map(a => {
    const isSelected = a.uid === selectedUid;
    const isCurrentUser = a.uid === currentUid;
    const photoHtml = a.photoURL
      ? `<img src="${a.photoURL}" class="w-full h-full object-cover" alt="avatar">`
      : '<i class="fas fa-user text-primary"></i>';
    const selectedClass = isSelected ? 'bg-blue-50 ring-2 ring-primary/20' : 'hover:bg-gray-50';
    const avatarClick = `onclick="selectAccount('${a.uid}')" style="cursor:pointer" title="點擊查看帳號資訊"`;

    return `<tr class="${selectedClass} transition-colors">
      <td class="px-4 py-3">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-full bg-primary/10 overflow-hidden flex items-center justify-center" ${avatarClick}>${photoHtml}</div>
          <div>
            <p class="text-sm font-medium text-gray-900">${a.displayName || '未命名使用者'}${isCurrentUser ? ' <span class="text-xs text-primary font-normal">（我）</span>' : ''}</p>
            <p class="text-xs text-gray-500">${a.email || '—'}</p>
          </div>
        </div>
      </td>
      <td class="px-4 py-3 text-sm text-gray-700">${a.role || '訪客'}</td>
      <td class="px-4 py-3"><span class="inline-flex px-2 py-0.5 rounded-full text-xs font-medium ${(a.status || '啟用') === '啟用' ? 'bg-emerald-50 text-emerald-700' : 'bg-red-50 text-red-700'}">${a.status || '啟用'}</span></td>
      <td class="px-4 py-3 text-sm text-gray-500">${tsLabel(a.lastLoginAt)}</td>
      <td class="px-4 py-3">
        <button onclick="openEditModal('${a.uid}')" class="inline-flex items-center gap-1 px-3 py-1.5 rounded-lg text-xs font-medium bg-primary/10 text-primary hover:bg-primary/20 transition" title="編輯帳號資訊">
          <i class="fas fa-pen"></i>編輯
        </button>
      </td>
    </tr>`;
  }).join('');
}

function selectAccount(uid) {
  selectedUid = uid;
  renderCurrentAccount();
  renderAccounts();
}

function openEditModal(uid) {
  const account = accountsData.find(a => a.uid === uid);
  if (!account) return;
  editingUid = uid;
  const isAdmin = currentAccount && currentAccount.role === '管理員';

  document.getElementById('edit-name-display').textContent = account.displayName || '未命名使用者';
  document.getElementById('edit-email-display').textContent = account.email || '—';
  document.getElementById('edit-displayName').value = account.displayName || '';
  document.getElementById('edit-phone').value = account.phone || '';
  document.getElementById('edit-mailingAddress').value = account.mailingAddress || '';
  document.getElementById('edit-role').value = account.role || '訪客';
  document.getElementById('edit-status').value = account.status || '啟用';
  document.getElementById('edit-tenantPaymentContractReminder').checked = account.tenantPaymentContractReminder !== false;
  document.getElementById('edit-workOrderReminder').checked = account.workOrderReminder !== false;

  // 角色下拉
  document.getElementById('edit-role').innerHTML = roles.map(r => `<option value="${r}" ${(account.role || '訪客') === r ? 'selected' : ''}>${r}</option>`).join('');

  // 管理員才能改角色和狀態
  document.querySelectorAll('.admin-only').forEach(el => el.disabled = !isAdmin);

  const photo = account.photoURL || '';
  const photoEl = document.getElementById('edit-photo');
  if (photo) {
    photoEl.innerHTML = `<img src="${photo}" class="w-full h-full object-cover" alt="avatar">`;
  } else {
    photoEl.innerHTML = '<i class="fas fa-user text-primary text-xl"></i>';
  }

  document.getElementById('edit-modal').classList.remove('hidden');
}

function closeEditModal() {
  document.getElementById('edit-modal').classList.add('hidden');
  editingUid = null;
}

document.getElementById('edit-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  if (!editingUid) return;
  const isAdmin = currentAccount && currentAccount.role === '管理員';
  const data = {
    displayName: document.getElementById('edit-displayName').value.trim(),
    phone: document.getElementById('edit-phone').value.trim(),
    mailingAddress: document.getElementById('edit-mailingAddress').value.trim(),
    tenantPaymentContractReminder: document.getElementById('edit-tenantPaymentContractReminder').checked,
    workOrderReminder: document.getElementById('edit-workOrderReminder').checked,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    updatedBy: getCurrentUserUid()
  };
  if (isAdmin) {
    data.role = document.getElementById('edit-role').value;
    data.status = document.getElementById('edit-status').value;
  }
  try {
    showLoading();
    await db.collection('accounts').doc(editingUid).set(data, { merge: true });
    showToast('帳號資訊已更新');
    closeEditModal();
    await loadAccountsPage();
  } catch (err) {
    console.error(err);
    showToast('儲存失敗', 'error');
  } finally { hideLoading(); }
});

// 點擊 modal 背景關閉
document.getElementById('edit-modal').addEventListener('click', function(e) {
  if (e.target === this) closeEditModal();
});

document.addEventListener('DOMContentLoaded', () => onAuthReady(user => { if (user) loadAccountsPage(); }));
</script>
</body>
</html>
