<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RentalHub — 登入</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #1e3a5f 0%, #2563EB 50%, #1e40af 100%);
            min-height: 100vh;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        .google-btn {
            background: #fff;
            border: 1px solid #dadce0;
            color: #3c4043;
            transition: all 0.2s;
        }
        .google-btn:hover {
            background: #f8f9fa;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            transform: translateY(-1px);
        }
        .google-btn:active {
            transform: translateY(0);
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="login-card w-full max-w-md p-8 fade-in">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-primary rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
                <i class="fas fa-building text-white text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-900">RentalHub</h1>
            <p class="text-gray-500 text-sm mt-1">個人房東租賃管理系統</p>
        </div>

        <!-- 未登入狀態 -->
        <div id="login-section">
            <p class="text-center text-gray-600 mb-6">請使用 Google 帳號登入</p>
            <button id="btn-google-login" onclick="handleGoogleLogin()" class="google-btn w-full flex items-center justify-center gap-3 px-4 py-3 rounded-xl text-sm font-medium">
                <i class="fab fa-google text-red-500"></i>
                使用 Google 帳號登入
            </button>
        </div>

        <!-- 載入中狀態 -->
        <div id="loading-section" class="hidden text-center py-8">
            <div class="spinner mx-auto mb-4" style="border-color: #2563EB; border-top-color: transparent; width: 40px; height: 40px;"></div>
            <p class="text-gray-500 text-sm">正在登入中，請稍候...</p>
        </div>

        <!-- 錯誤訊息 -->
        <div id="error-section" class="hidden mt-4 p-3 bg-red-50 border border-red-200 rounded-lg">
            <p class="text-red-600 text-sm text-center" id="error-message"></p>
        </div>

        <!-- 底部連結 -->
        <div class="mt-8 pt-6 border-t border-gray-100 text-center">
            <a href="index.html" class="text-sm text-gray-400 hover:text-primary transition">
                <i class="fas fa-arrow-left mr-1"></i>返回首頁
            </a>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>
    // Firebase 設定
    var firebaseConfig = {
        apiKey: "AIzaSyDgk5qz4mNA09g-3azau9mgWjd8996uvJU",
        authDomain: "taipeimetrohouse-2.firebaseapp.com",
        projectId: "taipeimetrohouse-2",
        storageBucket: "taipeimetrohouse-2.firebasestorage.app",
        messagingSenderId: "90653753409",
        appId: "1:90653753409:web:b675e99516d61f920d46c0",
        measurementId: "G-EZDH90LHWB"
    };

    // 初始化 Firebase（避免重複初始化）
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }

    // 頁面載入時檢查是否已登入
    firebase.auth().onAuthStateChanged(function(user) {
        if (user) {
            // 已登入，直接跳轉到 dashboard
            console.log("Already logged in, redirecting to dashboard...");
            window.location.href = 'dashboard.html';
        }
    });

    // Google 登入
    function handleGoogleLogin() {
        var btn = document.getElementById('btn-google-login');
        var loginSection = document.getElementById('login-section');
        var loadingSection = document.getElementById('loading-section');
        var errorSection = document.getElementById('error-section');

        // 顯示載入中
        loginSection.classList.add('hidden');
        loadingSection.classList.remove('hidden');
        errorSection.classList.add('hidden');

        var provider = new firebase.auth.GoogleAuthProvider();
        firebase.auth().languageCode = 'zh-TW';

        // 使用 Popup 方式登入（比 Redirect 更穩定）
        firebase.auth().signInWithPopup(provider).then(function(result) {
            var user = result.user;
            console.log("Login successful:", user.displayName);

            // 儲存使用者資訊到 Firestore（不等待完成）
            firebase.firestore().collection('users').doc(user.uid).set({
                id: user.uid,
                name: user.displayName,
                email: user.email,
                photoURL: user.photoURL || '',
                lastLogin: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true }).catch(function(error) {
                console.error("Save user error:", error);
            });

            // 等待 currentUser 同步完成，然後跳轉
            // signInWithPopup 成功後，currentUser 應該已經是可用的
            var redirectToDashboard = function() {
                if (firebase.auth().currentUser) {
                    console.log("Auth synced, redirecting to dashboard...");
                    window.location.replace('dashboard.html');
                } else {
                    // 如果 currentUser 還沒同步，等待一下
                    console.log("Waiting for auth sync...");
                    setTimeout(redirectToDashboard, 100);
                }
            };
            
            // 最多等待 3 秒
            var attempts = 0;
            var maxAttempts = 30;
            var waitForSync = function() {
                if (firebase.auth().currentUser) {
                    console.log("Auth synced after " + attempts + " attempts, redirecting...");
                    window.location.replace('dashboard.html');
                } else if (attempts < maxAttempts) {
                    attempts++;
                    setTimeout(waitForSync, 100);
                } else {
                    // 超時，強制跳轉
                    console.log("Auth sync timeout, forcing redirect...");
                    window.location.replace('dashboard.html');
                }
            };
            waitForSync();

        }).catch(function(error) {
            console.error("Login error:", error.code, error.message);

            // 顯示錯誤
            loadingSection.classList.add('hidden');
            loginSection.classList.remove('hidden');
            errorSection.classList.remove('hidden');

            var errorMsg = '登入失敗，請重試';
            if (error.code === 'auth/popup-closed-by-user') {
                errorMsg = '登入視窗已關閉，請重新嘗試';
            } else if (error.code === 'auth/unauthorized-domain') {
                errorMsg = '此網域未授權，請聯絡管理員';
            }
            document.getElementById('error-message').textContent = errorMsg;
        });
    }
    </script>
</body>
</html>
