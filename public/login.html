<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入大都會物業房務管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: #85C4CB;
            min-height: 100vh;
        }
        .login-shell {
            display: grid;
            grid-template-columns: 1.05fr .95fr;
            min-height: 220px;
            background: #fff;
            border-radius: 6px;
            box-shadow: 0 22px 55px rgba(30, 70, 80, .22);
        }
        .login-hero {
            min-height: 220px;
            background: linear-gradient(135deg, #334155, #111827);
            align-items: stretch;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .login-hero:before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 20% 20%, rgba(255,255,255,.16), transparent 38%), linear-gradient(135deg, rgba(14,116,144,.45), rgba(15,23,42,.92));
        }
        .hero-overlay {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            color: white;
            text-align: center;
        }
        .metro-logo { width: 112px; height: 112px; border-radius: 16px; object-fit: cover; box-shadow: 0 15px 30px rgba(0,0,0,.28); margin-bottom: 1rem; }
        .hero-kicker { letter-spacing: .28em; font-size: .78rem; opacity: .82; margin-bottom: .75rem; }
        .hero-copy { max-width: 360px; color: rgba(255,255,255,.8); font-size: .95rem; line-height: 1.7; }
        .login-panel { padding: 3rem; display: flex; flex-direction: column; justify-content: center; }
        .google-btn {
            background: #7892A4;
            color: #fff;
            transition: all 0.2s;
        }
        .google-btn:hover { background: #647f92; box-shadow: 0 8px 20px rgba(100,127,146,.28); transform: translateY(-1px); }
        .google-btn:active { transform: translateY(0); }
        .spinner { display: inline-block; border: 3px solid rgba(120,146,164,.25); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 767px) { .login-shell { grid-template-columns: 1fr; } .login-panel { padding: 2rem; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<main class="login-shell w-full max-w-6xl overflow-hidden fade-in">
    <section class="login-hero hidden md:flex">
        <div class="hero-overlay">
            <img src="img/logo.jpg" alt="大都會物業" class="metro-logo">
            <p class="hero-kicker">METRO HOUSE</p>
            <p class="hero-copy">以人為本，體貼用心，打造專業房務與租賃管理流程。</p>
        </div>
    </section>

    <section class="login-panel">
        <div class="text-center mb-8">
            <div class="w-14 h-14 bg-slate-700 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg md:hidden">
                <span class="text-white text-2xl font-bold">M</span>
            </div>
            <h1 class="text-2xl md:text-3xl font-bold text-gray-800">歡迎來到大都會物業房務管理系統!</h1>
            <p class="text-gray-500 text-sm mt-3">請使用 Google 帳號登入後台</p>
        </div>

        <div class="h-px bg-gray-200 mb-5"></div>

        <!-- 登入表單 -->
        <div id="login-section">
            <button id="btn-google-login" onclick="handleGoogleLogin()" class="google-btn w-full flex items-center justify-center gap-3 px-4 py-3 rounded-md text-base font-semibold">
                <i class="fab fa-google"></i>
                Login with Google
            </button>
        </div>

        <!-- 載入中 -->
        <div id="loading-section" class="hidden text-center py-8">
            <div class="spinner mx-auto mb-4" style="border-color: #7892A4; border-top-color: transparent; width: 40px; height: 40px;"></div>
            <p class="text-gray-500 text-sm">正在登入中，請稍候...</p>
        </div>

        <!-- 錯誤訊息 -->
        <div id="error-section" class="hidden mt-4 p-3 bg-red-50 border border-red-200 rounded-lg">
            <p class="text-red-600 text-sm text-center" id="error-message"></p>
        </div>

        <div class="mt-8 text-center">
            <a href="index.html" class="text-sm text-gray-400 hover:text-slate-600 transition">
                <i class="fas fa-arrow-left mr-1"></i>返回首頁
            </a>
        </div>
    </section>
</main>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
// ============================================================
// Session 管理（參考 taipeimetrohouse-2 的設計）
// 用 localStorage 存 session，頁面載入時同步檢查
// ============================================================
var SESSION_KEY = 'tmh2-session';

function getSession() {
    try {
        return window.localStorage.getItem(SESSION_KEY);
    } catch (e) {
        return null;
    }
}

function setSession(email) {
    try {
        window.localStorage.setItem(SESSION_KEY, email);
    } catch (e) {}
}

function clearSession() {
    try {
        window.localStorage.removeItem(SESSION_KEY);
    } catch (e) {}
}

// ============================================================
// Firebase 設定
// ============================================================
var firebaseConfig = {
        apiKey: "AIzaSyDgk5qz4mNA09g-3azau9mgWjd8996uvJU",
        authDomain: "taipeimetrohouse-2.firebaseapp.com",
    projectId: "taipeimetrohouse-2",
    storageBucket: "taipeimetrohouse-2.firebasestorage.app",
    messagingSenderId: "90653753409",
    appId: "1:90653753409:web:b675e99516d61f920d46c0",
    measurementId: "G-EZDH90LHWB"
};

if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}

// ============================================================
// 頁面載入時同步檢查 session
// ============================================================
(function() {
    var session = getSession();
    if (session) {
        // 有 session，跳轉到 dashboard
        console.log("[Auth] Session found, redirecting to dashboard...");
        window.location.replace('dashboard.html');
        return;
    }
    // 沒有 session，顯示登入頁面
    console.log("[Auth] No session, showing login page");
})();

// ============================================================
// Google 登入
// ============================================================
function handleGoogleLogin() {
    var loginSection = document.getElementById('login-section');
    var loadingSection = document.getElementById('loading-section');
    var errorSection = document.getElementById('error-section');

    loginSection.classList.add('hidden');
    loadingSection.classList.remove('hidden');
    errorSection.classList.add('hidden');

    var provider = new firebase.auth.GoogleAuthProvider();
    firebase.auth().languageCode = 'zh-TW';

    firebase.auth().signInWithPopup(provider).then(function(result) {
        var user = result.user;
        console.log("[Auth] Login successful:", user.displayName);

        // 寫入 Firestore（不等待）
        firebase.firestore().collection('users').doc(user.uid).set({
            id: user.uid,
            name: user.displayName,
            email: user.email,
            photoURL: user.photoURL || '',
            lastLogin: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true }).catch(function(e) {
            console.error("[Auth] Save user error:", e);
        });

        // 建立/更新帳號管理資料；第一個登入者預設為管理員，之後預設訪客。
        var accountRef = firebase.firestore().collection('accounts').doc(user.uid);
        accountRef.get().then(function(accountSnap) {
            if (accountSnap.exists) {
                return accountRef.set({
                    uid: user.uid,
                    displayName: user.displayName || accountSnap.data().displayName || '未命名使用者',
                    email: user.email || accountSnap.data().email || '',
                    photoURL: user.photoURL || accountSnap.data().photoURL || '',
                    status: accountSnap.data().status || '啟用',
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    lastLoginAt: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
            }
            return firebase.firestore().collection('accounts').limit(1).get().then(function(firstSnap) {
                return accountRef.set({
                    uid: user.uid,
                    displayName: user.displayName || '未命名使用者',
                    email: user.email || '',
                    photoURL: user.photoURL || '',
                    role: firstSnap.empty ? '管理員' : '訪客',
                    status: '啟用',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    lastLoginAt: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
            });
        }).catch(function(e) {
            console.error("[Auth] Save account error:", e);
        });

        // 寫入 session（同步操作，立即生效）
        setSession(user.email);
        console.log("[Auth] Session saved, redirecting...");

        // 跳轉到 dashboard
        window.location.replace('dashboard.html');

    }).catch(function(error) {
        console.error("[Auth] Login error:", error.code, error.message);

        loadingSection.classList.add('hidden');
        loginSection.classList.remove('hidden');
        errorSection.classList.remove('hidden');

        var errorMsg = '登入失敗，請重試';
        if (error.code === 'auth/popup-closed-by-user') {
            errorMsg = '登入視窗已關閉，請重新嘗試';
        } else if (error.code === 'auth/unauthorized-domain') {
            errorMsg = '此網域未授權，請聯絡管理員';
        }
        document.getElementById('error-message').textContent = errorMsg;
    });
}
</script>
</body>
</html>
