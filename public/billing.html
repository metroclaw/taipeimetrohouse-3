<script>
let billResults = [];
let allRooms = [];
let allTenants = [];
let currentBillId = null;
let historyBills = [];

// ============================================================
// 初始化：載入 Firestore 資料
// ============================================================
document.addEventListener('DOMContentLoaded', () => onAuthReady(async user => {
    if (!user) return;
    try {
        // 載入歷史紀錄
        await loadHistory();

        // 載入所有建案的房間
        await loadRoomsAndTenants();

        // 自動填入上期度數（從最新一筆歷史紀錄）
        fillPreviousReadings();

    } catch (err) {
        console.error('初始化失敗:', err);
        showToast('資料載入失敗：' + err.message, 'error');
    }
}));

// ============================================================
// 載入房間與房客資料
// ============================================================
async function loadRoomsAndTenants() {
    try {
        showLoading();

        // 載入所有建案
        const projects = await getProjects();
        if (!projects || projects.length === 0) {
            hideLoading();
            showToast('尚無建案資料，請先建立建案與房間', 'info');
            return;
        }

        // 從所有建案載入房間
        allRooms = [];
        for (const project of projects) {
            try {
                const rooms = await getRooms(project.id);
                if (rooms && rooms.length > 0) {
                    allRooms = allRooms.concat(rooms.map(r => ({
                        ...r,
                        projectId: project.id,
                        projectAddress: project.address || project.name || ''
                    })));
                }
            } catch (e) {
                console.warn(`載入建案 ${project.id} 房間失敗:`, e);
            }
        }

        // 載入所有房客
        try {
            allTenants = await getTenants();
        } catch (e) {
            console.warn('載入房客失敗:', e);
            allTenants = [];
        }

        hideLoading();

        if (allRooms.length === 0) {
            showToast('尚無房間資料，請先在建案管理中建立房間', 'info');
        } else {
            showToast(`已載入 ${allRooms.length} 間房間、${allTenants.length} 位房客`, 'success');
        }

    } catch (err) {
        hideLoading();
        console.error('載入房間房客失敗:', err);
        showToast('載入資料失敗：' + err.message, 'error');
    }
}

// ============================================================
// 從最新歷史紀錄填入上期度數
// ============================================================
function fillPreviousReadings() {
    if (historyBills.length > 0) {
        const latest = historyBills[0];
        if (latest.elecCurrent) document.getElementById('elec-prev').value = latest.elecCurrent;
        if (latest.waterCurrent) document.getElementById('water-prev').value = latest.waterCurrent;
        if (latest.gasCurrent) document.getElementById('gas-prev').value = latest.gasCurrent;
        // 也填入費率和費用
        if (latest.elecRate) document.getElementById('elec-rate').value = latest.elecRate;
        if (latest.waterRate) document.getElementById('water-rate').value = latest.waterRate;
        if (latest.gasRate) document.getElementById('gas-rate').value = latest.gasRate;
        if (latest.tvFee) document.getElementById('tv-fee').value = latest.tvFee;
        if (latest.wifiFee) document.getElementById('wifi-fee').value = latest.wifiFee;
        if (latest.waterSplit) document.getElementById('water-split').value = latest.waterSplit;
        if (latest.elecSplit) document.getElementById('elec-split').value = latest.elecSplit;
        if (latest.gasSplit) document.getElementById('gas-split').value = latest.gasSplit;
    } else {
        // 無歷史紀錄，使用預設值
        document.getElementById('elec-prev').value = '12500';
        document.getElementById('water-prev').value = '3200';
        document.getElementById('gas-prev').value = '850';
    }
}

// ============================================================
// 載入歷史紀錄
// ============================================================
async function loadHistory() {
    try {
        const listEl = document.getElementById('history-list');
        listEl.innerHTML = '<span class="text-gray-400"><i class="fas fa-spinner fa-spin mr-1"></i>載入中...</span>';

        historyBills = await getUtilityBills();

        if (!historyBills || historyBills.length === 0) {
            listEl.innerHTML = '<span class="text-gray-400 text-center py-4 block">尚無歷史計算紀錄</span>';
            return;
        }

        let html = '<div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-2">';
        historyBills.forEach(bill => {
            const label = `${bill.year}年${bill.month}月`;
            const totalRooms = bill.results ? bill.results.length : 0;
            html += `
                <button onclick="viewHistoryBill('${bill.id}')" class="text-left p-3 border border-gray-200 rounded-lg hover:border-primary hover:bg-primary/5 transition-colors">
                    <div class="font-medium text-gray-900 text-sm">${label}</div>
                    <div class="text-xs text-gray-500 mt-1">${totalRooms} 間房間</div>
                    <div class="text-xs text-gray-400 mt-0.5">${formatDate(bill.createdAt)}</div>
                </button>
            `;
        });
        html += '</div>';
        listEl.innerHTML = html;

    } catch (err) {
        console.error('載入歷史紀錄失敗:', err);
        document.getElementById('history-list').innerHTML = '<span class="text-red-400">載入失敗，請稍後再試</span>';
    }
}

// ============================================================
// 查看歷史計算結果
// ============================================================
async function viewHistoryBill(billId) {
    try {
        showLoading();
        const uid = getCurrentUserUid();
        if (!uid) { hideLoading(); return; }

        const doc = await db.collection('users').doc(uid).collection('utilityBills').doc(billId).get();
        if (!doc.exists) {
            hideLoading();
            showToast('找不到此紀錄', 'error');
            return;
        }

        const bill = doc.data();
        bill.id = doc.id;
        currentBillId = billId;

        // 填入表單
        document.getElementById('elec-current').value = bill.elecCurrent || '';
        document.getElementById('elec-prev').value = bill.elecPrevious || '';
        document.getElementById('water-current').value = bill.waterCurrent || '';
        document.getElementById('water-prev').value = bill.waterPrevious || '';
        document.getElementById('gas-current').value = bill.gasCurrent || '';
        document.getElementById('gas-prev').value = bill.gasPrevious || '';
        document.getElementById('tv-fee').value = bill.tvFee || '';
        document.getElementById('wifi-fee').value = bill.wifiFee || '';
        document.getElementById('elec-rate').value = bill.elecRate || 5.5;
        document.getElementById('water-rate').value = bill.waterRate || 12;
        document.getElementById('gas-rate').value = bill.gasRate || 25;
        document.getElementById('water-split').value = bill.waterSplit || 'area';
        document.getElementById('elec-split').value = bill.elecSplit || 'ac';
        document.getElementById('gas-split').value = bill.gasSplit || 'people';

        // 顯示計算結果
        billResults = bill.results || [];
        renderResults(bill, billResults);

        // 更新房客選單
        updateTenantSelect();

        hideLoading();
        showToast(`已載入 ${bill.year}年${bill.month}月 的計算結果`, 'success');

        // 捲動到結果
        document.getElementById('bill-results').scrollIntoView({ behavior: 'smooth', block: 'start' });

    } catch (err) {
        hideLoading();
        console.error('查看歷史紀錄失敗:', err);
        showToast('載入失敗：' + err.message, 'error');
    }
}

// ============================================================
// 計算費用（使用 Firestore 資料）
// ============================================================
function calculateBill() {
    const elecCurrent = parseFloat(document.getElementById('elec-current').value) || 0;
    const elecPrev = parseFloat(document.getElementById('elec-prev').value) || 0;
    const waterCurrent = parseFloat(document.getElementById('water-current').value) || 0;
    const waterPrev = parseFloat(document.getElementById('water-prev').value) || 0;
    const gasCurrent = parseFloat(document.getElementById('gas-current').value) || 0;
    const gasPrev = parseFloat(document.getElementById('gas-prev').value) || 0;
    const tvFee = parseFloat(document.getElementById('tv-fee').value) || 0;
    const wifiFee = parseFloat(document.getElementById('wifi-fee').value) || 0;
    const elecRate = parseFloat(document.getElementById('elec-rate').value) || 5.5;
    const waterRate = parseFloat(document.getElementById('water-rate').value) || 12;
    const gasRate = parseFloat(document.getElementById('gas-rate').value) || 25;
    const waterSplit = document.getElementById('water-split').value;
    const elecSplit = document.getElementById('elec-split').value;
    const gasSplit = document.getElementById('gas-split').value;

    const elecUsage = elecCurrent - elecPrev;
    const waterUsage = waterCurrent - waterPrev;
    const gasUsage = gasCurrent - gasPrev;

    if (elecUsage < 0 || waterUsage < 0 || gasUsage < 0) {
        showToast('本期度數不能小於上期度數', 'error');
        return;
    }

    const elecTotal = elecUsage * elecRate;
    const waterTotal = waterUsage * waterRate;
    const gasTotal = gasUsage * gasRate;

    // 使用 Firestore 資料或 fallback 到 testRooms
    let roomsData = allRooms;
    let tenantsData = allTenants;

    if (roomsData.length === 0) {
        showToast('尚無房間資料，請先在建案管理建立房間', 'error');
        document.getElementById('btn-save').disabled = true;
        return;
    }

    // 使用 app.js 的 calculateUtilityBill 函數
    const billData = {
        elecCurrent, elecPrevious: elecPrev,
        waterCurrent, waterPrevious: waterPrev,
        gasCurrent, gasPrevious: gasPrev,
        elecRate, waterRate, gasRate,
        tvFee, wifiFee,
        waterSplit, elecSplit, gasSplit
    };

    billResults = calculateUtilityBill(billData, roomsData, tenantsData);
    currentBillId = null; // 新計算，非歷史紀錄

    // 構建顯示用的 bill 物件
    const bill = {
        elecUsage, waterUsage, gasUsage,
        elecTotal, waterTotal, gasTotal
    };

    renderResults(bill, billResults);
    updateTenantSelect();

    // 啟用儲存按鈕
    document.getElementById('btn-save').disabled = false;

    if (billResults.length === 0) {
        document.getElementById('btn-save').disabled = true;
        showToast('無可分攤房間，請先建立合約把房客綁定到客房', 'error');
        return;
    }
    showToast(`計算完成，共 ${billResults.length} 間房間`, 'success');
}

// ============================================================
// 渲染計算結果表格
// ============================================================
function renderResults(bill, results) {
    const container = document.getElementById('bill-results');
    if (!results || results.length === 0) {
        container.innerHTML = '<p class="text-gray-400 text-center py-4">無計算結果</p>';
        return;
    }

    container.innerHTML = `<div class="space-y-2">
        <div class="flex justify-between text-xs text-gray-500 flex-wrap gap-1">
            <span>總用電：${bill.elecUsage || 0} kWh (${formatCurrency(bill.elecTotal || 0)})</span>
            <span>總用水：${bill.waterUsage || 0} 度 (${formatCurrency(bill.waterTotal || 0)})</span>
            <span>總瓦斯：${bill.gasUsage || 0} 度 (${formatCurrency(bill.gasTotal || 0)})</span>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead>
                    <tr class="text-gray-500 text-xs">
                        <th class="text-left py-1">房號</th>
                        <th class="text-left">房客</th>
                        <th class="text-right">水費</th>
                        <th class="text-right">電費</th>

// ============================================================
// 儲存計算結果到 Firestore
// ============================================================
async function saveBill() {
    if (!billResults || billResults.length === 0) {
        showToast('請先計算費用', 'error');
        return;
    }

    try {
        showLoading();

        const uid = getCurrentUserUid();
        if (!uid) {
            hideLoading();
            showToast('使用者未登入', 'error');
            return;
        }

        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth() + 1;

        const billData = {
            year,
            month,
            elecCurrent: parseFloat(document.getElementById('elec-current').value) || 0,
            elecPrevious: parseFloat(document.getElementById('elec-prev').value) || 0,
            waterCurrent: parseFloat(document.getElementById('water-current').value) || 0,
            waterPrevious: parseFloat(document.getElementById('water-prev').value) || 0,
            gasCurrent: parseFloat(document.getElementById('gas-current').value) || 0,
            gasPrevious: parseFloat(document.getElementById('gas-prev').value) || 0,
            elecRate: parseFloat(document.getElementById('elec-rate').value) || 5.5,
            waterRate: parseFloat(document.getElementById('water-rate').value) || 12,
            gasRate: parseFloat(document.getElementById('gas-rate').value) || 25,
            tvFee: parseFloat(document.getElementById('tv-fee').value) || 0,
            wifiFee: parseFloat(document.getElementById('wifi-fee').value) || 0,
            waterSplit: document.getElementById('water-split').value,
            elecSplit: document.getElementById('elec-split').value,
            gasSplit: document.getElementById('gas-split').value,
            results: billResults,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        if (currentBillId) {
            // 更新現有紀錄
            await db.collection('users').doc(uid).collection('utilityBills').doc(currentBillId).update(billData);
            showToast('計算結果已更新', 'success');
        } else {
            // 新增紀錄
            const docRef = await db.collection('users').doc(uid).collection('utilityBills').add(billData);
            currentBillId = docRef.id;
            showToast('計算結果已儲存', 'success');
        }

        hideLoading();

        // 重新載入歷史紀錄
        await loadHistory();

    } catch (err) {
        hideLoading();
        console.error('儲存失敗:', err);
        showToast('儲存失敗：' + err.message, 'error');
    }
}
