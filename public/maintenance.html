<script>
// ============================================================
// Maintenance Page — Full CRUD
// ============================================================

let allTasks = [];
let cleaningSchedules = [];
let currentFilter = 'all';
let calendarYear, calendarMonth;

document.addEventListener('DOMContentLoaded', () => onAuthReady(user => {
  if (!user) return;
  initPage();
}));

async function initPage() {
  showLoading();
  try {
    await loadTasks();
    await loadCleaningSchedules();
    renderCalendar();
  } catch (e) {
    console.error('初始化失敗:', e);
    showToast('載入失敗，請重新整理', 'error');
  } finally {
    hideLoading();
  }
}

// ---- Firestore helpers ----
function maintenanceCol() {
  const uid = getCurrentUserUid();
  if (!uid) throw new Error('使用者未登入');
  return db.collection('users').doc(uid).collection('maintenanceTasks');
}

function cleaningCol() {
  const uid = getCurrentUserUid();
  if (!uid) throw new Error('使用者未登入');
  return db.collection('users').doc(uid).collection('cleaningSchedules');
}

// ---- Load data ----
async function loadTasks() {
  try {
    const snapshot = await maintenanceCol().orderBy('createdAt', 'desc').get();
    allTasks = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

    renderTasks();
    updateStats();
  } catch (e) {
    console.error('載入派工單失敗:', e);
    throw e;
  }
}

async function loadCleaningSchedules() {
  try {
    const snapshot = await cleaningCol().get();
    cleaningSchedules = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    renderCleaningLegend();
  } catch (e) {
    console.error('載入清潔排程失敗:', e);
  }
}

// ---- Statistics ----
function updateStats() {
  const pending = allTasks.filter(t => t.status === '待處理').length;
  const inProgress = allTasks.filter(t => t.status === '進行中').length;
  const completed = allTasks.filter(t => t.status === '已完成').length;

  // 本月費用：已完成且 completedAt 在本月的 actualCost 加總
  const now = new Date();
  const thisMonth = now.getMonth();
  const thisYear = now.getFullYear();
  const monthlyCost = allTasks
    .filter(t => {
      if (!t.completedAt) return false;
      const d = new Date(t.completedAt);
      return d.getMonth() === thisMonth && d.getFullYear() === thisYear;
    })
    .reduce((sum, t) => sum + (t.actualCost || 0), 0);

  document.getElementById('stat-pending').textContent = pending;
  document.getElementById('stat-inprogress').textContent = inProgress;
  document.getElementById('stat-completed').textContent = completed;
  document.getElementById('stat-cost').textContent = formatCurrency(monthlyCost);
}

// ---- Render task list ----

  const container = document.getElementById('task-list');
  const filtered = currentFilter === 'all'

    : allTasks.filter(t => t.status === currentFilter);

  if (filtered.length === 0) {
    container.innerHTML = '<div class="p-8 text-center text-gray-400 text-sm">目前沒有派工單</div>';
    return;
  }

  container.innerHTML = filtered.map(task => {
    const priorityConfig = {
      '緊急': { bg: 'bg-red-100', text: 'text-red-600', icon: 'fa-exclamation-circle', iconColor: 'text-red-500', bgIcon: 'bg-red-100' },
      '一般': { bg: 'bg-amber-100', text: 'text-amber-600', icon: 'fa-wrench', iconColor: 'text-amber-500', bgIcon: 'bg-amber-100' },
      '低': { bg: 'bg-blue-100', text: 'text-blue-600', icon: 'fa-clipboard-check', iconColor: 'text-blue-500', bgIcon: 'bg-blue-100' }
    };
    const pCfg = priorityConfig[task.priority] || priorityConfig['一般'];

    const statusConfig = {
      '待處理': 'bg-red-100 text-red-600',
      '進行中': 'bg-amber-100 text-amber-600',
      '已完成': 'bg-emerald-100 text-emerald-600',
      '已取消': 'bg-gray-100 text-gray-500'
    };
    const sCfg = statusConfig[task.status] || 'bg-gray-100 text-gray-500';

    const catConfig = {
      '修繕': 'bg-amber-100 text-amber-600',
      '清潔': 'bg-blue-100 text-blue-600',
      '其他': 'bg-gray-100 text-gray-500'
    };
    const cCfg = catConfig[task.category] || catConfig['其他'];

    const dateStr = task.createdAt ? formatDate(task.createdAt) : '—';
    const costStr = task.estimatedCost ? formatCurrency(task.estimatedCost) : '—';

    return `
      <div class="p-4 flex items-start gap-4 hover:bg-gray-50 transition">
        <div class="w-10 h-10 ${pCfg.bgIcon} rounded-lg flex items-center justify-center flex-shrink-0">
          <i class="fas ${pCfg.icon} ${pCfg.iconColor}"></i>
        </div>
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 mb-1 flex-wrap">
            <span class="text-xs ${pCfg.bg} ${pCfg.text} px-2 py-0.5 rounded-full font-medium">${task.priority || '一般'}</span>
            <span class="text-xs ${cCfg} px-2 py-0.5 rounded-full">${task.category || '其他'}</span>
            ${task.roomNumber ? `<span class="text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full">${task.roomNumber}</span>` : ''}
            ${task.tenantName ? `<span class="text-xs text-gray-400">${task.tenantName}</span>` : ''}
          </div>
          <p class="text-sm font-medium text-gray-900">${escapeHtml(task.title)}</p>
          ${task.description ? `<p class="text-xs text-gray-500 mt-0.5 truncate">${escapeHtml(task.description)}</p>` : ''}
          <p class="text-xs text-gray-400 mt-1">${dateStr} 回報 ${task.assignedTo ? '• 已派工 ' + escapeHtml(task.assignedTo) : '• 待派工'}</p>
        </div>
        <div class="text-right flex-shrink-0 flex flex-col items-end gap-1">
          <span class="text-xs ${sCfg} px-2 py-1 rounded-full">${task.status}</span>
          <p class="text-xs text-gray-400 mt-1">預估 ${formatCurrency(task.estimatedCost || 0)}</p>
          <div class="flex gap-1 mt-1">
            <button onclick="editTask('${task.id}')" class="p-1.5 text-gray-400 hover:text-primary hover:bg-primary/10 rounded transition" title="編輯"><i class="fas fa-edit text-xs"></i></button>
            ${task.status !== '已完成' && task.status !== '已取消' ? `<button onclick="markComplete('${task.id}')" class="p-1.5 text-gray-400 hover:text-emerald-600 hover:bg-emerald-50 rounded transition" title="標記完成"><i class="fas fa-check text-xs"></i></button>` : ''}
            <button onclick="deleteTask('${task.id}')" class="p-1.5 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded transition" title="刪除"><i class="fas fa-trash text-xs"></i></button>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function filterTasks(status) {
  currentFilter = status;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    if (btn.dataset.filter === status) {
      btn.className = 'filter-btn px-3 py-1 rounded-full bg-primary text-white';
    } else {
      btn.className = 'filter-btn px-3 py-1 rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200';
    }
  });
  renderTasks();
}

// ---- Task Modal ----
function openTaskModal(taskId = null) {
  const modal = document.getElementById('task-modal');
  const title = document.getElementById('task-modal-title');
  const form = document.getElementById('task-form');

  form.reset();
  document.getElementById('task-id').value = '';

  if (taskId) {
    const task = allTasks.find(t => t.id === taskId);
    if (!task) return;
    title.textContent = '編輯派工單';
    document.getElementById('task-id').value = task.id;
    document.getElementById('task-title').value = task.title || '';
    document.getElementById('task-description').value = task.description || '';
    document.getElementById('task-room').value = task.roomNumber || '';
    document.getElementById('task-tenant').value = task.tenantName || '';
    document.getElementById('task-priority').value = task.priority || '一般';
    document.getElementById('task-category').value = task.category || '修繕';
    document.getElementById('task-assigned').value = task.assignedTo || '';
    document.getElementById('task-estimated-cost').value = task.estimatedCost || '';
    document.getElementById('task-notes').value = task.notes || '';
  } else {
    title.textContent = '新增派工單';
  }

  modal.classList.remove('hidden');
}

function closeTaskModal() {
  document.getElementById('task-modal').classList.add('hidden');
}

// ---- Task Form Submit ----
document.getElementById('task-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const id = document.getElementById('task-id').value;
  const now = Date.now();

  const data = {
    title: document.getElementById('task-title').value.trim(),
    description: document.getElementById('task-description').value.trim(),
    roomNumber: document.getElementById('task-room').value.trim(),
    tenantName: document.getElementById('task-tenant').value.trim(),
    priority: document.getElementById('task-priority').value,
    category: document.getElementById('task-category').value,
    assignedTo: document.getElementById('task-assigned').value.trim(),
    estimatedCost: Number(document.getElementById('task-estimated-cost').value) || 0,
    notes: document.getElementById('task-notes').value.trim(),
    updatedAt: now
  };

  if (!data.title) {
    showToast('請輸入派工標題', 'error');
    return;
  }

  showLoading();
  try {
    if (id) {
      // 編輯
      await maintenanceCol().doc(id).update(data);
      const idx = allTasks.findIndex(t => t.id === id);
      if (idx !== -1) {
        allTasks[idx] = { ...allTasks[idx], ...data };
      }
      showToast('派工單已更新', 'success');
    } else {
      // 新增
      data.status = '待處理';
      data.actualCost = 0;
      data.createdAt = now;
      data.completedAt = null;
      const docRef = await maintenanceCol().add(data);
      allTasks.unshift({ id: docRef.id, ...data });
      showToast('派工單已新增', 'success');
    }
    closeTaskModal();
    renderTasks();
    updateStats();
  } catch (e) {
    console.error('儲存失敗:', e);
    showToast('儲存失敗: ' + e.message, 'error');
  } finally {
    hideLoading();
  }
});

// ---- Edit task ----
function editTask(id) {
  openTaskModal(id);
}

// ---- Mark complete ----
async function markComplete(id) {
  if (!confirm('確定要將此派工單標記為已完成嗎？')) return;

  showLoading();
  try {
    const now = Date.now();
    await maintenanceCol().doc(id).update({
      status: '已完成',
      completedAt: now,
      updatedAt: now
    });
    const idx = allTasks.findIndex(t => t.id === id);
    if (idx !== -1) {
      allTasks[idx].status = '已完成';
      allTasks[idx].completedAt = now;
      allTasks[idx].updatedAt = now;
    }
    showToast('已標記為完成', 'success');
    renderTasks();
    updateStats();
  } catch (e) {
    console.error('標記完成失敗:', e);
    showToast('操作失敗: ' + e.message, 'error');
  } finally {
    hideLoading();
  }
}

// ---- Delete task ----
async function deleteTask(id) {
  if (!confirm('確定要刪除此派工單嗎？此操作無法復原。')) return;

  showLoading();
  try {
    await maintenanceCol().doc(id).delete();
    allTasks = allTasks.filter(t => t.id !== id);
    showToast('派工單已刪除', 'success');
    renderTasks();
    updateStats();
  } catch (e) {
    console.error('刪除失敗:', e);
    showToast('刪除失敗: ' + e.message, 'error');
  } finally {
    hideLoading();
  }
}

// ---- Cleaning Schedule Modal ----
function openCleaningModal(dateStr = null) {
  document.getElementById('cleaning-form').reset();
  if (dateStr) {
    document.getElementById('cleaning-date').value = dateStr;
  } else {
    const now = new Date();
    document.getElementById('cleaning-date').value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  }
  document.getElementById('cleaning-modal').classList.remove('hidden');
}

function closeCleaningModal() {
  document.getElementById('cleaning-modal').classList.add('hidden');
}

document.getElementById('cleaning-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const data = {
    date: document.getElementById('cleaning-date').value,
    roomNumber: document.getElementById('cleaning-room').value.trim(),
    type: document.getElementById('cleaning-type').value,
    notes: document.getElementById('cleaning-notes').value.trim(),
    createdAt: Date.now()
  };

  if (!data.roomNumber) {
    showToast('請輸入房號', 'error');
    return;
  }

  showLoading();
  try {
    const docRef = await cleaningCol().add(data);
    cleaningSchedules.push({ id: docRef.id, ...data });
    showToast('清潔排程已新增', 'success');
    closeCleaningModal();
    renderCalendar();
    renderCleaningLegend();
  } catch (e) {
    console.error('新增清潔排程失敗:', e);
    showToast('新增失敗: ' + e.message, 'error');
  } finally {
    hideLoading();
  }
});

function renderCleaningLegend() {
  const container = document.getElementById('cleaning-legend');
  if (cleaningSchedules.length === 0) {
    container.innerHTML = '<p class="text-xs text-gray-400">目前無清潔排程</p>';
    return;
  }
  container.innerHTML = cleaningSchedules.map(cs => `
    <div class="flex items-center gap-2 text-xs">
      <span class="w-2 h-2 bg-primary rounded-full"></span>
      <span class="text-gray-600">${cs.date} ${cs.roomNumber} ${cs.type}</span>
      <button onclick="deleteCleaning('${cs.id}')" class="ml-auto text-gray-400 hover:text-red-500"><i class="fas fa-times"></i></button>
    </div>
  `).join('');
}

async function deleteCleaning(id) {
  if (!confirm('刪除此清潔排程？')) return;
  try {
    await cleaningCol().doc(id).delete();
    cleaningSchedules = cleaningSchedules.filter(c => c.id !== id);
    renderCalendar();
    renderCleaningLegend();
    showToast('已刪除', 'success');
  } catch (e) {
    showToast('刪除失敗', 'error');
  }
}

// ---- Calendar ----
function renderCalendar() {
  const now = new Date();
  calendarYear = calendarYear || now.getFullYear();
  calendarMonth = calendarMonth != null ? calendarMonth : now.getMonth();

  const monthNames = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  document.getElementById('calendar-month').textContent = `${calendarYear}年 ${monthNames[calendarMonth]}`;

  const firstDay = new Date(calendarYear, calendarMonth, 1).getDay();
  const daysInMonth = new Date(calendarYear, calendarMonth + 1, 0).getDate();
  const daysInPrevMonth = new Date(calendarYear, calendarMonth, 0).getDate();

  const grid = document.getElementById('calendar-grid');
  let html = '';

  // 上月填充
  for (let i = firstDay - 1; i >= 0; i--) {
    html += `<div class="p-2 text-gray-300">${daysInPrevMonth - i}</div>`;
  }

  // 當月
  const today = now.getDate();
  const isCurrentMonth = calendarYear === now.getFullYear() && calendarMonth === now.getMonth();

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calendarYear}-${String(calendarMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    const hasCleaning = cleaningSchedules.some(cs => cs.date === dateStr);
    const isToday = isCurrentMonth && d === today;
    const dotHtml = hasCleaning ? '<span class="absolute bottom-0.5 left-1/2 -translate-x-1/2 w-1.5 h-1.5 bg-primary rounded-full"></span>' : '';
    const todayClass = isToday ? 'bg-primary text-white font-bold' : 'text-gray-600 hover:bg-gray-50';

    html += `<div class="p-2 rounded cursor-pointer relative transition ${todayClass}" onclick="handleDateClick('${dateStr}')">${d}${dotHtml}</div>`;
  }

  // 下月填充
  const totalCells = firstDay + daysInMonth;
  const remaining = (7 - (totalCells % 7)) % 7;
  for (let i = 1; i <= remaining; i++) {
    html += `<div class="p-2 text-gray-300">${i}</div>`;
  }

  grid.innerHTML = html;
}

function changeMonth(delta) {
  calendarMonth += delta;
  if (calendarMonth > 11) { calendarMonth = 0; calendarYear++; }
  if (calendarMonth < 0) { calendarMonth = 11; calendarYear--; }
  renderCalendar();
}

function handleDateClick(dateStr) {
  openCleaningModal(dateStr);
}

// ---- Utility ----
function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
